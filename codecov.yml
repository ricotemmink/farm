# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml
#
# Project policy keeps the overall 80% coverage floor mandated by the
# repo's contributor policy document ("Coverage minimum is 80%,
# enforced in CI."). That rule governs the aggregate project coverage,
# which is exactly what coverage.status.project.default enforces below.
#
# Per-patch coverage is held to 70% rather than the full 80% because
# it is computed over the diff's new-code lines only, where the usual
# mix includes defensive error branches (syscall failures, mocked
# Docker responses, uncommon symlink-resolution paths) that are safer
# to reason about by inspection than to exercise with contrived
# fixtures. A 70% patch floor keeps diffs well-tested for their
# logic-carrying lines without forcing every syscall boundary to be
# mocked out. The 0.5% threshold absorbs measurement noise on both
# gates.

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 0.5%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 0.5%
        if_ci_failed: error
