ci:
  autoupdate_schedule: never
  autofix_prs: true
  autofix_commit_msg: "style: auto-fix pre-commit hooks"
  skip: [commitizen, gitleaks, hadolint-docker, caddy-validate, no-em-dashes, no-redundant-timeout, mypy, pytest-unit, golangci-lint, go-vet, go-test, eslint-web, check-push-rebased, check-single-migration-per-pr, check-no-modify-migration, forbidden-literals]

default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: local
    hooks:
      - id: check-push-rebased
        name: check push rebased (block if behind main)
        entry: bash
        args: ["scripts/check_push_rebased.sh"]
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
        types: []
      - id: check-single-migration-per-pr
        name: enforce at most one new Atlas migration per PR
        entry: bash
        args: ["scripts/check_single_migration_per_pr.sh"]
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit, pre-push]
        types: []
      - id: check-no-modify-migration
        name: block modification of existing migration files
        entry: bash
        args: ["scripts/check_no_modify_migration.sh"]
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
        types: []
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(src/synthorg/templates/builtins/|mkdocs\.yml$)
      - id: check-yaml
        name: check-yaml (mkdocs, unsafe for !!python tags)
        args: [--unsafe]
        files: ^mkdocs\.yml$
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-symlinks
      - id: check-case-conflict
      - id: debug-statements
        types: [python]
      - id: detect-private-key
        exclude: ^tests/
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: local
    hooks:
      - id: caddy-validate
        name: caddy validate (Caddyfile)
        entry: bash
        args: ["scripts/caddy-validate.sh"]
        language: system
        files: ^web/Caddyfile$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: no-em-dashes
        name: no em-dashes (U+2014)
        entry: uv
        args: [run, python, scripts/check_no_em_dashes.py]
        language: system
        types: [text]

      - id: no-redundant-timeout
        name: no redundant pytest.mark.timeout(30)
        entry: uv
        args: [run, python, scripts/check_no_redundant_timeout.py]
        language: system
        files: ^tests/.*\.py$

      - id: mypy
        name: mypy type-check (affected modules)
        entry: uv run python scripts/run_affected_mypy.py
        language: system
        files: ^(src/|tests/).*\.py$
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-unit
        name: pytest unit tests (affected modules)
        entry: uv run python scripts/run_affected_tests.py
        language: system
        files: ^(src/|tests/).*\.py$
        pass_filenames: false
        stages: [pre-push]

      - id: golangci-lint
        name: golangci-lint (CLI)
        entry: go -C cli tool golangci-lint run
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: go-vet
        name: go vet (CLI)
        entry: go -C cli vet ./...
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: go-test
        name: go test (CLI)
        entry: go -C cli test ./...
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-push]

      - id: eslint-web
        name: ESLint (web dashboard)
        entry: npm --prefix web run lint
        language: system
        files: ^web/src/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: forbidden-literals
        name: forbidden-literal gate (src/synthorg)
        entry: uv run python scripts/check_forbidden_literals.py
        language: system
        files: ^src/synthorg/.*\.py$
        pass_filenames: false
        stages: [pre-push]
