ci:
  autoupdate_schedule: never
  autofix_prs: true
  autofix_commit_msg: "style: auto-fix pre-commit hooks"
  skip: [commitizen, gitleaks, hadolint-docker, mypy, pytest-unit, golangci-lint, go-test]

default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(src/ai_company/templates/builtins/|mkdocs\.yml$)
      - id: check-yaml
        name: check-yaml (mkdocs, unsafe for !!python tags)
        args: [--unsafe]
        files: ^mkdocs\.yml$
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: local
    hooks:
      - id: mypy
        name: mypy type-check
        entry: uv run mypy src/ tests/
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-unit
        name: pytest unit tests
        entry: uv run pytest tests/ -m unit -n auto -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: golangci-lint
        name: golangci-lint (CLI)
        entry: bash -c 'cd cli && golangci-lint run'
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-push]

      - id: go-test
        name: go test (CLI)
        entry: bash -c 'cd cli && go test -race ./...'
        language: system
        files: ^cli/.*\.go$
        pass_filenames: false
        stages: [pre-push]
