map $http_x_forwarded_proto $x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Per-request CSP nonce. $request_id is nginx's built-in 128-bit (32-hex-char)
# pseudo-random identifier, generated per request from the worker's PRNG seeded
# at worker start. It provides the uniqueness CSP nonces require -- the CSP
# threat model for nonces is per-response unpredictability to attackers who do
# not observe prior responses, which 128 bits of entropy satisfies comfortably.
# It is NOT a CSPRNG-per-request value; if the nginx PRNG is ever downgraded
# this substitution should be revisited (consider $openssl_random_hex_16 in
# nginx >= 1.27.1 or a Lua-based hmac_sha1 nonce). The nonce is substituted
# into index.html via sub_filter below, read at runtime by web/src/lib/csp.ts,
# and propagated to CSPProvider (Base UI) + MotionConfig (Framer Motion) so
# every inline <style> tag carries the nonce.
map $request_id $csp_nonce {
    default $request_id;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip: serve pre-compressed .gz files built by Vite stage; fall back to
    # on-the-fly compression for anything not pre-compressed.
    # IMPORTANT: gzip_static is disabled for text/html (see /index.html + SPA
    # fallback locations below) so sub_filter can substitute the CSP nonce
    # placeholder. gzip_static serves the .gz file from disk verbatim and
    # bypasses response body filters -- if it were on for HTML, the literal
    # __CSP_NONCE__ placeholder would leak to any browser sending
    # Accept-Encoding: gzip, and CSP would block every injected <style>.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # CSP nonce injection. sub_filter substitutes the __CSP_NONCE__ placeholder
    # in index.html with the per-request nonce from the map above. Default
    # sub_filter_types already includes text/html, and sub_filter is inert on
    # any asset that doesn't contain the placeholder string.
    sub_filter '__CSP_NONCE__' '$csp_nonce';
    sub_filter_once off;

    # Security headers
    # NOTE: nginx does not inherit add_header directives from the server block
    # into location blocks that define their own add_header. If you add headers
    # to a location block, you must include the security-headers snippet there.
    include /etc/nginx/security-headers.conf;

    # Entry point -- always revalidate to pick up new hashed asset references.
    # gzip_static off here forces nginx to serve the source index.html (not
    # index.html.gz) so sub_filter runs and the __CSP_NONCE__ placeholder is
    # substituted before any downstream gzip compression.
    location = /index.html {
        gzip_static off;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Hashed static assets -- immutable, cache indefinitely
    # Vite outputs content-hashed filenames into assets/ (e.g., index-BxYz1234.js).
    # Deliberately does NOT include security-headers.conf: the asset responses
    # are immutable and cached for a year, so embedding a per-request CSP
    # nonce in their headers would pin a stale nonce into every cached copy.
    # The CSP policy only governs the document that loads these assets, so no
    # CSP header is needed on the asset responses themselves.
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # Cache-Control is deliberately NOT marked `always` -- we only want
        # the immutable, year-long cache policy applied to successful asset
        # responses. If nginx generates a 404 or 5xx for a missing asset
        # (e.g. during a bad deploy), we don't want that error response
        # pinned in the browser / CDN cache for a year.
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # MkDocs documentation -- static HTML, not part of the React SPA.
    # MAINTENANCE: headers are declared inline (not via include) because the CSP
    # must differ from security-headers.conf. If you add headers there, mirror
    # them here -- nginx does not inherit add_header across blocks.
    location /docs/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        # worker-src blob: -- MkDocs Material search creates inline Web Workers
        # via Blob URLs; unsafe-inline -- Material injects inline styles for
        # syntax highlighting and theme state.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri $uri/ =404;
    }

    # SPA routing -- try static files, fall back to index.html.
    # For any deep link (/agents, /tasks, etc.) nginx serves the SPA entry
    # document, so this location must apply the same CSP nonce substitution,
    # gzip_static-off, and no-cache policy as the explicit /index.html route.
    # Because this block adds its own add_header directives, the server-level
    # security-headers include does NOT inherit -- we must re-include it here.
    location / {
        gzip_static off;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Non-CSP security headers snippet for proxied /api* locations.  We
    # cannot include security-headers.conf directly here because it also
    # emits the SPA's nonce-bearing Content-Security-Policy, and we want
    # the backend's own CSP (via synthorg.api.middleware) to pass through
    # verbatim on /api/ responses.  This partial mirrors the non-CSP
    # subset so nginx-generated errors (502/504/timeout) on proxied
    # locations still carry the full hardening set.
    #
    # MAINTENANCE: keep the directives below in sync with the non-CSP
    # lines in security-headers.conf.  The CSP is intentionally omitted.

    # WebSocket proxy -- MUST be before generic /api/ block.
    location /api/v1/ws {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 3600s;
        # Non-CSP security headers -- re-declared so nginx-generated error
        # responses on this proxy path still carry them (add_header does
        # not inherit into a location that defines its own add_header).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # Pass the backend's own Content-Security-Policy verbatim instead of
        # layering the dashboard's nonce-bearing CSP on top of it.  Note:
        # when nginx itself generates an error response (502/504/timeout
        # before the upstream replies), $upstream_http_content_security_policy
        # is empty and no CSP header is emitted on that response.  This is
        # acceptable because /api/* responses are JSON (not HTML), and the
        # other hardening headers above (X-Content-Type-Options,
        # X-Frame-Options, Referrer-Policy, Permissions-Policy, HSTS) are
        # still applied to the error response via their own add_header lines.
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy $upstream_http_content_security_policy always;
        # Suppress access logs to avoid recording JWT query parameter
        access_log off;
    }

    # API proxy to backend service.
    # Same CSP pass-through rationale as /api/v1/ws above -- do not wrap
    # backend JSON responses with the SPA's nonce CSP.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        # Non-CSP security headers -- re-declared so nginx-generated error
        # responses on this proxy path still carry them.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy $upstream_http_content_security_policy always;
    }
}
