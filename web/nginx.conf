map $http_x_forwarded_proto $x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip: serve pre-compressed .gz files built by Vite stage; fall back to
    # on-the-fly compression for anything not pre-compressed.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Security headers
    # NOTE: nginx does not inherit add_header directives from the server block
    # into location blocks that define their own add_header. If you add headers
    # to a location block, you must repeat these security headers there too.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # style-src 'unsafe-inline' required by PrimeVue which injects dynamic inline styles.
    # connect-src 'self' covers same-origin ws:/wss: in modern browsers (Chrome 73+, Firefox 45+).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # SPA routing -- try static files, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy -- MUST be before generic /api/ block
    location /api/v1/ws {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 3600s;
        # Suppress access logs to avoid recording JWT query parameter
        access_log off;
    }

    # API proxy to backend service
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
    }
}
