# Shared security headers -- included in every context that defines its own
# add_header directives (nginx does not inherit add_header from parent blocks).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
# CSP style sources use Level 3 directive splitting with a Level 2 fallback.
# Modern browsers honor style-src-elem / style-src-attr and IGNORE style-src for
# those contexts. Browsers that do not implement the split directives fall back
# to style-src.
#   style-src      'self' 'nonce-...' 'unsafe-inline'
#                             -- Level 2 fallback. 'nonce-...' is honored by
#                                nonce-aware browsers; 'unsafe-inline' covers
#                                older browsers that do not understand the
#                                split directives and still need Floating UI
#                                inline style attributes to render popovers.
#   style-src-elem 'self' 'nonce-...'
#                             -- locks <style> elements in modern browsers to
#                                the per-request nonce.
#   style-src-attr 'unsafe-inline'
#                             -- required by Floating UI (used internally by
#                                Base UI) for positioning, because inline style
#                                attributes cannot carry CSP nonces per the CSS
#                                spec. Not a practical XSS vector -- style
#                                attributes cannot execute JavaScript.
# connect-src 'self' covers same-origin ws: (http) or wss: (https) matching the page scheme. Never mix schemes.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'nonce-$csp_nonce' 'unsafe-inline'; style-src-elem 'self' 'nonce-$csp_nonce'; style-src-attr 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
# preload omitted intentionally -- not submitted to HSTS preload list (irreversible).
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
