# Shared security headers -- included in every context that defines its own
# add_header directives (nginx does not inherit add_header from parent blocks).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
# style-src 'unsafe-inline' required by UI libraries (Radix, Framer Motion) that inject dynamic inline styles.
# connect-src 'self' covers same-origin ws: (http) or wss: (https) matching the page scheme. Never mix schemes.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
# preload omitted intentionally -- not submitted to HSTS preload list (irreversible).
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
