# SynthOrg web image -- pure apko, no Dockerfile wrapper.
# Produces: ghcr.io/aureliolo/synthorg-web
#
# Contents:
#   - caddy (Wolfi package, static binary, memory-safe Go)
#   - ca-certificates-bundle, tzdata
#   - synthorg-web-assets (melange-built apk from docker/web/melange.yaml,
#     carrying the Vite SPA bundle, zensical docs output, pre-gzipped siblings,
#     and the Caddyfile)
#
# synthorg-web-assets is not on the Wolfi public repo -- apko resolves it from
# the workflow-local apk repository that build-web-assets publishes to. See
# .github/workflows/docker.yml.

contents:
  repositories:
    - https://packages.wolfi.dev/os
    - '@local /work/packages'
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - /work/melange.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - caddy
    - synthorg-web-assets@local

accounts:
  groups:
    - groupname: caddy
      gid: 65532
  users:
    - username: caddy
      uid: 65532
      gid: 65532
  run-as: "65532"

paths:
  - path: /config/caddy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /data/caddy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

environment:
  PATH: /usr/sbin:/usr/bin:/sbin:/bin
  XDG_CONFIG_HOME: /config
  XDG_DATA_HOME: /data

archs:
  - x86_64

entrypoint:
  command: /usr/bin/caddy run --config /etc/synthorg/Caddyfile --adapter caddyfile

annotations:
  org.opencontainers.image.title: synthorg-web
  org.opencontainers.image.description: SynthOrg web dashboard served by Caddy on a pure-apko Wolfi image
  org.opencontainers.image.url: https://github.com/Aureliolo/synthorg
  org.opencontainers.image.source: https://github.com/Aureliolo/synthorg
  org.opencontainers.image.licenses: BUSL-1.1
  org.opencontainers.image.vendor: Aureliolo
