# SynthOrg sandbox base image -- Wolfi, composed by apko.
# Produces: ghcr.io/aureliolo/synthorg-sandbox-base
# Consumed by: docker/sandbox/Dockerfile (thin FROM wrapper).
#
# Non-distroless on purpose: keeps busybox + git for agent code execution.
# Network enforcement is handled by the sidecar proxy (docker/sidecar/),
# not by the sandbox container.
#
# UID 10001 is the unprivileged sandbox user (cap_drop: ALL).

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - busybox
    - git
    - nodejs-25
    - npm
    - python-3.14

accounts:
  groups:
    - groupname: sandbox
      gid: 10001
  users:
    - username: sandbox
      uid: 10001
      gid: 10001
  run-as: "10001"

paths:
  - path: /workspace
    type: directory
    uid: 10001
    gid: 10001
    permissions: 0o755

environment:
  PATH: /usr/sbin:/usr/bin:/sbin:/bin
  PYTHONUNBUFFERED: "1"

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.title: synthorg-sandbox-base
  org.opencontainers.image.description: Wolfi-based apko-composed base for synthorg-sandbox
  org.opencontainers.image.url: https://github.com/Aureliolo/synthorg
  org.opencontainers.image.source: https://github.com/Aureliolo/synthorg
  org.opencontainers.image.licenses: BUSL-1.1
  org.opencontainers.image.vendor: Aureliolo
