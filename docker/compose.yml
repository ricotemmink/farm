x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    # renovate: datasource=docker depName=dhi.io/postgres
    image: dhi.io/postgres:18-debian13@sha256:e2f2beada5e76f69453d5533153909f875b48fb021f092df73e182b8325ff2d3
    ports:
      - "${POSTGRES_PORT:-3002}:5432"
    volumes:
      - synthorg-pgdata:/var/lib/postgresql/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: synthorg
      POSTGRES_USER: synthorg
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
      - /run/postgresql:noexec,nosuid,nodev,size=8m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
          pids: 128
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "synthorg", "-d", "synthorg"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    logging: *logging

  # Init container: chown named volumes to the correct non-root UID per service.
  # Fresh Docker named volumes are root-owned; DHI images run as non-root and
  # cannot self-chown, so this one-shot container sets ownership on first start.
  #   /data      -> 65532 (backend)    /pgdata -> 70 (postgres)
  #   /nats-data -> 65532 (nats)
  data-init:
    # renovate: datasource=docker depName=busybox
    image: busybox:1.37-musl@sha256:19b646668802469d968a05342a601e78da4322a414a7c09b1c9ee25165042138
    volumes:
      - synthorg-data:/data
      - synthorg-pgdata:/pgdata
      - synthorg-nats-data:/nats-data
    command: ["sh", "-c", "set -e; mkdir -p /data/logs /data/memory; chown -R 65532:65532 /data; chown -R 70:70 /pgdata; chmod 0700 /pgdata; chown -R 65532:65532 /nats-data"]
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - synthorg-data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Only set values that are deployment-specific (DB URL, bus
      # backend, NATS URL, memory/log dirs, log level, third-party
      # telemetry toggles). SYNTHORG_HOST / SYNTHORG_PORT / UVICORN_HOST
      # / UVICORN_PORT already carry correct defaults from the image
      # ENV (see docker/backend/Dockerfile); setting them here just
      # duplicates the baseline without offering operator control that
      # docker-compose run-time env files do not already provide.
      SYNTHORG_DATABASE_URL: "postgresql://synthorg:${POSTGRES_PASSWORD}@postgres:5432/synthorg"
      # Local docker-network postgres runs plaintext inside the bridge.
      # For production, override to `verify-full` with proper certs.
      SYNTHORG_POSTGRES_SSL_MODE: "disable"
      SYNTHORG_MEMORY_DIR: "/data/memory"
      SYNTHORG_PERSISTENCE_BACKEND: "postgres"
      SYNTHORG_BUS_BACKEND: "${SYNTHORG_BUS_BACKEND:-nats}"
      SYNTHORG_NATS_URL: "${SYNTHORG_NATS_URL:-nats://nats:4222}"
      SYNTHORG_LOG_DIR: "${SYNTHORG_LOG_DIR:-/data/logs}"
      SYNTHORG_LOG_LEVEL: "${SYNTHORG_LOG_LEVEL:-info}"
      MEM0_TELEMETRY: "${MEM0_TELEMETRY:-false}"
    # Image sets USER 65532 in the Dockerfile; no compose override
    # needed.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
          pids: 256
    logging: *logging

  web:
    image: ghcr.io/aureliolo/synthorg-web:${SYNTHORG_IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    # apko sets run-as: "65532" in docker/web/apko.yaml; no compose
    # override needed.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
      - /config/caddy:noexec,nosuid,nodev,size=8m
      - /data/caddy:noexec,nosuid,nodev,size=16m
    healthcheck:
      # Caddy serves a plain "ok" 200 at /healthz; wget is installed in
      # the apko image specifically for this probe. Target 127.0.0.1 to
      # avoid pulling in external DNS resolution.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    logging: *logging

  # DHI NATS JetStream (distributed message bus + task queue).
  # DHI image is distroless (no shell/wget) -- healthcheck via sidecar.
  # Configuration via bind-mounted nats.conf -- NATS 2.12 has no
  # --max_payload CLI flag, so non-default settings need a config file.
  nats:
    # renovate: datasource=docker depName=dhi.io/nats
    image: dhi.io/nats:2.12-debian13@sha256:45876e0c090615cf847129ace248649d7da79b40c5863b321493e5970e0eec4f
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "${NATS_CLIENT_PORT:-3003}:4222"
    volumes:
      - synthorg-nats-data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    depends_on:
      data-init:
        condition: service_completed_successfully
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    logging: *logging

  # NATS health is surfaced via the backend's /api/v1/readyz endpoint.
  # `NatsBus.health_check` performs a live PING/PONG round-trip, so
  # shipping a busybox sidecar purely to produce a green dot in
  # `docker ps` added a container for zero dependency value -- nothing
  # in compose ever consumed the sidecar's `service_healthy` state.

  # Fine-tuning sidecar (~4 GB GPU variant / ~1.7 GB CPU-only).
  #
  # Enable by applying one of the overlays:
  #   docker compose -f docker/compose.yml \
  #     -f docker/compose.fine-tuning-gpu.yml up  # NVIDIA GPU + driver required
  #   docker compose -f docker/compose.yml \
  #     -f docker/compose.fine-tuning-cpu.yml up  # slower, runs anywhere
  #
  # Each overlay defines the full fine-tune service with its image
  # reference, security, and resource limits. The image tags are
  # digest-pinned by Renovate (see the 'renovate:' comments in the
  # overlay files) so operators stay on a known-verified image.

networks:
  default:
    name: synthorg-net

volumes:
  synthorg-data:
  synthorg-pgdata:
  synthorg-nats-data:
