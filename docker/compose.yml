x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    # Default port 3001 avoids collision with vLLM's default (8000).
    # Override with BACKEND_PORT env var.  If co-hosting vLLM, expose
    # it on a different host port (e.g. -p 5000:8000 for vLLM).
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - synthorg-data:/data
    env_file: .env
    environment:
      SYNTHORG_HOST: "${SYNTHORG_HOST:-0.0.0.0}"
      SYNTHORG_PORT: "${SYNTHORG_PORT:-3001}"
      SYNTHORG_DB_PATH: "/data/synthorg.db"
      SYNTHORG_MEMORY_DIR: "/data/memory"
      SYNTHORG_LOG_DIR: "${SYNTHORG_LOG_DIR:-/data/logs}"
      SYNTHORG_LOG_LEVEL: "${SYNTHORG_LOG_LEVEL:-info}"
      # Disable Mem0 telemetry by default. Override in .env to enable.
      MEM0_TELEMETRY: "${MEM0_TELEMETRY:-false}"
      # Bridge SYNTHORG_* to uvicorn's native env vars (exec form CMD, no shell)
      UVICORN_HOST: "${SYNTHORG_HOST:-0.0.0.0}"
      UVICORN_PORT: "${SYNTHORG_PORT:-3001}"
      # Message bus backend. Default is the in-process bus. To route
      # through the NATS JetStream service also apply the overlay file
      # docker/compose.distributed.yml, which sets
      # `SYNTHORG_BUS_BACKEND=nats` and wires `depends_on` -- compose
      # profiles alone only control which services start, not how
      # already-defined services are configured.
      SYNTHORG_BUS_BACKEND: "${SYNTHORG_BUS_BACKEND:-internal}"
      SYNTHORG_NATS_URL: "${SYNTHORG_NATS_URL:-nats://nats:4222}"
    user: "65532:65532"
    # CIS Docker Benchmark v1.6.0 hardening (5.3, 5.12, 5.25, 5.28)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
          pids: 256
    logging: *logging

  # NATS JetStream service for the distributed message bus + task queue.
  # Opt in with `docker compose --profile distributed up`. See
  # docs/design/distributed-runtime.md for the migration path and config.
  #
  # Host port layout (kept contiguous with the other services):
  #   3000  web
  #   3001  backend
  #   3002  reserved for the future database backend (parallel work)
  #   3003  NATS client (this service) -> container 4222
  #
  # Monitoring (container 8222) is intentionally NOT mapped to a host
  # port.  Use `docker compose exec nats wget -qO- localhost:8222/varz`
  # or a compose override file if you need external access.
  nats:
    image: nats:2.12.6-alpine@sha256:1cfc36e2e5e638243d8c722f72c954cd0ec4b15ee82fadbc718ce12e2b3c1652
    profiles: ["distributed"]
    # `--max_payload 4MB` aligns the server cap with
    # `_MAX_BUS_PAYLOAD_BYTES` in `src/synthorg/communication/bus/nats.py`
    # so client-side accepted sizes actually publish instead of being
    # rejected by the default 1MB server limit.
    command: ["-js", "-sd", "/data", "-m", "8222", "--max_payload", "4MB"]
    ports:
      - "${NATS_CLIENT_PORT:-3003}:4222"
    volumes:
      - synthorg-nats-data:/data
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging: *logging

  web:
    image: ghcr.io/aureliolo/synthorg-web:${SYNTHORG_IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=16m
      - /config/caddy:noexec,nosuid,nodev,size=8m
      - /data/caddy:noexec,nosuid,nodev,size=16m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    logging: *logging

networks:
  default:
    name: synthorg-net

volumes:
  synthorg-data:
  synthorg-nats-data:
