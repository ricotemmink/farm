# SynthOrg sidecar base image -- Wolfi, composed by apko.
# Produces: ghcr.io/aureliolo/synthorg-sidecar-base
# Consumed by: docker/sidecar/Dockerfile (thin FROM wrapper).
#
# Includes iptables for DNAT transparent proxy setup and busybox
# for HEALTHCHECK wget. UID 10002 must not collide with sandbox
# UID 10001.

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - iptables
    - busybox

accounts:
  groups:
    - groupname: sidecar
      gid: 10002
  users:
    - username: sidecar
      uid: 10002
      gid: 10002
  # Non-root: iptables DNAT + SO_ORIGINAL_DST require CAP_NET_ADMIN,
  # not UID 0. The container runtime grants NET_ADMIN via cap_add
  # (cap_drop: ALL + cap_add: NET_ADMIN + read_only rootfs).
  run-as: "10002"

paths:
  - path: /tmp
    type: directory
    uid: 10002
    gid: 10002
    permissions: 0o1777

environment:
  PATH: /usr/sbin:/usr/bin:/sbin:/bin

archs:
  - x86_64
  - aarch64

annotations:
  org.opencontainers.image.title: synthorg-sidecar-base
  org.opencontainers.image.description: Wolfi-based apko-composed base for synthorg-sidecar
  org.opencontainers.image.url: https://github.com/Aureliolo/synthorg
  org.opencontainers.image.source: https://github.com/Aureliolo/synthorg
  org.opencontainers.image.licenses: BUSL-1.1
  org.opencontainers.image.vendor: Aureliolo
