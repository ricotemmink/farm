# Local development overrides.
# NOT auto-merged when using -f: include explicitly with:
#   docker compose -f docker/compose.yml -f docker/compose.override.yml up
#
# Enabling the sandbox overlay mounts the host's Docker socket on the
# backend container so DockerSandbox (aiodocker) can spawn ephemeral
# per-execution sandbox containers. This mirrors the CLI-generated
# compose layout produced by `synthorg init --sandbox true`.
#
# WARNING: Mounting the Docker socket gives the container full control
# over the Docker daemon. Only enable in trusted development environments.
services:
  backend:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Supplementary group must match the host GID owning /var/run/docker.sock
    # so the non-root backend user (65532) can access the mounted socket.
    # Default 999 is the common Docker Desktop / Debian docker group; override
    # with `SYNTHORG_DOCKER_GID=$(stat -c %g /var/run/docker.sock)` when it
    # differs on your host.
    group_add:
      - "${SYNTHORG_DOCKER_GID:-999}"
    environment:
      SYNTHORG_SANDBOX_IMAGE: "${SYNTHORG_SANDBOX_IMAGE:-ghcr.io/aureliolo/synthorg-sandbox:latest}"
