blueprint:
  name: "code-review-pipeline"
  display_name: "Code Review Pipeline"
  description: >-
    A multi-stage code review pipeline with automated checks,
    peer review via agent assignment, and a quality gate that
    branches to approve or revision.
  workflow_type: "sequential_pipeline"
  tags:
    - "review"
    - "quality"
    - "pipeline"

  nodes:
    - id: "start"
      type: "start"
      label: "Start"
      position_x: 0.0
      position_y: 200.0

    - id: "task-static-analysis"
      type: "task"
      label: "Static Analysis"
      position_x: 200.0
      position_y: 200.0
      config:
        title: "Run static analysis and linters"
        task_type: "development"
        priority: "high"
        complexity: "simple"

    - id: "task-unit-tests"
      type: "task"
      label: "Unit Tests"
      position_x: 400.0
      position_y: 200.0
      config:
        title: "Run unit test suite"
        task_type: "development"
        priority: "high"
        complexity: "simple"

    - id: "assign-reviewer"
      type: "agent_assignment"
      label: "Assign Reviewer"
      position_x: 600.0
      position_y: 200.0
      config:
        routing_strategy: "role_filter"
        role_filter: "senior"

    - id: "task-peer-review"
      type: "task"
      label: "Peer Review"
      position_x: 800.0
      position_y: 200.0
      config:
        title: "Perform peer code review"
        task_type: "review"
        priority: "high"
        complexity: "medium"

    - id: "cond-quality"
      type: "conditional"
      label: "Quality Gate"
      position_x: 1000.0
      position_y: 200.0
      config:
        condition_expression: "review_passed == true"

    - id: "task-approve"
      type: "task"
      label: "Approve"
      position_x: 1200.0
      position_y: 100.0
      config:
        title: "Approve and merge"
        task_type: "admin"
        priority: "medium"
        complexity: "simple"

    - id: "task-revision"
      type: "task"
      label: "Revision"
      position_x: 1200.0
      position_y: 320.0
      config:
        title: "Address review feedback"
        task_type: "development"
        priority: "high"
        complexity: "medium"

    - id: "end"
      type: "end"
      label: "End"
      position_x: 1400.0
      position_y: 200.0

  edges:
    - id: "e-start-static"
      source_node_id: "start"
      target_node_id: "task-static-analysis"
      type: "sequential"

    - id: "e-static-tests"
      source_node_id: "task-static-analysis"
      target_node_id: "task-unit-tests"
      type: "sequential"

    - id: "e-tests-assign"
      source_node_id: "task-unit-tests"
      target_node_id: "assign-reviewer"
      type: "sequential"

    - id: "e-assign-review"
      source_node_id: "assign-reviewer"
      target_node_id: "task-peer-review"
      type: "sequential"

    - id: "e-review-quality"
      source_node_id: "task-peer-review"
      target_node_id: "cond-quality"
      type: "sequential"

    - id: "e-quality-approve"
      source_node_id: "cond-quality"
      target_node_id: "task-approve"
      type: "conditional_true"

    - id: "e-quality-revision"
      source_node_id: "cond-quality"
      target_node_id: "task-revision"
      type: "conditional_false"

    - id: "e-approve-end"
      source_node_id: "task-approve"
      target_node_id: "end"
      type: "sequential"

    - id: "e-revision-end"
      source_node_id: "task-revision"
      target_node_id: "end"
      type: "sequential"
