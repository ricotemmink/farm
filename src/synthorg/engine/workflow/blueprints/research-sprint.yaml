blueprint:
  name: "research-sprint"
  display_name: "Research Sprint"
  description: >-
    A parallel research workflow where multiple investigation tracks
    run simultaneously. After scoping, three research tracks fan out
    via a parallel split, then converge for synthesis.
  workflow_type: "parallel_execution"
  tags:
    - "research"
    - "parallel"
    - "exploration"

  nodes:
    - id: "start"
      type: "start"
      label: "Start"
      position_x: 0.0
      position_y: 200.0

    - id: "task-scope"
      type: "task"
      label: "Define Scope"
      position_x: 200.0
      position_y: 200.0
      config:
        title: "Define research scope and questions"
        task_type: "research"
        priority: "high"
        complexity: "medium"

    - id: "split"
      type: "parallel_split"
      label: "Fan Out"
      position_x: 400.0
      position_y: 200.0
      config:
        max_concurrency: 3

    - id: "task-track-a"
      type: "task"
      label: "Track A"
      position_x: 600.0
      position_y: 60.0
      config:
        title: "Research track A"
        task_type: "research"
        priority: "medium"
        complexity: "medium"

    - id: "task-track-b"
      type: "task"
      label: "Track B"
      position_x: 600.0
      position_y: 200.0
      config:
        title: "Research track B"
        task_type: "research"
        priority: "medium"
        complexity: "medium"

    - id: "task-track-c"
      type: "task"
      label: "Track C"
      position_x: 600.0
      position_y: 340.0
      config:
        title: "Research track C"
        task_type: "research"
        priority: "medium"
        complexity: "medium"

    - id: "join"
      type: "parallel_join"
      label: "Converge"
      position_x: 800.0
      position_y: 200.0
      config:
        join_strategy: "all"

    - id: "task-synthesize"
      type: "task"
      label: "Synthesize"
      position_x: 1000.0
      position_y: 200.0
      config:
        title: "Synthesize findings from all tracks"
        task_type: "research"
        priority: "high"
        complexity: "complex"

    - id: "end"
      type: "end"
      label: "End"
      position_x: 1200.0
      position_y: 200.0

  edges:
    - id: "e-start-scope"
      source_node_id: "start"
      target_node_id: "task-scope"
      type: "sequential"

    - id: "e-scope-split"
      source_node_id: "task-scope"
      target_node_id: "split"
      type: "sequential"

    - id: "e-split-a"
      source_node_id: "split"
      target_node_id: "task-track-a"
      type: "parallel_branch"

    - id: "e-split-b"
      source_node_id: "split"
      target_node_id: "task-track-b"
      type: "parallel_branch"

    - id: "e-split-c"
      source_node_id: "split"
      target_node_id: "task-track-c"
      type: "parallel_branch"

    - id: "e-a-join"
      source_node_id: "task-track-a"
      target_node_id: "join"
      type: "sequential"

    - id: "e-b-join"
      source_node_id: "task-track-b"
      target_node_id: "join"
      type: "sequential"

    - id: "e-c-join"
      source_node_id: "task-track-c"
      target_node_id: "join"
      type: "sequential"

    - id: "e-join-synthesize"
      source_node_id: "join"
      target_node_id: "task-synthesize"
      type: "sequential"

    - id: "e-synthesize-end"
      source_node_id: "task-synthesize"
      target_node_id: "end"
      type: "sequential"
