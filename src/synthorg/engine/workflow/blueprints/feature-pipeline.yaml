blueprint:
  name: "feature-pipeline"
  display_name: "Feature Pipeline"
  description: >-
    A sequential pipeline for building features end-to-end: design,
    implement, review, test, and deploy. Ideal for well-scoped feature
    work with clear acceptance criteria.
  workflow_type: "sequential_pipeline"
  tags:
    - "development"
    - "pipeline"
    - "feature"

  nodes:
    - id: "start"
      type: "start"
      label: "Start"
      position_x: 0.0
      position_y: 200.0

    - id: "task-design"
      type: "task"
      label: "Design"
      position_x: 200.0
      position_y: 200.0
      config:
        title: "Design the feature"
        task_type: "design"
        priority: "medium"
        complexity: "medium"

    - id: "task-implement"
      type: "task"
      label: "Implement"
      position_x: 400.0
      position_y: 200.0
      config:
        title: "Implement the feature"
        task_type: "development"
        priority: "high"
        complexity: "medium"

    - id: "task-review"
      type: "task"
      label: "Code Review"
      position_x: 600.0
      position_y: 200.0
      config:
        title: "Review implementation"
        task_type: "review"
        priority: "high"
        complexity: "simple"

    - id: "task-test"
      type: "task"
      label: "Test"
      position_x: 800.0
      position_y: 200.0
      config:
        title: "Run test suite"
        task_type: "development"
        priority: "high"
        complexity: "simple"

    - id: "task-deploy"
      type: "task"
      label: "Deploy"
      position_x: 1000.0
      position_y: 200.0
      config:
        title: "Deploy to production"
        task_type: "admin"
        priority: "high"
        complexity: "simple"

    - id: "end"
      type: "end"
      label: "End"
      position_x: 1200.0
      position_y: 200.0

  edges:
    - id: "e-start-design"
      source_node_id: "start"
      target_node_id: "task-design"
      type: "sequential"

    - id: "e-design-implement"
      source_node_id: "task-design"
      target_node_id: "task-implement"
      type: "sequential"

    - id: "e-implement-review"
      source_node_id: "task-implement"
      target_node_id: "task-review"
      type: "sequential"

    - id: "e-review-test"
      source_node_id: "task-review"
      target_node_id: "task-test"
      type: "sequential"

    - id: "e-test-deploy"
      source_node_id: "task-test"
      target_node_id: "task-deploy"
      type: "sequential"

    - id: "e-deploy-end"
      source_node_id: "task-deploy"
      target_node_id: "end"
      type: "sequential"
