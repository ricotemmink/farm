blueprint:
  name: "bug-fix-flow"
  display_name: "Bug Fix Flow"
  description: >-
    A bug fix workflow with conditional severity routing. After triage,
    a severity check branches between a hotfix path (critical bugs)
    and a normal fix path. Both converge for testing and review.
  workflow_type: "sequential_pipeline"
  tags:
    - "development"
    - "bugfix"
    - "conditional"

  nodes:
    - id: "start"
      type: "start"
      label: "Start"
      position_x: 0.0
      position_y: 200.0

    - id: "task-triage"
      type: "task"
      label: "Triage"
      position_x: 200.0
      position_y: 200.0
      config:
        title: "Triage the bug report"
        task_type: "research"
        priority: "high"
        complexity: "simple"

    - id: "cond-severity"
      type: "conditional"
      label: "Severity Check"
      position_x: 400.0
      position_y: 200.0
      config:
        condition_expression: "severity == critical"

    - id: "task-hotfix"
      type: "task"
      label: "Hotfix"
      position_x: 600.0
      position_y: 80.0
      config:
        title: "Apply emergency hotfix"
        task_type: "development"
        priority: "critical"
        complexity: "medium"

    - id: "task-normal-fix"
      type: "task"
      label: "Normal Fix"
      position_x: 600.0
      position_y: 320.0
      config:
        title: "Implement standard fix"
        task_type: "development"
        priority: "medium"
        complexity: "medium"

    - id: "task-test"
      type: "task"
      label: "Test"
      position_x: 800.0
      position_y: 200.0
      config:
        title: "Verify the fix"
        task_type: "development"
        priority: "high"
        complexity: "simple"

    - id: "task-review"
      type: "task"
      label: "Review"
      position_x: 1000.0
      position_y: 200.0
      config:
        title: "Review the fix"
        task_type: "review"
        priority: "high"
        complexity: "simple"

    - id: "end"
      type: "end"
      label: "End"
      position_x: 1200.0
      position_y: 200.0

  edges:
    - id: "e-start-triage"
      source_node_id: "start"
      target_node_id: "task-triage"
      type: "sequential"

    - id: "e-triage-severity"
      source_node_id: "task-triage"
      target_node_id: "cond-severity"
      type: "sequential"

    - id: "e-severity-hotfix"
      source_node_id: "cond-severity"
      target_node_id: "task-hotfix"
      type: "conditional_true"

    - id: "e-severity-normal"
      source_node_id: "cond-severity"
      target_node_id: "task-normal-fix"
      type: "conditional_false"

    - id: "e-hotfix-test"
      source_node_id: "task-hotfix"
      target_node_id: "task-test"
      type: "sequential"

    - id: "e-normal-test"
      source_node_id: "task-normal-fix"
      target_node_id: "task-test"
      type: "sequential"

    - id: "e-test-review"
      source_node_id: "task-test"
      target_node_id: "task-review"
      type: "sequential"

    - id: "e-review-end"
      source_node_id: "task-review"
      target_node_id: "end"
      type: "sequential"
