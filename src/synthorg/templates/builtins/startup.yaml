template:
  name: "Tech Startup"
  description: "Small team for building MVPs and prototypes"
  version: "1.0.0"
  min_agents: 3
  max_agents: 5
  tags:
    - "startup"
    - "mvp"
    - "small-team"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Startup Co"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 50.0

  company:
    type: "startup"
    budget_monthly: {{ budget | default(50.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "executive"
      budget_percent: 20
      head_role: "CEO"
      reporting_lines:
        - subordinate: "CTO"
          supervisor: "CEO"
    - name: "engineering"
      budget_percent: 60
      head_role: "CTO"
      reporting_lines:
        - subordinate: "Full-Stack Developer"
          subordinate_id: "fullstack-senior"
          supervisor: "CTO"
        - subordinate: "Full-Stack Developer"
          subordinate_id: "fullstack-mid"
          supervisor: "CTO"
    - name: "product"
      budget_percent: 20
      head_role: "Product Manager"

  agents:
    - role: "CEO"
      name: ""
      level: "c_suite"
      model: "large"
      personality_preset: "visionary_leader"
      department: "executive"
    - role: "CTO"
      name: ""
      level: "c_suite"
      model: "large"
      personality_preset: "rapid_prototyper"
      department: "executive"
    - role: "Full-Stack Developer"
      name: ""
      merge_id: "fullstack-senior"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Full-Stack Developer"
      name: ""
      merge_id: "fullstack-mid"
      level: "mid"
      model: "small"
      personality_preset: "team_diplomat"
      department: "engineering"
    - role: "Product Manager"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "strategic_planner"
      department: "product"

  workflow: "agile_kanban"
  communication: "hybrid"

  workflow_handoffs:
    - from_department: "engineering"
      to_department: "product"
      trigger: "Feature implementation completed for product review"
      artifacts:
        - "pull_request"
        - "release_notes"

  escalation_paths:
    - from_department: "engineering"
      to_department: "executive"
      condition: "Technical blocker requiring executive decision"
      priority_boost: 1
    - from_department: "product"
      to_department: "executive"
      condition: "Scope or priority conflict needing CEO resolution"
      priority_boost: 1
