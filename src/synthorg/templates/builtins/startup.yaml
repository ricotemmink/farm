template:
  name: "Tech Startup"
  description: >-
    A five-agent team oriented around shipping MVPs quickly. CEO and
    CTO lead directly, with two full-stack developers and a product
    manager iterating in agile sprints. Semi-autonomous with hybrid
    communication for fast decision-making.
  version: "1.0.0"
  min_agents: 3
  max_agents: 5
  tags:
    - "startup"
    - "mvp"
    - "small-team"
    - "agile"
    - "iterative"
    - "lean"
  skill_patterns:
    - "tool_wrapper"
    - "generator"
    - "pipeline"
  extends: "solo_founder"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Startup Co"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 50.0
    - name: "sprint_length"
      description: "Sprint duration in days"
      var_type: "int"
      default: 7
    - name: "wip_limit"
      description: "Work-in-progress limit per column"
      var_type: "int"
      default: 3

  company:
    type: "startup"
    budget_monthly: {{ budget | default(50.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "executive"
      budget_percent: 20
      head_role: "CEO"
      reporting_lines:
        - subordinate: "CTO"
          supervisor: "CEO"
    - name: "engineering"
      budget_percent: 60
      head_role: "CTO"
      reporting_lines:
        - subordinate: "Full-Stack Developer"
          subordinate_id: "fullstack-senior"
          supervisor: "CTO"
        - subordinate: "Full-Stack Developer"
          subordinate_id: "fullstack-mid"
          supervisor: "CTO"
    - name: "product"
      budget_percent: 20
      head_role: "Product Manager"

  agents:
    # Override parent's Full-Stack Developer: change personality
    - role: "Full-Stack Developer"
      name: ""
      merge_id: "fullstack-senior"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    # New agents
    - role: "CTO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "rapid_prototyper"
      department: "executive"
    - role: "Full-Stack Developer"
      name: ""
      merge_id: "fullstack-mid"
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "team_diplomat"
      department: "engineering"
    - role: "Product Manager"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "strategic_planner"
      department: "product"

  workflow: "agile_kanban"
  communication: "hybrid"

  workflow_config:
    kanban:
      wip_limits:
        - column: "in_progress"
          limit: {{ wip_limit | default(3) }}
        - column: "review"
          limit: 2
      enforce_wip: true
    sprint:
      duration_days: {{ sprint_length | default(7) }}
      ceremonies:
        - name: "sprint_planning"
          protocol: "structured_phases"
          frequency: "weekly"
        - name: "sprint_review"
          protocol: "round_robin"
          frequency: "weekly"

  workflow_handoffs:
    - from_department: "engineering"
      to_department: "product"
      trigger: "Feature implementation completed for product review"
      artifacts:
        - "pull_request"
        - "release_notes"

  escalation_paths:
    - from_department: "engineering"
      to_department: "executive"
      condition: "Technical blocker requiring executive decision"
      priority_boost: 1
    - from_department: "product"
      to_department: "executive"
      condition: "Scope or priority conflict needing CEO resolution"
      priority_boost: 1
