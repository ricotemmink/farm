template:
  name: "Agency"
  description: >-
    A client-services organization with project management, creative,
    and delivery roles under supervised autonomy. Client deliverables
    flow through a structured pipeline with quality review at each
    checkpoint before handoff.
  version: "1.0.0"
  min_agents: 10
  max_agents: 15
  tags:
    - "agency"
    - "client-management"
    - "project-management"
    - "creative"
    - "multi-project"
    - "supervised"
  skill_patterns:
    - "pipeline"
    - "generator"
    - "reviewer"

  variables:
    - name: "company_name"
      description: "Name of your agency"
      default: "Creative Agency"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 100.0
    - name: "wip_limit"
      description: "Work-in-progress limit per column"
      var_type: "int"
      default: 3

  company:
    type: "agency"
    budget_monthly: {{ budget | default(100.0) }}
    autonomy:
      level: "supervised"

  departments:
    - name: "operations"
      budget_percent: 20
      head_role: "Project Manager"
      policies:
        approval_chains:
          - action_type: "client_approval"
            approvers:
              - "Project Manager"
      reporting_lines:
        - subordinate: "Product Manager"
          supervisor: "Project Manager"
        - subordinate: "Scrum Master"
          supervisor: "Project Manager"
    - name: "engineering"
      budget_percent: 35
      head_role: "Full-Stack Developer"
      head_merge_id: "fullstack-senior"
      policies:
        review_requirements:
          min_reviewers: 1
      reporting_lines:
        - subordinate: "Frontend Developer"
          supervisor: "Full-Stack Developer"
          supervisor_id: "fullstack-senior"
        - subordinate: "Backend Developer"
          supervisor: "Full-Stack Developer"
          supervisor_id: "fullstack-senior"
        - subordinate: "Full-Stack Developer"
          subordinate_id: "fullstack-mid"
          supervisor: "Full-Stack Developer"
          supervisor_id: "fullstack-senior"
    - name: "design"
      budget_percent: 20
      head_role: "UX Designer"
      reporting_lines:
        - subordinate: "UI Designer"
          supervisor: "UX Designer"
    - name: "quality_assurance"
      budget_percent: 10
      head_role: "QA Engineer"
    - name: "creative_marketing"
      budget_percent: 15
      head_role: "Brand Strategist"
      reporting_lines:
        - subordinate: "Content Writer"
          supervisor: "Brand Strategist"

  agents:
    - role: "Project Manager"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "process_optimizer"
      department: "operations"
    - role: "Product Manager"
      name: ""
      level: "mid"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "communication_bridge"
      department: "operations"
    - role: "Scrum Master"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "team_diplomat"
      department: "operations"
    - role: "UX Designer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "user_advocate"
      department: "design"
    - role: "UI Designer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "creative_innovator"
      department: "design"
    - role: "Frontend Developer"
      name: ""
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "rapid_prototyper"
      department: "engineering"
    - role: "Backend Developer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "disciplined_executor"
      department: "engineering"
    - role: "Full-Stack Developer"
      name: ""
      merge_id: "fullstack-senior"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "QA Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "process_optimizer"
      department: "quality_assurance"
    - role: "Content Writer"
      name: ""
      level: "mid"
      model:
        tier: "small"
        priority: "quality"
      personality_preset: "creative_innovator"
      department: "creative_marketing"
    - role: "Brand Strategist"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "growth_hacker"
      department: "creative_marketing"
    - role: "Full-Stack Developer"
      name: ""
      merge_id: "fullstack-mid"
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "empathetic_mentor"
      department: "engineering"

  workflow: "kanban"
  communication: "hierarchical"

  workflow_config:
    kanban:
      wip_limits:
        - column: "in_progress"
          limit: {{ wip_limit | default(3) }}
        - column: "review"
          limit: 2
      enforce_wip: true
    sprint:
      ceremony_policy:
        strategy: "event_driven"

  workflow_handoffs:
    - from_department: "operations"
      to_department: "design"
      trigger: "Client requirements approved and project brief ready"
      artifacts:
        - "project_brief"
        - "client_requirements"
    - from_department: "design"
      to_department: "engineering"
      trigger: "Design deliverables approved by client"
      artifacts:
        - "design_specs"
        - "mockups"
    - from_department: "engineering"
      to_department: "quality_assurance"
      trigger: "Feature implementation ready for QA"
      artifacts:
        - "pull_request"
        - "test_plan"
    - from_department: "quality_assurance"
      to_department: "operations"
      trigger: "QA sign-off complete for client delivery"
      artifacts:
        - "test_results"
        - "release_notes"
    - from_department: "operations"
      to_department: "creative_marketing"
      trigger: "Client feedback on marketing deliverables"
      artifacts:
        - "client_feedback"
        - "revision_notes"
    - from_department: "creative_marketing"
      to_department: "operations"
      trigger: "Marketing assets ready for client review"
      artifacts:
        - "content_drafts"
        - "brand_assets"

  escalation_paths:
    - from_department: "engineering"
      to_department: "operations"
      condition: "Technical blocker requiring client decision or scope change"
      priority_boost: 1
    - from_department: "quality_assurance"
      to_department: "operations"
      condition: "Critical defect requiring client communication"
      priority_boost: 2
    - from_department: "design"
      to_department: "operations"
      condition: "Design revision exceeding project scope"
      priority_boost: 1
