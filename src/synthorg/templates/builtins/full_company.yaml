template:
  name: "Enterprise Org"
  description: >-
    A full enterprise simulation spanning all departments with C-suite
    executives, department heads, and individual contributors. Uses
    all five skill patterns and covers the complete range of
    organizational capabilities from strategy to execution.
  version: "1.0.0"
  min_agents: 1
  max_agents: 50
  tags:
    - "enterprise"
    - "full-hierarchy"
    - "all-departments"
    - "c-suite"
    - "comprehensive"
    - "compliance"
  skill_patterns:
    - "tool_wrapper"
    - "generator"
    - "reviewer"
    - "inversion"
    - "pipeline"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Acme Corp"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 200.0
    - name: "num_backend_devs"
      description: "Number of backend developers"
      var_type: "int"
      default: 3
    - name: "num_frontend_devs"
      description: "Number of frontend developers"
      var_type: "int"
      default: 2

  company:
    type: "full_company"
    budget_monthly: {{ budget | default(200.0) }}
    autonomy:
      level: "supervised"

  departments:
    - name: "executive"
      budget_percent: 10
      head_role: "CEO"
      reporting_lines:
        - subordinate: "CTO"
          supervisor: "CEO"
        - subordinate: "CFO"
          supervisor: "CEO"
    - name: "engineering"
      budget_percent: 30
      head_role: "CTO"
      reporting_lines:
        - subordinate: "Software Architect"
          supervisor: "CTO"
        - subordinate: "DevOps/SRE Engineer"
          supervisor: "Software Architect"
        - subordinate: "Database Engineer"
          supervisor: "Software Architect"
{% for i in range(num_backend_devs | default(3) | int) %}
        - subordinate: "Backend Developer"
          subordinate_id: "backend-{{ i }}"
          supervisor: "Software Architect"
{% endfor %}
{% for i in range(num_frontend_devs | default(2) | int) %}
        - subordinate: "Frontend Developer"
          subordinate_id: "frontend-{{ i }}"
          supervisor: "Software Architect"
{% endfor %}
    - name: "product"
      budget_percent: 10
      head_role: "Product Manager"
      reporting_lines:
        - subordinate: "Technical Writer"
          supervisor: "Product Manager"
    - name: "design"
      budget_percent: 8
      head_role: "UX Designer"
      reporting_lines:
        - subordinate: "UX Researcher"
          supervisor: "UX Designer"
    - name: "quality_assurance"
      budget_percent: 10
      head_role: "QA Lead"
      reporting_lines:
        - subordinate: "QA Engineer"
          supervisor: "QA Lead"
        - subordinate: "Automation Engineer"
          supervisor: "QA Lead"
    - name: "data_analytics"
      budget_percent: 8
      head_role: "Data Analyst"
      reporting_lines:
        - subordinate: "Data Engineer"
          supervisor: "Data Analyst"
    - name: "operations"
      budget_percent: 8
      head_role: "COO"
      reporting_lines:
        - subordinate: "Project Manager"
          supervisor: "COO"
        - subordinate: "Scrum Master"
          supervisor: "COO"
    - name: "security"
      budget_percent: 8
      head_role: "Security Engineer"
      reporting_lines:
        - subordinate: "Security Operations"
          supervisor: "Security Engineer"
    - name: "creative_marketing"
      budget_percent: 8
      head_role: "Brand Strategist"
      reporting_lines:
        - subordinate: "Content Writer"
          supervisor: "Brand Strategist"

  agents:
    # C-Suite (5)
    - role: "CEO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "visionary_leader"
      department: "executive"
    - role: "CTO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "systems_thinker"
      department: "executive"
    - role: "CFO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "data_driven_optimizer"
      department: "executive"
    - role: "COO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "process_optimizer"
      department: "operations"
    - role: "CPO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "user_advocate"
      department: "product"
    # Product (2)
    - role: "Product Manager"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "strategic_planner"
      department: "product"
    - role: "Technical Writer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "technical_communicator"
      department: "product"
    # Design (2)
    - role: "UX Designer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "user_advocate"
      department: "design"
    - role: "UX Researcher"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "independent_researcher"
      department: "design"
    # Engineering -- static (3)
    - role: "Software Architect"
      name: ""
      level: "principal"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "systems_thinker"
      department: "engineering"
    - role: "DevOps/SRE Engineer"
      name: ""
      level: "mid"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "disciplined_executor"
      department: "engineering"
    - role: "Database Engineer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "methodical_analyst"
      department: "engineering"
    # Engineering -- dynamic backend devs
{% for i in range(num_backend_devs | default(3) | int) %}
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-{{ i }}"
{% if i == 0 %}
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
{% else %}
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "eager_learner"
{% endif %}
      department: "engineering"
{% endfor %}
    # Engineering -- dynamic frontend devs
{% for i in range(num_frontend_devs | default(2) | int) %}
    - role: "Frontend Developer"
      name: ""
      merge_id: "frontend-{{ i }}"
{% if i == 0 %}
      level: "senior"
      model: "medium"
      personality_preset: "creative_innovator"
{% else %}
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "team_diplomat"
{% endif %}
      department: "engineering"
{% endfor %}
    # Quality Assurance (3)
    - role: "QA Lead"
      name: ""
      level: "lead"
      model: "medium"
      personality_preset: "quality_guardian"
      department: "quality_assurance"
    - role: "QA Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "methodical_analyst"
      department: "quality_assurance"
    - role: "Automation Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "disciplined_executor"
      department: "quality_assurance"
    # Data & Analytics (2)
    - role: "Data Analyst"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "data_driven_optimizer"
      department: "data_analytics"
    - role: "Data Engineer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "data_analytics"
    # Operations (2)
    - role: "Project Manager"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "communication_bridge"
      department: "operations"
    - role: "Scrum Master"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "empathetic_mentor"
      department: "operations"
    # Security (2)
    - role: "Security Engineer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "security_sentinel"
      department: "security"
    - role: "Security Operations"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "security_sentinel"
      department: "security"
    # Creative & Marketing (2)
    - role: "Content Writer"
      name: ""
      level: "mid"
      model:
        tier: "small"
        priority: "quality"
      personality_preset: "creative_innovator"
      department: "creative_marketing"
    - role: "Brand Strategist"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "growth_hacker"
      department: "creative_marketing"

  workflow: "agile_kanban"
  communication: "hierarchical"

  workflow_handoffs:
    - from_department: "product"
      to_department: "design"
      trigger: "Product requirements and user stories ready for design"
      artifacts:
        - "product_requirements"
        - "user_stories"
        - "acceptance_criteria"
    - from_department: "design"
      to_department: "engineering"
      trigger: "Design specifications approved and ready for implementation"
      artifacts:
        - "design_specs"
        - "mockups"
        - "interaction_flows"
    - from_department: "engineering"
      to_department: "quality_assurance"
      trigger: "Feature implementation ready for testing"
      artifacts:
        - "pull_request"
        - "test_plan"
        - "technical_docs"
    - from_department: "quality_assurance"
      to_department: "operations"
      trigger: "QA approval for release deployment"
      artifacts:
        - "test_results"
        - "release_checklist"
    - from_department: "engineering"
      to_department: "security"
      trigger: "Security review required for sensitive changes"
      artifacts:
        - "pull_request"
        - "threat_model"
    - from_department: "security"
      to_department: "engineering"
      trigger: "Security findings require engineering remediation"
      artifacts:
        - "vulnerability_report"
        - "remediation_guidance"
    - from_department: "data_analytics"
      to_department: "product"
      trigger: "Data insights ready for product strategy review"
      artifacts:
        - "analytics_report"
        - "recommendations"
    - from_department: "creative_marketing"
      to_department: "product"
      trigger: "Marketing content ready for product alignment review"
      artifacts:
        - "content_drafts"
        - "campaign_plan"

  escalation_paths:
    - from_department: "engineering"
      to_department: "executive"
      condition: "Critical technical decision requiring CTO approval"
      priority_boost: 2
    - from_department: "quality_assurance"
      to_department: "engineering"
      condition: "Release-blocking defect requiring immediate fix"
      priority_boost: 2
    - from_department: "security"
      to_department: "executive"
      condition: "Critical security vulnerability requiring executive action"
      priority_boost: 3
    - from_department: "operations"
      to_department: "executive"
      condition: "Operational issue requiring COO or CEO intervention"
      priority_boost: 1
    - from_department: "product"
      to_department: "executive"
      condition: "Strategic product decision requiring CPO or CEO input"
      priority_boost: 1
