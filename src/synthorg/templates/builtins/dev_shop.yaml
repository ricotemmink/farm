template:
  name: "Engineering Squad"
  description: >-
    A lean engineering team built for shipping. No C-suite overhead
    -- a Software Architect leads directly. Three backend developers,
    a frontend specialist, QA pipeline, and a DevOps engineer.
    Optimized for throughput with quality gates.
  version: "1.0.0"
  min_agents: 6
  max_agents: 10
  tags:
    - "engineering"
    - "ci-cd"
    - "code-review"
    - "quality-gates"
    - "devops"
  skill_patterns:
    - "pipeline"
    - "reviewer"
    - "tool_wrapper"
  extends: "startup"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Engineering Squad"
    - name: "budget"
      description: "Monthly budget in the company's configured currency"
      var_type: "float"
      default: 75.0
    - name: "sprint_length"
      description: "Sprint duration in days"
      var_type: "int"
      default: 14
    - name: "wip_limit"
      description: "Work-in-progress limit per column"
      var_type: "int"
      default: 2

  company:
    type: "dev_shop"
    budget_monthly: {{ budget | default(75.0) }}

  departments:
    # Remove inherited executive and product departments
    - name: "executive"
      _remove: true
    - name: "product"
      _remove: true
    # Override inherited engineering department
    - name: "engineering"
      budget_percent: 70
      head_role: "Software Architect"
      policies:
        review_requirements:
          min_reviewers: 1
      reporting_lines:
        - subordinate: "Backend Developer"
          subordinate_id: "backend-senior-1"
          supervisor: "Software Architect"
        - subordinate: "Backend Developer"
          subordinate_id: "backend-mid"
          supervisor: "Software Architect"
        - subordinate: "Frontend Developer"
          supervisor: "Software Architect"
        - subordinate: "Backend Developer"
          subordinate_id: "backend-senior-2"
          supervisor: "Software Architect"
    # New departments
    - name: "quality_assurance"
      budget_percent: 20
      head_role: "QA Lead"
      policies:
        approval_chains:
          - action_type: "test_coverage"
            approvers:
              - "QA Lead"
      reporting_lines:
        - subordinate: "QA Engineer"
          supervisor: "QA Lead"
    - name: "operations"
      budget_percent: 10
      head_role: "DevOps/SRE Engineer"

  agents:
    # Remove all inherited agents from startup chain
    - role: "CEO"
      department: "executive"
      _remove: true
    - role: "CTO"
      department: "executive"
      _remove: true
    - role: "Full-Stack Developer"
      department: "engineering"
      _remove: true
    - role: "Full-Stack Developer"
      department: "engineering"
      _remove: true
    - role: "Product Manager"
      department: "product"
      _remove: true
    # New engineering squad agents
    - role: "Software Architect"
      level: "principal"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "systems_thinker"
      department: "engineering"
    - role: "Backend Developer"
      merge_id: "backend-senior-1"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Backend Developer"
      merge_id: "backend-mid"
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "eager_learner"
      department: "engineering"
    - role: "Frontend Developer"
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "creative_innovator"
      department: "engineering"
    - role: "QA Lead"
      level: "lead"
      model: "medium"
      personality_preset: "quality_guardian"
      department: "quality_assurance"
    - role: "QA Engineer"
      level: "mid"
      model: "small"
      personality_preset: "methodical_analyst"
      department: "quality_assurance"
    - role: "DevOps/SRE Engineer"
      level: "mid"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "process_optimizer"
      department: "operations"
    - role: "Backend Developer"
      merge_id: "backend-senior-2"
      level: "senior"
      model: "medium"
      personality_preset: "disciplined_executor"
      department: "engineering"

  workflow_config:
    kanban:
      wip_limits:
        - column: "in_progress"
          limit: {{ wip_limit | default(2) }}
        - column: "review"
          limit: 2
      enforce_wip: true
    sprint:
      ceremony_policy:
        strategy: "hybrid"
        velocity_calculator: "multi_dimensional"
      duration_days: {{ sprint_length | default(14) }}
      ceremonies:
        - name: "sprint_planning"
          protocol: "structured_phases"
          frequency: "bi_weekly"
        - name: "daily_standup"
          protocol: "round_robin"
          frequency: "per_sprint_day"
          duration_tokens: 2000
        - name: "sprint_review"
          protocol: "round_robin"
          frequency: "bi_weekly"
        - name: "retrospective"
          protocol: "position_papers"
          frequency: "bi_weekly"
          duration_tokens: 3000

  workflow_handoffs:
    - from_department: "engineering"
      to_department: "quality_assurance"
      trigger: "Code changes ready for QA review and testing"
      artifacts:
        - "pull_request"
        - "test_plan"
    - from_department: "quality_assurance"
      to_department: "engineering"
      trigger: "QA testing complete with bug reports"
      artifacts:
        - "test_results"
        - "bug_reports"

  escalation_paths:
    - from_department: "quality_assurance"
      to_department: "engineering"
      condition: "Critical defect blocking release"
      priority_boost: 2
    - from_department: "engineering"
      to_department: "operations"
      condition: "Infrastructure or deployment issue impeding development"
      priority_boost: 1
