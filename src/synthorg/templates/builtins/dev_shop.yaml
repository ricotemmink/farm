template:
  name: "Dev Shop"
  description: "Software development focused team with QA and DevOps"
  version: "1.0.0"
  min_agents: 6
  max_agents: 10
  tags:
    - "development"
    - "engineering"
    - "qa"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Dev Shop"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 75.0

  company:
    type: "dev_shop"
    budget_monthly: {{ budget | default(75.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "engineering"
      budget_percent: 70
      head_role: "Software Architect"
      reporting_lines:
        - subordinate: "Backend Developer"
          subordinate_id: "backend-senior-1"
          supervisor: "Software Architect"
        - subordinate: "Backend Developer"
          subordinate_id: "backend-mid"
          supervisor: "Software Architect"
        - subordinate: "Frontend Developer"
          supervisor: "Software Architect"
        - subordinate: "Backend Developer"
          subordinate_id: "backend-senior-2"
          supervisor: "Software Architect"
    - name: "quality_assurance"
      budget_percent: 20
      head_role: "QA Lead"
      reporting_lines:
        - subordinate: "QA Engineer"
          supervisor: "QA Lead"
    - name: "operations"
      budget_percent: 10
      head_role: "DevOps/SRE Engineer"

  agents:
    - role: "Software Architect"
      name: ""
      level: "principal"
      model: "large"
      personality_preset: "systems_thinker"
      department: "engineering"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-senior-1"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-mid"
      level: "mid"
      model: "small"
      personality_preset: "eager_learner"
      department: "engineering"
    - role: "Frontend Developer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "creative_innovator"
      department: "engineering"
    - role: "QA Lead"
      name: ""
      level: "lead"
      model: "medium"
      personality_preset: "quality_guardian"
      department: "quality_assurance"
    - role: "QA Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "methodical_analyst"
      department: "quality_assurance"
    - role: "DevOps/SRE Engineer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "process_optimizer"
      department: "operations"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-senior-2"
      level: "senior"
      model: "medium"
      personality_preset: "disciplined_executor"
      department: "engineering"

  workflow: "agile_kanban"
  communication: "hybrid"

  workflow_handoffs:
    - from_department: "engineering"
      to_department: "quality_assurance"
      trigger: "Code changes ready for QA review and testing"
      artifacts:
        - "pull_request"
        - "test_plan"
    - from_department: "quality_assurance"
      to_department: "engineering"
      trigger: "QA testing complete with bug reports"
      artifacts:
        - "test_results"
        - "bug_reports"

  escalation_paths:
    - from_department: "quality_assurance"
      to_department: "engineering"
      condition: "Critical defect blocking release"
      priority_boost: 2
    - from_department: "engineering"
      to_department: "operations"
      condition: "Infrastructure or deployment issue impeding development"
      priority_boost: 1
