template:
  name: "Research Lab"
  description: >-
    An autonomous research organization where analysis begins with
    structured inquiry to define the research question before data
    work starts. Output is peer-reviewed before publication,
    producing rigorous, structured research artifacts.
  version: "1.0.0"
  min_agents: 5
  max_agents: 10
  tags:
    - "research"
    - "analysis"
    - "data-pipeline"
    - "peer-review"
    - "autonomous"
  skill_patterns:
    - "inversion"
    - "generator"
    - "reviewer"

  variables:
    - name: "company_name"
      description: "Name of your research lab"
      default: "Research Lab"
    - name: "budget"
      description: "Monthly budget in the company's configured currency"
      var_type: "float"
      default: 60.0
    - name: "wip_limit"
      description: "Work-in-progress limit per column"
      var_type: "int"
      default: 3

  company:
    type: "research_lab"
    budget_monthly: {{ budget | default(60.0) }}
    autonomy:
      level: "full"

  departments:
    - name: "engineering"
      budget_percent: 30
      head_role: "Software Architect"
      reporting_lines:
        - subordinate: "Backend Developer"
          supervisor: "Software Architect"
    - name: "data_analytics"
      budget_percent: 50
      head_role: "Data Analyst"
      head_merge_id: "analyst-primary"
      reporting_lines:
        - subordinate: "Data Engineer"
          supervisor: "Data Analyst"
          supervisor_id: "analyst-primary"
        - subordinate: "ML Engineer"
          supervisor: "Data Analyst"
          supervisor_id: "analyst-primary"
        - subordinate: "Data Analyst"
          subordinate_id: "analyst-secondary"
          supervisor: "Data Analyst"
          supervisor_id: "analyst-primary"
    - name: "product"
      budget_percent: 20
      head_role: "Technical Writer"

  agents:
    - role: "Software Architect"
      level: "principal"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "systems_thinker"
      department: "engineering"
    - role: "Backend Developer"
      level: "mid"
      model: "medium"
      personality_preset: "independent_researcher"
      department: "engineering"
    - role: "Data Engineer"
      level: "senior"
      model: "medium"
      personality_preset: "disciplined_executor"
      department: "data_analytics"
    - role: "Data Analyst"
      merge_id: "analyst-primary"
      level: "mid"
      model: "medium"
      personality_preset: "data_driven_optimizer"
      department: "data_analytics"
    - role: "ML Engineer"
      level: "senior"
      model: "medium"
      personality_preset: "independent_researcher"
      department: "data_analytics"
    - role: "Data Analyst"
      merge_id: "analyst-secondary"
      level: "mid"
      model: "small"
      personality_preset: "methodical_analyst"
      department: "data_analytics"
    - role: "Technical Writer"
      level: "mid"
      model: "small"
      personality_preset: "technical_communicator"
      department: "product"

  workflow: "kanban"
  communication: "event_driven"

  workflow_config:
    kanban:
      wip_limits:
        - column: "in_progress"
          limit: {{ wip_limit | default(3) }}
      enforce_wip: false
    sprint:
      ceremony_policy:
        strategy: "throughput_adaptive"
        velocity_calculator: "task_driven"

  workflow_handoffs:
    - from_department: "data_analytics"
      to_department: "engineering"
      trigger: "Data pipeline or model requires engineering implementation"
      artifacts:
        - "technical_requirements"
        - "data_schema"
    - from_department: "engineering"
      to_department: "data_analytics"
      trigger: "Engineering deliverable ready for data validation"
      artifacts:
        - "implementation"
        - "api_docs"
    - from_department: "data_analytics"
      to_department: "product"
      trigger: "Research findings ready for documentation"
      artifacts:
        - "analysis_report"
        - "visualizations"

  escalation_paths:
    - from_department: "data_analytics"
      to_department: "engineering"
      condition: "Data infrastructure limitation blocking research"
      priority_boost: 1
    - from_department: "engineering"
      to_department: "data_analytics"
      condition: "Data quality issue discovered during implementation"
      priority_boost: 1
