template:
  name: "Data Team"
  description: >-
    A data-first organization focused on analytics and ML. Distinct
    from research_lab (broader engineering scope with Software Architect
    lead). Pipelines, analysis, and models with lightweight engineering
    support.
  version: "1.0.0"
  min_agents: 5
  max_agents: 8
  tags:
    - "data"
    - "analytics"
    - "ml"
    - "pipelines"
    - "autonomous"
  skill_patterns:
    - "generator"
    - "reviewer"
    - "tool_wrapper"
  extends: "research_lab"

  variables:
    - name: "company_name"
      description: "Name of your data team"
      default: "Data Team"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 55.0
    - name: "wip_limit"
      description: "Work-in-progress limit per column"
      var_type: "int"
      default: 3

  company:
    type: "data_team"
    budget_monthly: {{ budget | default(55.0) }}
    autonomy:
      level: "full"

  workflow: "kanban"
  communication: "event_driven"

  departments:
    # Remove inherited product department
    - name: "product"
      _remove: true
    # Override inherited departments
    - name: "data_analytics"
      budget_percent: 65
      head_role: "Data Engineer"
      reporting_lines:
        - subordinate: "Data Analyst"
          subordinate_id: "analyst-primary"
          supervisor: "Data Engineer"
        - subordinate: "Data Analyst"
          subordinate_id: "analyst-secondary"
          supervisor: "Data Engineer"
        - subordinate: "ML Engineer"
          supervisor: "Data Engineer"
    - name: "engineering"
      budget_percent: 35
      head_role: "Backend Developer"
      reporting_lines:
        - subordinate: "Technical Writer"
          supervisor: "Backend Developer"

  agents:
    # Remove inherited agents not in data_team
    - role: "Software Architect"
      department: "engineering"
      _remove: true
    - role: "Technical Writer"
      department: "product"
      _remove: true
    # Override Backend Developer: different model and personality
    - role: "Backend Developer"
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    # Add Technical Writer in engineering (different dept from parent's product)
    - role: "Technical Writer"
      level: "mid"
      model: "small"
      personality_preset: "technical_communicator"
      department: "engineering"
  # Inherited unchanged from research_lab:
  # - Data Engineer (data_analytics)
  # - Data Analyst [analyst-primary] (data_analytics)
  # - Data Analyst [analyst-secondary] (data_analytics)
  # - ML Engineer (data_analytics)

  workflow_config:
    kanban:
      wip_limits:
        - column: "in_progress"
          limit: {{ wip_limit | default(3) }}
      enforce_wip: false
    sprint:
      ceremony_policy:
        strategy: "task_driven"
        velocity_calculator: "task_driven"

  workflow_handoffs:
    - from_department: "data_analytics"
      to_department: "engineering"
      trigger: "Pipeline or model requires backend integration"
      artifacts:
        - "technical_requirements"
        - "data_schema"
    - from_department: "engineering"
      to_department: "data_analytics"
      trigger: "Infrastructure changes ready for data validation"
      artifacts:
        - "implementation"
        - "api_docs"

  escalation_paths:
    - from_department: "data_analytics"
      to_department: "engineering"
      condition: "Infrastructure bottleneck blocking data pipeline"
      priority_boost: 2
    - from_department: "engineering"
      to_department: "data_analytics"
      condition: "Data integrity issue discovered in pipeline"
      priority_boost: 1
