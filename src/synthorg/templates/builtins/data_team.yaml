template:
  name: "Data Team"
  description: >-
    A data-first organization focused on analytics and ML. Distinct
    from research_lab (broader engineering scope with Software Architect
    lead). Pipelines, analysis, and models with lightweight engineering
    support.
  version: "1.0.0"
  min_agents: 5
  max_agents: 8
  tags:
    - "data"
    - "analytics"
    - "ml"
    - "pipelines"
    - "autonomous"
  skill_patterns:
    - "generator"
    - "reviewer"
    - "tool_wrapper"

  variables:
    - name: "company_name"
      description: "Name of your data team"
      default: "Data Team"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 55.0
    - name: "wip_limit"
      description: "Work-in-progress limit per column"
      var_type: "int"
      default: 3

  company:
    type: "data_team"
    budget_monthly: {{ budget | default(55.0) }}
    autonomy:
      level: "full"

  departments:
    - name: "data_analytics"
      budget_percent: 65
      head_role: "Data Engineer"
      reporting_lines:
        - subordinate: "Data Analyst"
          subordinate_id: "analyst-primary"
          supervisor: "Data Engineer"
        - subordinate: "Data Analyst"
          subordinate_id: "analyst-secondary"
          supervisor: "Data Engineer"
        - subordinate: "ML Engineer"
          supervisor: "Data Engineer"
    - name: "engineering"
      budget_percent: 35
      head_role: "Backend Developer"
      reporting_lines:
        - subordinate: "Technical Writer"
          supervisor: "Backend Developer"

  agents:
    - role: "Data Engineer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "disciplined_executor"
      department: "data_analytics"
    - role: "Data Analyst"
      name: ""
      merge_id: "analyst-primary"
      level: "mid"
      model: "medium"
      personality_preset: "data_driven_optimizer"
      department: "data_analytics"
    - role: "Data Analyst"
      name: ""
      merge_id: "analyst-secondary"
      level: "mid"
      model: "small"
      personality_preset: "methodical_analyst"
      department: "data_analytics"
    - role: "ML Engineer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "independent_researcher"
      department: "data_analytics"
    - role: "Backend Developer"
      name: ""
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Technical Writer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "technical_communicator"
      department: "engineering"

  workflow: "kanban"
  communication: "event_driven"

  workflow_config:
    kanban:
      wip_limits:
        - column: "in_progress"
          limit: {{ wip_limit | default(3) }}
      enforce_wip: false

  workflow_handoffs:
    - from_department: "data_analytics"
      to_department: "engineering"
      trigger: "Pipeline or model requires backend integration"
      artifacts:
        - "technical_requirements"
        - "data_schema"
    - from_department: "engineering"
      to_department: "data_analytics"
      trigger: "Infrastructure changes ready for data validation"
      artifacts:
        - "implementation"
        - "api_docs"

  escalation_paths:
    - from_department: "data_analytics"
      to_department: "engineering"
      condition: "Infrastructure bottleneck blocking data pipeline"
      priority_boost: 2
    - from_department: "engineering"
      to_department: "data_analytics"
      condition: "Data integrity issue discovered in pipeline"
      priority_boost: 1
