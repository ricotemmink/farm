template:
  name: "Product Studio"
  description: >-
    A product organization where UX research gathers requirements
    before any build begins. Designers, engineers, QA, and a data
    analyst coordinate through structured meetings. Balances
    user-centered discovery with engineering delivery.
  version: "1.0.0"
  min_agents: 8
  max_agents: 12
  tags:
    - "product"
    - "design-system"
    - "user-research"
    - "cross-functional"
    - "data-driven"
    - "meeting-based"
  skill_patterns:
    - "inversion"
    - "pipeline"
    - "reviewer"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Product Co"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 80.0

  company:
    type: "product_team"
    budget_monthly: {{ budget | default(80.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "product"
      budget_percent: 25
      head_role: "Product Manager"
    - name: "engineering"
      budget_percent: 35
      head_role: "Backend Developer"
      head_merge_id: "backend-senior"
      reporting_lines:
        - subordinate: "Backend Developer"
          subordinate_id: "backend-mid"
          supervisor: "Backend Developer"
          supervisor_id: "backend-senior"
        - subordinate: "Frontend Developer"
          supervisor: "Backend Developer"
          supervisor_id: "backend-senior"
        - subordinate: "Full-Stack Developer"
          supervisor: "Backend Developer"
          supervisor_id: "backend-senior"
    - name: "design"
      budget_percent: 15
      head_role: "UX Designer"
      reporting_lines:
        - subordinate: "UX Researcher"
          supervisor: "UX Designer"
    - name: "quality_assurance"
      budget_percent: 15
      head_role: "QA Engineer"
      reporting_lines:
        - subordinate: "Automation Engineer"
          supervisor: "QA Engineer"
    - name: "data_analytics"
      budget_percent: 10
      head_role: "Data Analyst"

  agents:
    - role: "Product Manager"
      name: ""
      level: "senior"
      model:
        tier: "medium"
        priority: "speed"
      personality_preset: "strategic_planner"
      department: "product"
    - role: "UX Designer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "user_advocate"
      department: "design"
    - role: "UX Researcher"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "methodical_analyst"
      department: "design"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-senior"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-mid"
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "team_diplomat"
      department: "engineering"
    - role: "Frontend Developer"
      name: ""
      level: "mid"
      model:
        tier: "small"
        priority: "cost"
      personality_preset: "creative_innovator"
      department: "engineering"
    - role: "Full-Stack Developer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "communication_bridge"
      department: "engineering"
    - role: "QA Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "quality_guardian"
      department: "quality_assurance"
    - role: "Automation Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "disciplined_executor"
      department: "quality_assurance"
    - role: "Data Analyst"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "data_driven_optimizer"
      department: "data_analytics"

  workflow: "agile_kanban"
  communication: "meeting_based"

  workflow_handoffs:
    - from_department: "product"
      to_department: "design"
      trigger: "Product requirements defined and ready for design"
      artifacts:
        - "product_requirements"
        - "user_stories"
    - from_department: "design"
      to_department: "engineering"
      trigger: "Design specifications and mockups approved"
      artifacts:
        - "design_specs"
        - "mockups"
    - from_department: "engineering"
      to_department: "quality_assurance"
      trigger: "Feature implementation ready for testing"
      artifacts:
        - "pull_request"
        - "test_plan"
    - from_department: "quality_assurance"
      to_department: "product"
      trigger: "Testing complete with quality report for product review"
      artifacts:
        - "test_results"
        - "quality_report"
    - from_department: "data_analytics"
      to_department: "product"
      trigger: "Usage data analysis complete with insights"
      artifacts:
        - "analytics_report"
        - "recommendations"

  escalation_paths:
    - from_department: "engineering"
      to_department: "product"
      condition: "Technical constraint affecting product requirements"
      priority_boost: 1
    - from_department: "quality_assurance"
      to_department: "engineering"
      condition: "Critical defect requiring immediate engineering attention"
      priority_boost: 2
    - from_department: "quality_assurance"
      to_department: "product"
      condition: "Quality threshold not met, release decision needed"
      priority_boost: 1
