template:
  name: "Product Team"
  description: "Product-focused development with design and QA"
  version: "1.0.0"
  min_agents: 8
  max_agents: 12
  tags:
    - "product"
    - "design"
    - "user-centered"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "Product Co"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 80.0

  company:
    type: "product_team"
    budget_monthly: {{ budget | default(80.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "product"
      budget_percent: 25
      head_role: "Product Manager"
    - name: "engineering"
      budget_percent: 35
      head_role: "Backend Developer"
    - name: "design"
      budget_percent: 15
      head_role: "UX Designer"
    - name: "quality_assurance"
      budget_percent: 15
      head_role: "QA Engineer"
    - name: "data_analytics"
      budget_percent: 10
      head_role: "Data Analyst"

  agents:
    - role: "Product Manager"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "strategic_planner"
      department: "product"
    - role: "UX Designer"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "user_advocate"
      department: "design"
    - role: "UX Researcher"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "methodical_analyst"
      department: "design"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-senior"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Backend Developer"
      name: ""
      merge_id: "backend-mid"
      level: "mid"
      model: "small"
      personality_preset: "team_diplomat"
      department: "engineering"
    - role: "Frontend Developer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "creative_innovator"
      department: "engineering"
    - role: "Full-Stack Developer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "communication_bridge"
      department: "engineering"
    - role: "QA Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "quality_guardian"
      department: "quality_assurance"
    - role: "Automation Engineer"
      name: ""
      level: "mid"
      model: "small"
      personality_preset: "disciplined_executor"
      department: "quality_assurance"
    - role: "Data Analyst"
      name: ""
      level: "mid"
      model: "medium"
      personality_preset: "data_driven_optimizer"
      department: "data_analytics"

  workflow: "agile_kanban"
  communication: "hybrid"
