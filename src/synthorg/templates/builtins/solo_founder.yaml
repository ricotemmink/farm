template:
  name: "Solo Founder"
  description: "Minimal setup for quick prototypes and solo projects"
  version: "1.0.0"
  min_agents: 2
  max_agents: 3
  tags:
    - "minimal"
    - "solo"
    - "prototype"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "My Company"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 25.0

  company:
    type: "solo_founder"
    budget_monthly: {{ budget | default(25.0) }}
    autonomy:
      level: "semi"

  departments:
    - name: "executive"
      budget_percent: 40
      head_role: "CEO"
    - name: "engineering"
      budget_percent: 60
      head_role: "Full-Stack Developer"

  agents:
    - role: "CEO"
      name: ""
      level: "c_suite"
      model: "large"
      personality_preset: "visionary_leader"
      department: "executive"
    - role: "Full-Stack Developer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "rapid_prototyper"
      department: "engineering"

  workflow: "kanban"
  communication: "hybrid"
