template:
  name: "Solo Builder"
  description: >-
    A lean two-agent setup for maximum autonomy and fast iteration.
    The CEO and a full-stack developer operate event-driven without
    approval gates or hierarchy overhead. Ideal for solo projects,
    proof-of-concepts, and rapid prototyping.
  version: "1.0.0"
  min_agents: 2
  max_agents: 3
  tags:
    - "minimal"
    - "solo"
    - "rapid-prototyping"
    - "no-hierarchy"
    - "autonomous"
  skill_patterns:
    - "tool_wrapper"

  variables:
    - name: "company_name"
      description: "Name of your company"
      default: "My Company"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 25.0

  company:
    type: "solo_founder"
    budget_monthly: {{ budget | default(25.0) }}
    autonomy:
      level: "full"

  departments:
    - name: "executive"
      budget_percent: 40
      head_role: "CEO"
    - name: "engineering"
      budget_percent: 60
      head_role: "Full-Stack Developer"

  agents:
    - role: "CEO"
      name: ""
      level: "c_suite"
      model:
        tier: "large"
        priority: "quality"
        min_context: 100000
      personality_preset: "visionary_leader"
      department: "executive"
    - role: "Full-Stack Developer"
      name: ""
      level: "senior"
      model: "medium"
      personality_preset: "rapid_prototyper"
      department: "engineering"

  workflow: "kanban"
  communication: "event_driven"
