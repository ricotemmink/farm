template:
  name: "Research Lab"
  description: "Research and analysis focused team"
  version: "1.0.0"
  min_agents: 5
  max_agents: 10
  tags:
    - "research"
    - "analysis"
    - "data"

  variables:
    - name: "company_name"
      description: "Name of your research lab"
      default: "Research Lab"
    - name: "budget"
      description: "Monthly budget in USD"
      var_type: "float"
      default: 60.0

  company:
    type: "research_lab"
    budget_monthly: {{ budget | default(60.0) }}
    autonomy: 0.5

  departments:
    - name: "engineering"
      budget_percent: 30
      head_role: "Software Architect"
    - name: "data_analytics"
      budget_percent: 50
      head_role: "Data Analyst"
    - name: "product"
      budget_percent: 20
      head_role: "Technical Writer"

  agents:
    - role: "Software Architect"
      level: "principal"
      model: "large"
      personality_preset: "systems_thinker"
      department: "engineering"
    - role: "Backend Developer"
      level: "mid"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "engineering"
    - role: "Data Engineer"
      level: "senior"
      model: "medium"
      personality_preset: "pragmatic_builder"
      department: "data_analytics"
    - role: "Data Analyst"
      merge_id: "analyst-primary"
      level: "mid"
      model: "medium"
      personality_preset: "data_driven_optimizer"
      department: "data_analytics"
    - role: "ML Engineer"
      level: "senior"
      model: "medium"
      personality_preset: "independent_researcher"
      department: "data_analytics"
    - role: "Data Analyst"
      merge_id: "analyst-secondary"
      level: "mid"
      model: "small"
      personality_preset: "methodical_analyst"
      department: "data_analytics"
    - role: "Technical Writer"
      level: "mid"
      model: "small"
      personality_preset: "technical_communicator"
      department: "product"

  workflow: "kanban"
  communication: "hybrid"
