# Generated by SynthOrg CLI dev
# Do not edit manually — run 'synthorg init' to regenerate.

services:
  backend:
    image: ghcr.io/aureliolo/synthorg-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - synthorg-data:/data
    environment:
      SYNTHORG_HOST: "0.0.0.0"
      SYNTHORG_PORT: "8000"
      SYNTHORG_DB_PATH: "/data/synthorg.db"
      SYNTHORG_MEMORY_DIR: "/data/memory"
      SYNTHORG_LOG_LEVEL: "info"
    user: "65532:65532"
    # CIS Docker Benchmark v1.6.0 hardening (5.3, 5.12, 5.25)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["/usr/bin/python", "-c", "import json,urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/api/v1/health'); d=json.loads(r.read()); sys.exit(0 if d.get('data',{}).get('status')=='ok' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ghcr.io/aureliolo/synthorg-web:latest
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    user: "101:101"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  synthorg-data:
