version: 2

project_name: synthorg

builds:
  - id: synthorg
    main: ./main.go
    binary: synthorg
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Aureliolo/synthorg/cli/internal/version.Version={{.Version}}
      - -X github.com/Aureliolo/synthorg/cli/internal/version.Commit={{.Commit}}
      - -X github.com/Aureliolo/synthorg/cli/internal/version.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "synthorg_{{ .Os }}_{{ .Arch }}"
    files:
      - src: LICENSE
        dst: .
        info:
          mtime: "{{ .CommitDate }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - artifacts: archive
    cmd: syft
    args: ["scan", "$artifact", "--output", "cyclonedx-json=$document"]
    documents:
      - "{{ .ArtifactName }}.cdx.json"

release:
  # Skip GoReleaser's release management — Release Please owns the GitHub
  # Release (created as draft). Assets are uploaded via gh release upload
  # in the workflow, which can find draft releases (unlike GoReleaser's
  # API call which returns 404 for drafts queried by tag).
  disable: true

changelog:
  disable: true
