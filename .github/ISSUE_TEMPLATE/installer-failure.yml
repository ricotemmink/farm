name: CLI Installation Failure
description: Report a problem installing the SynthOrg CLI
title: "[CLI Install] "
labels:
  - type:bug
  - scope:cli
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an installation issue. Please fill in the details below.

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Homebrew (brew install)
        - Scoop (scoop install)
        - curl | sh (Linux/macOS)
        - PowerShell installer (Windows)
        - Manual download from GitHub Releases
        - Built from source (go build)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon / arm64)
        - macOS (Intel / amd64)
        - Linux (amd64)
        - Linux (arm64)
        - Windows (amd64)
        - Windows (arm64)
    validations:
      required: true

  - type: textarea
    id: version
    attributes:
      label: Version info
      description: "Output of `synthorg version` (if installed) or the version you tried to install"
      placeholder: |
        synthorg dev
          commit: none
          built:  unknown
    validations:
      required: false

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: "Full error message or terminal output"
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Exact commands you ran"
      placeholder: |
        1. curl -sSfL https://... | sh
        2. ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Anything else that might help (Docker version, shell, proxy, etc.)"
    validations:
      required: false
