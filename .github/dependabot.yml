version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    reviewers:
      - Aureliolo
    labels:
      - type:ci

  - package-ecosystem: docker
    directory: /docker/backend
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: docker
    directory: /docker/web
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:chore
