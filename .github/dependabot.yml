version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:infra

  - package-ecosystem: github-actions
    directory: /.github/actions/setup-python-uv
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 3
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:infra

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 3
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:chore

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:chore
      - scope:web

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 3
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:chore
      - scope:site

  - package-ecosystem: npm
    directory: /.github
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 3
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:infra

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - dependencies
      - type:chore
      - scope:cli

  - package-ecosystem: docker
    directory: /docker/backend
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 3
    reviewers:
      - Aureliolo
    ignore:
      - dependency-name: python
        versions: ["3.15.*", "3.16.*"]
    labels:
      - dependencies
      - type:chore
      - scope:docker

  - package-ecosystem: docker
    directory: /docker/sandbox
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      all:
        patterns: ["*"]
    open-pull-requests-limit: 3
    reviewers:
      - Aureliolo
    ignore:
      - dependency-name: python
        versions: ["3.15.*", "3.16.*"]
    labels:
      - dependencies
      - type:chore
      - scope:docker
