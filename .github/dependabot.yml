version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 10
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 10
    reviewers:
      - Aureliolo
    labels:
      - type:ci

  - package-ecosystem: github-actions
    directory: /.github/actions/setup-python-uv
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:ci

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: npm
    directories:
      - /web
      - /site
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 10
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: npm
    directory: /.github
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "ci"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:ci

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 10
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: docker
    directory: /docker/backend
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    ignore:
      - dependency-name: chainguard/python
    labels:
      - type:chore

  - package-ecosystem: docker
    directory: /docker/web
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:chore

  - package-ecosystem: docker
    directory: /docker/sandbox
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    commit-message:
      prefix: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
    open-pull-requests-limit: 5
    reviewers:
      - Aureliolo
    labels:
      - type:chore
