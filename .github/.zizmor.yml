rules:
  # Daily Renovate updates are intentional -- see CLAUDE.md and renovate.json.
  # The project uses daily checks with grouped updates per domain to stay current.
  dependabot-cooldown:
    disable: true

  dangerous-triggers:
    ignore:
      # pull_request_target is required for CLA enforcement (needs write
      # access to commit signatures). Mitigated: checkout uses ref: main
      # (not PR head), no untrusted input in run: steps.
      - cla.yml

  template-injection:
    ignore:
      # steps.scan-ref.outputs.ref is set by echo in the same job (not
      # user-controllable). zizmor flags it at Low confidence.
      - docker.yml

  artipacked:
    ignore:
      # persist-credentials required to push the Change Date commit back
      # to the release PR branch.
      - release.yml
