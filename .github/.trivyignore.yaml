# Trivy CVE ignore list -- structured YAML format

vulnerabilities:
  - id: CVE-2026-22184
    statement: >-
      Disputed zlib vulnerability affecting only the untgz demo utility
      in contrib/, not core zlib compression. Our images do not ship or
      invoke untgz. Upstream disputes CVE validity:
      https://github.com/madler/zlib/issues/1148

  - id: CVE-2026-25210
    purls:
      - "pkg:deb/debian/libexpat1?distro=debian-13"
    expired_at: "2026-06-24T00:00:00Z"
    statement: >-
      libexpat integer overflow in doContent buffer reallocation (fixed in
      2.7.4, sandbox has 2.7.1-2). No Debian Trixie fix available yet.
      Risk accepted: sandbox is ephemeral, network-isolated via iptables,
      runs as non-root (UID 10001), and the local-access attack vector is
      inherent to the sandbox's purpose (executing untrusted code).
      Revisit when python:3.14-slim ships libexpat >= 2.7.4.

  - id: CVE-2025-69720
    purls:
      - "pkg:deb/debian/ncurses?distro=debian-13"
    expired_at: "2026-06-24T00:00:00Z"
    statement: >-
      Stack buffer overflow in ncurses infocmp -i (analyze_string in
      progs/infocmp.c). Only triggers when running infocmp -i on crafted
      terminfo entry. Sandbox never invokes infocmp -- ncurses is a
      transitive dep of Python/git. Fixed in ncurses 6.5 patch 20251213
      but Debian Trixie ships 6.5+20250216-2. Trivy rates CRITICAL but
      EPSS < 0.1% and Debian marks unimportant. Risk accepted: sandbox
      is ephemeral, network-isolated via iptables, runs as non-root
      (UID 10001).

  - id: CVE-2026-4519
    purls:
      - "pkg:apk/wolfi/python-3.14"
    expired_at: "2026-07-10T00:00:00Z"
    statement: >-
      Python webbrowser module command-line option injection (CVE-2026-4519).
      Our backend never invokes webbrowser.open() -- the module is not
      imported or used. Fixed in CPython 3.14.4 but Wolfi apko base pins
      3.14.3-r0. Risk accepted: no code path reaches the vulnerable function.

  - id: CVE-2026-28386
    purls:
      - "pkg:apk/wolfi/openssl"
      - "pkg:apk/wolfi/libcrypto3"
      - "pkg:apk/wolfi/libssl3"
    expired_at: "2026-07-10T00:00:00Z"
    statement: >-
      OpenSSL AES-CFB128 out-of-bounds read on x86-64 with AVX-512 and
      VAES support (CVSS 9.1). Requires partial block processing at page
      boundary with unmapped following page. CFB mode is not used in
      TLS/DTLS and our application does not use AES-CFB128. No patched
      Wolfi package available yet. EPSS < 0.1%.
      Risk accepted: attack vector is unreachable in our images.
