name: Python Audit

on:
  schedule:
    - cron: "0 2 * * 1"  # Weekly Monday 2am UTC
  workflow_dispatch:

permissions: {}

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv

      - name: pip-audit
        run: uv run pip-audit
