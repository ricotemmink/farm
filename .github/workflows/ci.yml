name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Path filter: detect which domains changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/**'
              - 'atlas.hcl'
            dashboard:
              - 'web/**'
            docker:
              - 'docker/**'
              - '.dockerignore'

  # ── Python: Lint ──
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  # ── Schema: Migration Validation ──
  schema-validate:
    name: Schema Validation
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: atlas
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0.3
        with:
          cloud-token: ${{ secrets.ATLAS_TOKEN }}

      - name: Validate migration checksums
        run: atlas migrate validate --dir "file://src/synthorg/persistence/sqlite/revisions" --dev-url "sqlite://file?mode=memory"

      - name: Enforce at most one new migration per PR
        if: github.event_name == 'pull_request'
        env:
          GH_BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$GH_BASE_REF" --depth=1
          base_ref="origin/$GH_BASE_REF"
          mapfile -t new_migs < <(
            git diff --name-only --diff-filter=A "$base_ref"...HEAD -- \
              'src/synthorg/persistence/sqlite/revisions/*.sql'
          )
          count=${#new_migs[@]}
          if [ "$count" -gt 1 ]; then
            echo "::error::PR adds $count new Atlas migration files; policy allows at most 1."
            printf '  - %s\n' "${new_migs[@]}" >&2
            echo "" >&2
            echo "Consolidate into a single migration: delete all in-progress migrations" >&2
            echo "and regenerate with 'atlas migrate diff --env sqlite <name>'." >&2
            exit 1
          fi
          echo "OK: PR adds $count new migration(s) (limit 1)."

      - name: Drift detection
        run: |
          diff_output=$(atlas schema diff --env ci \
            --from "file://src/synthorg/persistence/sqlite/revisions" \
            --to "file://src/synthorg/persistence/sqlite/schema.sql")
          if echo "$diff_output" | grep -qv "Schemas are synced"; then
            echo "::error::Schema drift detected between revisions and schema.sql"
            echo "$diff_output"
            exit 1
          fi
          echo "$diff_output"
        # NOTE: atlas migrate lint (policy checks) requires Atlas Pro.
        # Add --env ci lint step here when Pro auth is available.

  # ── Python: Type Check ──
  type-check:
    name: Type Check
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv

      - name: mypy
        run: uv run mypy src/ tests/

  # ── Python: Test ──
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # Required for tokenless Codecov upload via use_oidc: true.
      id-token: write
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0.3

      - name: Run tests
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: |
          uv run python -m pytest tests/ \
            -n auto \
            --cov=synthorg \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --junitxml=junit.xml \
            --durations=20 \
            --durations-min=1.0

      # Codecov upload is best-effort -- CI should not fail on Codecov outages.
      # Coverage enforcement is handled by --cov-fail-under. Uses tokenless
      # OIDC upload for this public repo so no protected secrets are needed.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: junit.xml
          fail_ci_if_error: false
          report_type: test_results
          use_oidc: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit.xml

  # ── Python: Security Audit ──
  python-audit:
    name: Python Security Audit
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv

      - name: pip-audit
        run: uv run pip-audit

  # ── Docker: Dockerfile Lint ──
  dockerfile-lint:
    name: Dockerfile Lint
    needs: changes
    if: needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/backend/Dockerfile

      - name: Lint sandbox Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: docker/sandbox/Dockerfile

  # ── Dashboard: Lint ──
  dashboard-lint:
    name: Dashboard Lint
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  # ── Dashboard: Type Check ──
  dashboard-type-check:
    name: Dashboard Type Check
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run type-check
        working-directory: web

  # ── Dashboard: Test ──
  dashboard-test:
    name: Dashboard Test
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run test -- --coverage --detect-async-leaks
        working-directory: web

  # ── Dashboard: Build ──
  dashboard-build:
    name: Dashboard Build
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Production build
        run: npm run build
        working-directory: web

  # ── Dashboard: Security Audit ──
  dashboard-audit:
    name: Dashboard Security Audit
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: npm audit (critical + high)
        run: npm audit --audit-level=high
        working-directory: web

  # ── Dashboard: Storybook Build ──
  dashboard-storybook-build:
    name: Dashboard Storybook Build
    needs: changes
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Run npm run storybook:build -- --disable-telemetry
        run: npm run storybook:build -- --disable-telemetry
        working-directory: web
        env:
          # Prevent OOM-induced crashes on CI runners with limited RAM.
          # --report-on-fatalerror captures Node.js-level crashes (OOM,
          # assertions) but NOT native addon SIGSEGV -- those need OS
          # core dumps. --report-directory ensures reports land in a
          # predictable location for artifact upload.
          NODE_OPTIONS: "--max-old-space-size=4096 --report-on-fatalerror --report-directory=."
      - name: Upload Node.js crash report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-crash-report
          path: web/report.*.json
          if-no-files-found: ignore

  # ── Gate: all required checks passed ──
  ci-pass:
    name: CI Pass
    if: always()
    needs: [changes, lint, schema-validate, type-check, test, python-audit, dockerfile-lint, dashboard-lint, dashboard-type-check, dashboard-test, dashboard-build, dashboard-audit, dashboard-storybook-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check results
        env:
          # Jobs that were skipped (not needed) count as passing.
          # Only "failure" is a real failure.
          RESULTS: >-
            ${{ needs.changes.result }}
            ${{ needs.lint.result }}
            ${{ needs.schema-validate.result }}
            ${{ needs.type-check.result }}
            ${{ needs.test.result }}
            ${{ needs.python-audit.result }}
            ${{ needs.dockerfile-lint.result }}
            ${{ needs.dashboard-lint.result }}
            ${{ needs.dashboard-type-check.result }}
            ${{ needs.dashboard-test.result }}
            ${{ needs.dashboard-build.result }}
            ${{ needs.dashboard-audit.result }}
            ${{ needs.dashboard-storybook-build.result }}
        run: |
          # Any "failure" or "cancelled" in the results means CI failed.
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CI failed. Job results: $RESULTS"
            exit 1
          fi
          echo "All CI checks passed (some may have been skipped due to path filters)"
