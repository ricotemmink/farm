name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "docs/**"
      - "site/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/synthorg/**"
      - "scripts/**"
      - "cli/scripts/install.sh"
      - "cli/scripts/install.ps1"
      - ".github/actions/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    name: Build Site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # --- Zensical (documentation at /docs) ---
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.4"
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # D2 binary -- required by mkdocs-d2-plugin at build time.
      # D2 does not publish checksums or signatures in its releases --
      # integrity relies on HTTPS transport from GitHub. Accepted tradeoff:
      # D2 is a docs-only diagramming tool (not a security scanner).
      # Version managed by Renovate (regex manager in renovate.json).
      - name: Install D2
        env:
          # renovate: datasource=github-releases depName=terrastruct/d2
          D2_VERSION: v0.7.1
        run: |
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz" -o d2.tar.gz
          tar -xzf d2.tar.gz
          sudo mv "d2-${D2_VERSION}/bin/d2" /usr/local/bin/d2
          rm -rf d2.tar.gz "d2-${D2_VERSION}"
          d2 --version

      - name: Install docs dependencies
        run: uv sync --group docs --no-dev

      - name: Extract version
        id: version
        run: |
          VERSION=$(uv run python -c "
          import sys, tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          try:
              print(data['tool']['commitizen']['version'])
          except KeyError:
              print('::error::Missing [tool.commitizen].version in pyproject.toml', file=sys.stderr)
              sys.exit(1)
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Export OpenAPI schema
        run: uv run python scripts/export_openapi.py

      - name: Generate comparison page
        run: uv run python scripts/generate_comparison.py

      - name: Build docs
        # TODO: Restore --strict once zensical supports it
        # https://github.com/zensical/backlog/issues/72
        #
        # Retry up to 3 times with 15s backoff; matches the preview
        # workflow's resilience against transient D2 icon / pypi
        # fetches on main-branch builds.  State is scrubbed between
        # attempts so a flake cannot mask a deterministic failure.
        env:
          SYNTHORG_VERSION: ${{ steps.version.outputs.version }}
          PYTHONPATH: .
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            if uv run zensical build; then
              exit 0
            fi
            # Only log the retry + scrub state + sleep when another
            # attempt will actually follow; on the final iteration the
            # loop falls through to the error line below.
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "::warning::zensical build failed (attempt ${attempt}/${max_attempts}); retrying after 15s"
              rm -rf _site .d2-cache
              sleep 15
            fi
          done
          echo "::error::zensical build failed after ${max_attempts} attempts"
          exit 1

      - name: Patch sitemap with static OpenAPI artifacts
        run: uv run python scripts/patch_sitemap.py

      # --- Astro (landing page at /) ---
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"

      - name: Install Astro dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro
        working-directory: site
        run: npm run build

      # --- Copy install scripts into /get/ ---
      - name: Copy CLI install scripts into Astro output
        run: |
          mkdir -p site/dist/get
          cp cli/scripts/install.sh site/dist/get/install.sh
          cp cli/scripts/install.ps1 site/dist/get/install.ps1

      # --- Merge outputs ---
      - name: Merge Astro + Zensical into final output
        run: |
          # Guard against Astro accidentally producing a docs/ route
          if [ -d "site/dist/docs" ]; then
            echo "::error::Astro output contains 'docs/' directory which would overwrite Zensical output"
            exit 1
          fi
          # Astro output goes to root (use /. to avoid glob edge cases)
          cp -r site/dist/. _site/
          # Zensical output is already at _site/docs/ from the build step

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
