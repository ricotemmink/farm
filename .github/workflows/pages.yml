name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "site/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/synthorg/**"
      - "scripts/**"
      - "cli/scripts/install.sh"
      - "cli/scripts/install.ps1"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    name: Build Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # --- Zensical (documentation at /docs) ---
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install docs dependencies
        run: uv sync --group docs --no-dev

      - name: Export OpenAPI schema
        run: uv run python scripts/export_openapi.py

      - name: Build docs
        # TODO: Restore --strict once zensical supports it
        # https://github.com/zensical/backlog/issues/72
        run: uv run zensical build

      # --- Astro (landing page at /) ---
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install Astro dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro
        working-directory: site
        run: npm run build

      # --- Copy install scripts into /get/ ---
      - name: Copy CLI install scripts into Astro output
        run: |
          mkdir -p site/dist/get
          cp cli/scripts/install.sh site/dist/get/install.sh
          cp cli/scripts/install.ps1 site/dist/get/install.ps1

      # --- Merge outputs ---
      - name: Merge Astro + Zensical into final output
        run: |
          # Guard against Astro accidentally producing a docs/ route
          if [ -d "site/dist/docs" ]; then
            echo "::error::Astro output contains 'docs/' directory which would overwrite Zensical output"
            exit 1
          fi
          # Astro output goes to root (use /. to avoid glob edge cases)
          cp -r site/dist/. _site/
          # Zensical output is already at _site/docs/ from the build step

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
