name: CLI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Gate: detect if CLI files changed (for tag-triggered runs, always true) ──
  cli-changes:
    name: Detect CLI Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.cli || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          filters: |
            cli:
              - 'cli/**'

  # ── Lint ──
  cli-lint:
    name: CLI Lint
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: go vet
        working-directory: cli
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.3
          working-directory: cli

  # ── Test (multi-platform) ──
  cli-test:
    name: CLI Test (${{ matrix.os }})
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Run tests with race detector and coverage
        working-directory: cli
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: cli-coverage
          path: cli/coverage.out

  # ── Build (compile check for all targets) ──
  cli-build:
    name: CLI Build
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o /dev/null ./main.go

  # ── Vulnerability check ──
  cli-vuln:
    name: CLI Vulnerability Check
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        working-directory: cli
        run: govulncheck ./...

  # ── Fuzz (main only — too slow for PRs) ──
  cli-fuzz:
    name: CLI Fuzz
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - ./internal/compose/
          - ./internal/selfupdate/
          - ./internal/config/
          - ./internal/docker/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Run fuzz tests (30s per target)
        id: fuzz_run
        continue-on-error: true
        working-directory: cli
        run: |
          # Run each Fuzz* function in the package for 30s.
          # go test -fuzz only supports one fuzz target at a time,
          # so we discover and iterate.
          FUZZ_TARGETS=$(go test -list 'Fuzz.*' ${{ matrix.package }} 2>/dev/null | grep '^Fuzz' || true)
          if [ -z "$FUZZ_TARGETS" ]; then
            echo "No fuzz targets found in ${{ matrix.package }}"
            exit 0
          fi
          for target in $FUZZ_TARGETS; do
            echo "::group::Fuzzing $target"
            go test -fuzz="^${target}$" -fuzztime=30s ${{ matrix.package }}
            echo "::endgroup::"
          done

      - name: Report fuzz outcome
        if: always()
        env:
          FUZZ_OUTCOME: ${{ steps.fuzz_run.outcome }}
        run: |
          if [ "$FUZZ_OUTCOME" = "failure" ]; then
            echo "::warning::Fuzz target reported failures"
          fi

  # ── Gate: all CLI checks must pass ──
  cli-pass:
    name: CLI Pass
    if: always()
    needs: [cli-changes, cli-lint, cli-test, cli-build, cli-vuln, cli-fuzz]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check results
        env:
          RESULTS: >-
            ${{ needs.cli-changes.result }}
            ${{ needs.cli-lint.result }}
            ${{ needs.cli-test.result }}
            ${{ needs.cli-build.result }}
            ${{ needs.cli-vuln.result }}
            ${{ needs.cli-fuzz.result }}
        run: |
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CLI checks failed. Job results: $RESULTS"
            exit 1
          fi
          # cli-fuzz uses step-level continue-on-error, so fuzz findings
          # don't fail the job — only infra failures (checkout, setup-go)
          # propagate here. Fuzz warnings are emitted by the per-matrix
          # "Report fuzz outcome" step.
          echo "All CLI checks passed (some may have been skipped due to path filters)"

  # ── Release Build (GoReleaser, only on version tags) ──
  cli-release-build:
    name: CLI Release Build
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cli-lint, cli-test, cli-build, cli-vuln]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          # Disable caching in release job to prevent cache-poisoning (zizmor).
          cache: false

      - name: Wait for GitHub Release to exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Waiting for release $TAG..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG found."
              exit 0
            fi
            echo "Attempt $i: release not found yet, waiting 10s..."
            sleep 10
          done
          echo "Release $TAG not found after 5 minutes — proceeding anyway (GoReleaser will create if needed)."

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: v2.11.3
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate subject hashes for SLSA provenance
        id: hash
        working-directory: cli/dist
        run: |
          # GoReleaser writes checksums.txt in SLSA subjects format (hash  filename).
          if [ ! -f checksums.txt ] || [ ! -s checksums.txt ]; then
            echo "::error::checksums.txt is missing or empty"
            exit 1
          fi
          HASHES=$(cat checksums.txt | base64 -w0)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

  # ── Release Provenance (SLSA Level 3, only on version tags) ──
  cli-release-provenance:
    name: CLI Release Provenance
    needs: [cli-release-build]
    if: startsWith(github.ref, 'refs/tags/v') && needs.cli-release-build.result == 'success'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.cli-release-build.outputs.hashes }}"
      upload-assets: true
      provenance-name: cli-provenance.intoto.jsonl

  # ── Release Notes (appended after build + provenance) ──
  cli-release-notes:
    name: CLI Release Notes
    needs: [cli-release-build, cli-release-provenance]
    if: always() && needs.cli-release-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append install instructions, checksums, and provenance to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE_RESULT: ${{ needs.cli-release-provenance.result }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Download checksums from the release we just published.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "checksums.txt" --dir /tmp

          # Extract per-platform checksums.
          get_checksum() { awk -v name="$1" '$2 == name { print $1 }' /tmp/checksums.txt; }
          CS_linux_amd64="$(get_checksum synthorg_linux_amd64.tar.gz)"
          CS_linux_arm64="$(get_checksum synthorg_linux_arm64.tar.gz)"
          CS_darwin_amd64="$(get_checksum synthorg_darwin_amd64.tar.gz)"
          CS_darwin_arm64="$(get_checksum synthorg_darwin_arm64.tar.gz)"
          CS_windows_amd64="$(get_checksum synthorg_windows_amd64.zip)"
          CS_windows_arm64="$(get_checksum synthorg_windows_arm64.zip)"

          # Build install instructions + checksum table.
          INSTALL_NOTES="$(cat <<NOTES

          ---

          ## Installation

          **Linux / macOS:**
          \`\`\`bash
          curl -sSfL https://raw.githubusercontent.com/Aureliolo/synthorg/${TAG}/cli/scripts/install.sh | SYNTHORG_VERSION=${TAG} bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          \\\$env:SYNTHORG_VERSION='${TAG}'; irm https://raw.githubusercontent.com/Aureliolo/synthorg/${TAG}/cli/scripts/install.ps1 | iex
          \`\`\`

          ### Checksums (SHA-256)

          | Archive | SHA-256 |
          |---------|---------|
          | \`synthorg_linux_amd64.tar.gz\` | \`${CS_linux_amd64}\` |
          | \`synthorg_linux_arm64.tar.gz\` | \`${CS_linux_arm64}\` |
          | \`synthorg_darwin_amd64.tar.gz\` | \`${CS_darwin_amd64}\` |
          | \`synthorg_darwin_arm64.tar.gz\` | \`${CS_darwin_arm64}\` |
          | \`synthorg_windows_amd64.zip\` | \`${CS_windows_amd64}\` |
          | \`synthorg_windows_arm64.zip\` | \`${CS_windows_arm64}\` |
          NOTES
          )"

          # Conditionally add provenance verification section.
          PROVENANCE_NOTES=""
          if [ "$PROVENANCE_RESULT" = "success" ]; then
            PROVENANCE_NOTES="$(cat <<PROV

          ### Provenance Verification (SLSA Level 3)

          Verify the provenance of any archive with [slsa-verifier](https://github.com/slsa-framework/slsa-verifier):
          \`\`\`bash
          slsa-verifier verify-artifact synthorg_linux_amd64.tar.gz \\
            --provenance-path cli-provenance.intoto.jsonl \\
            --source-uri github.com/Aureliolo/synthorg \\
            --source-tag ${TAG}
          \`\`\`
          PROV
            )"
          fi

          # Fetch existing body and append.
          EXISTING_BODY="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body)"
          FULL_BODY="${EXISTING_BODY}${INSTALL_NOTES}${PROVENANCE_NOTES}"

          tmpfile="$(mktemp)"
          printf '%s' "$FULL_BODY" > "$tmpfile"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$tmpfile"
          rm -f "$tmpfile"

          echo "Release notes updated with install instructions, checksums, and provenance."
