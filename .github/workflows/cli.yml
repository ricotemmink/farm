name: CLI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Gate: detect if CLI files changed (for tag-triggered runs, always true) ──
  cli-changes:
    name: Detect CLI Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.cli || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          filters: |
            cli:
              - 'cli/**'

  # ── Lint ──
  cli-lint:
    name: CLI Lint
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: go vet
        working-directory: cli
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.3
          working-directory: cli

  # ── Test (multi-platform) ──
  cli-test:
    name: CLI Test (${{ matrix.os }})
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Run tests with race detector and coverage
        working-directory: cli
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: cli-coverage
          path: cli/coverage.out

  # ── Build (compile check for all targets) ──
  cli-build:
    name: CLI Build
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o /dev/null ./main.go

  # ── Vulnerability check ──
  cli-vuln:
    name: CLI Vulnerability Check
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        working-directory: cli
        run: govulncheck ./...

  # ── Fuzz (main only — too slow for PRs) ──
  cli-fuzz:
    name: CLI Fuzz
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - ./internal/compose/
          - ./internal/selfupdate/
          - ./internal/config/
          - ./internal/docker/
          - ./internal/verify/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Run fuzz tests (30s per target)
        id: fuzz_run
        continue-on-error: true
        working-directory: cli
        run: |
          # Run each Fuzz* function in the package for 30s.
          # go test -fuzz only supports one fuzz target at a time,
          # so we discover and iterate.
          FUZZ_TARGETS=$(go test -list 'Fuzz.*' ${{ matrix.package }} 2>/dev/null | grep '^Fuzz' || true)
          if [ -z "$FUZZ_TARGETS" ]; then
            echo "No fuzz targets found in ${{ matrix.package }}"
            exit 0
          fi
          for target in $FUZZ_TARGETS; do
            echo "::group::Fuzzing $target"
            go test -fuzz="^${target}$" -fuzztime=30s ${{ matrix.package }}
            echo "::endgroup::"
          done

      - name: Report fuzz outcome
        if: always()
        env:
          FUZZ_OUTCOME: ${{ steps.fuzz_run.outcome }}
        run: |
          if [ "$FUZZ_OUTCOME" = "failure" ]; then
            echo "::warning::Fuzz target reported failures"
          fi

  # ── Gate: all CLI checks must pass ──
  cli-pass:
    name: CLI Pass
    if: always()
    needs: [cli-changes, cli-lint, cli-test, cli-build, cli-vuln, cli-fuzz]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check results
        env:
          RESULTS: >-
            ${{ needs.cli-changes.result }}
            ${{ needs.cli-lint.result }}
            ${{ needs.cli-test.result }}
            ${{ needs.cli-build.result }}
            ${{ needs.cli-vuln.result }}
            ${{ needs.cli-fuzz.result }}
        run: |
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CLI checks failed. Job results: $RESULTS"
            exit 1
          fi
          # cli-fuzz uses step-level continue-on-error, so fuzz findings
          # don't fail the job — only infra failures (checkout, setup-go)
          # propagate here. Fuzz warnings are emitted by the per-matrix
          # "Report fuzz outcome" step.
          echo "All CLI checks passed (some may have been skipped due to path filters)"

  # ── Release (GoReleaser + provenance, only on version tags) ──
  cli-release:
    name: CLI Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cli-lint, cli-test, cli-build, cli-vuln]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: cli/go.mod
          # Disable caching in release job to prevent cache-poisoning (zizmor).
          cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1

      - name: Wait for GitHub Release to exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Waiting for release $TAG..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG found."
              exit 0
            fi
            echo "Attempt $i: release not found yet, waiting 10s..."
            sleep 10
          done
          echo "Release $TAG not found after 5 minutes — proceeding, but the next upload step will fail if the draft release is missing."

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: v2.14.3
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate checksums file
        run: |
          if [ ! -f cli/dist/checksums.txt ] || [ ! -s cli/dist/checksums.txt ]; then
            echo "::error::cli/dist/checksums.txt is missing or empty — GoReleaser may have failed"
            exit 1
          fi

      - name: Sign checksums with cosign (keyless)
        run: |
          cosign sign-blob --yes cli/dist/checksums.txt \
            --bundle cli/dist/checksums.txt.cosign.bundle

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # gh release upload finds draft releases (unlike GoReleaser's API).
          # --clobber overwrites if assets already exist (idempotent on re-run).
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            cli/dist/*.tar.gz cli/dist/*.zip cli/dist/*.cdx.json \
            cli/dist/checksums.txt cli/dist/checksums.txt.cosign.bundle

      - name: Attest build provenance (SLSA Level 3)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # subject-checksums treats the file as a manifest: attests every
          # binary archive listed inside it (the primary SLSA L3 attestations).
          subject-checksums: cli/dist/checksums.txt

      - name: Attest checksums file provenance
        id: attest-checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # subject-path attests the checksums.txt file itself; bundle-path
          # output is uploaded as .sigstore.json for OpenSSF Scorecard scoring.
          subject-path: cli/dist/checksums.txt

      - name: Upload provenance bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE: ${{ steps.attest-checksums.outputs.bundle-path }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "::error::Attestation bundle not found at '$BUNDLE'"
            exit 1
          fi
          cp "$BUNDLE" cli/dist/checksums.txt.sigstore.json

          # Extract DSSE envelope as .intoto.jsonl for OpenSSF Scorecard
          # provenance detection (Scorecard recognises .intoto.jsonl but
          # classifies .sigstore.json as a signature, not provenance).
          jq -e -c '.dsseEnvelope' "$BUNDLE" > cli/dist/checksums.txt.intoto.jsonl

          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            cli/dist/checksums.txt.sigstore.json \
            cli/dist/checksums.txt.intoto.jsonl

      - name: Append CLI installation and checksums to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Download checksums from the release assets.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "checksums.txt" --dir /tmp

          # Extract per-platform checksums.
          get_checksum() { awk -v name="$1" '$2 == name { print $1 }' /tmp/checksums.txt; }
          CS_linux_amd64="$(get_checksum synthorg_linux_amd64.tar.gz)"
          CS_linux_arm64="$(get_checksum synthorg_linux_arm64.tar.gz)"
          CS_darwin_amd64="$(get_checksum synthorg_darwin_amd64.tar.gz)"
          CS_darwin_arm64="$(get_checksum synthorg_darwin_arm64.tar.gz)"
          CS_windows_amd64="$(get_checksum synthorg_windows_amd64.zip)"
          CS_windows_arm64="$(get_checksum synthorg_windows_arm64.zip)"

          # Build CLI section + hidden verification data for finalize-release.
          CLI_SECTION="$(cat <<NOTES

          ---

          ## CLI Installation

          **Linux / macOS:**
          \`\`\`bash
          curl -sSfL https://synthorg.io/get/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://synthorg.io/get/install.ps1 | iex
          \`\`\`

          > **Pin to this release:** set \`SYNTHORG_VERSION=${TAG}\` before running
          > (bash: \`export SYNTHORG_VERSION=${TAG}\` · PowerShell: \`\$env:SYNTHORG_VERSION='${TAG}'\`).
          >
          > **New to SynthOrg?** See the [Getting Started guide](https://synthorg.io/get/).

          <!-- CLI_VERIFICATION_DATA
          | Archive | SHA-256 |
          |---------|---------|
          | \`synthorg_linux_amd64.tar.gz\` | \`${CS_linux_amd64}\` |
          | \`synthorg_linux_arm64.tar.gz\` | \`${CS_linux_arm64}\` |
          | \`synthorg_darwin_amd64.tar.gz\` | \`${CS_darwin_amd64}\` |
          | \`synthorg_darwin_arm64.tar.gz\` | \`${CS_darwin_arm64}\` |
          | \`synthorg_windows_amd64.zip\` | \`${CS_windows_amd64}\` |
          | \`synthorg_windows_arm64.zip\` | \`${CS_windows_arm64}\` |

          \`\`\`bash
          gh attestation verify synthorg_linux_amd64.tar.gz -R Aureliolo/synthorg
          \`\`\`
          Replace the filename with any archive from this release.
          CLI_VERIFICATION_DATA -->

          <!-- CLI_COSIGN_DATA
          \`\`\`bash
          cosign verify-blob checksums.txt \\
            --bundle checksums.txt.cosign.bundle \\
            --certificate-identity-regexp='github\\.com/Aureliolo/synthorg' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          \`\`\`
          CLI_COSIGN_DATA -->

          <!-- CLI_SLSA_BUNDLE_DATA
          \`\`\`bash
          cosign verify-blob-attestation checksums.txt \\
            --bundle checksums.txt.sigstore.json \\
            --type slsaprovenance1 \\
            --certificate-identity-regexp='github\\.com/Aureliolo/synthorg' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          \`\`\`
          CLI_SLSA_BUNDLE_DATA -->

          <!-- CLI_SBOM_DATA
          CLI binary SBOMs (CycloneDX JSON):
          - \`synthorg_linux_amd64.tar.gz.cdx.json\`
          - \`synthorg_linux_arm64.tar.gz.cdx.json\`
          - \`synthorg_darwin_amd64.tar.gz.cdx.json\`
          - \`synthorg_darwin_arm64.tar.gz.cdx.json\`
          - \`synthorg_windows_amd64.zip.cdx.json\`
          - \`synthorg_windows_arm64.zip.cdx.json\`
          CLI_SBOM_DATA -->
          NOTES
          )"

          # Idempotent: strip existing CLI Installation section (+ preceding ---) before appending.
          # Uses awk to buffer --- lines so the separator doesn't accumulate on re-runs.
          EXISTING_BODY="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body)"
          CLEANED_BODY="$(printf '%s' "$EXISTING_BODY" | awk '
            /^---$/ { buf=$0; next }
            /^## CLI Installation$/ { buf=""; skip=1; next }
            { if(buf!="") print buf; buf="" }
            /^## / { skip=0 }
            !skip
          ')"
          FULL_BODY="${CLEANED_BODY}${CLI_SECTION}"

          tmpfile="$(mktemp)"
          trap 'rm -f "$tmpfile"' EXIT
          printf '%s' "$FULL_BODY" > "$tmpfile"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$tmpfile"

          echo "Release notes updated with install instructions, checksums, and provenance."
