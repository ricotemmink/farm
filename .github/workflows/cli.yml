name: CLI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Gate: detect if CLI files changed (for tag-triggered runs, always true) ──
  cli-changes:
    name: Detect CLI Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.cli || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          filters: |
            cli:
              - 'cli/**'

  # ── Lint ──
  cli-lint:
    name: CLI Lint
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: go vet
        working-directory: cli
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11.3
          working-directory: cli

  # ── Test (multi-platform) ──
  cli-test:
    name: CLI Test (${{ matrix.os }})
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Run tests with race detector and coverage
        working-directory: cli
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: ${{ !cancelled() && matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: cli-coverage
          path: cli/coverage.out

  # ── Build (compile check for all targets) ──
  cli-build:
    name: CLI Build
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o /dev/null ./main.go

  # ── Vulnerability check ──
  cli-vuln:
    name: CLI Vulnerability Check
    needs: cli-changes
    if: needs.cli-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: cli/go.mod
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        working-directory: cli
        run: govulncheck ./...

  # ── Gate: all CLI checks must pass ──
  cli-pass:
    name: CLI Pass
    if: always()
    needs: [cli-changes, cli-lint, cli-test, cli-build, cli-vuln]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check results
        env:
          RESULTS: >-
            ${{ needs.cli-changes.result }}
            ${{ needs.cli-lint.result }}
            ${{ needs.cli-test.result }}
            ${{ needs.cli-build.result }}
            ${{ needs.cli-vuln.result }}
        run: |
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CLI checks failed. Job results: $RESULTS"
            exit 1
          fi
          echo "All CLI checks passed (some may have been skipped due to path filters)"

  # ── Release (GoReleaser, only on version tags) ──
  cli-release:
    name: CLI Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cli-lint, cli-test, cli-build, cli-vuln]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: cli/go.mod
          # Disable caching in release job to prevent cache-poisoning (zizmor).
          cache: false

      - name: Wait for GitHub Release to exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Waiting for release $TAG..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG found."
              exit 0
            fi
            echo "Attempt $i: release not found yet, waiting 10s..."
            sleep 10
          done
          echo "Release $TAG not found after 5 minutes — proceeding anyway (GoReleaser will create if needed)."

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          version: v2.11.3
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append install instructions and checksums to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Download checksums from the release we just published.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "checksums.txt" --dir /tmp

          # Extract per-platform checksums.
          get_checksum() { awk -v name="$1" '$2 == name { print $1 }' /tmp/checksums.txt; }
          CS_linux_amd64="$(get_checksum synthorg_linux_amd64.tar.gz)"
          CS_linux_arm64="$(get_checksum synthorg_linux_arm64.tar.gz)"
          CS_darwin_amd64="$(get_checksum synthorg_darwin_amd64.tar.gz)"
          CS_darwin_arm64="$(get_checksum synthorg_darwin_arm64.tar.gz)"
          CS_windows_amd64="$(get_checksum synthorg_windows_amd64.zip)"
          CS_windows_arm64="$(get_checksum synthorg_windows_arm64.zip)"

          # Build install instructions + checksum table.
          INSTALL_NOTES="$(cat <<NOTES

          ---

          ## Installation

          **Linux / macOS:**
          \`\`\`bash
          curl -sSfL https://raw.githubusercontent.com/Aureliolo/synthorg/${TAG}/cli/scripts/install.sh | SYNTHORG_VERSION=${TAG} bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          \\\$env:SYNTHORG_VERSION='${TAG}'; irm https://raw.githubusercontent.com/Aureliolo/synthorg/${TAG}/cli/scripts/install.ps1 | iex
          \`\`\`

          ### Checksums (SHA-256)

          | Archive | SHA-256 |
          |---------|---------|
          | \`synthorg_linux_amd64.tar.gz\` | \`${CS_linux_amd64}\` |
          | \`synthorg_linux_arm64.tar.gz\` | \`${CS_linux_arm64}\` |
          | \`synthorg_darwin_amd64.tar.gz\` | \`${CS_darwin_amd64}\` |
          | \`synthorg_darwin_arm64.tar.gz\` | \`${CS_darwin_arm64}\` |
          | \`synthorg_windows_amd64.zip\` | \`${CS_windows_amd64}\` |
          | \`synthorg_windows_arm64.zip\` | \`${CS_windows_arm64}\` |
          NOTES
          )"

          # Fetch existing body and append.
          EXISTING_BODY="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body)"
          FULL_BODY="${EXISTING_BODY}${INSTALL_NOTES}"

          tmpfile="$(mktemp)"
          printf '%s' "$FULL_BODY" > "$tmpfile"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$tmpfile"
          rm -f "$tmpfile"

          echo "Release notes updated with install instructions and checksums."
