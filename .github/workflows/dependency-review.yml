name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          # LicenseRef-scancode-free-unknown: aiosqlite 0.21.0 -- MIT per classifiers, scancode misdetects
          # Python-2.0.1: editorconfig 0.17.1 (via jsbeautifier via litestar[standard])
          # MIT-0: cffi 2.0.0 -- permissive (MIT variant, no attribution required)
          # LicenseRef-scancode-free-unknown: aiosqlite 0.21.0, aiodocker 0.26.0,
          #   pycparser 3.0, sse-starlette 3.3.2 -- MIT per classifiers, scancode misdetects
          # LGPL-*: @img/sharp-libvips-* (Astro image optimization, build-time only)
          # BlueOak-1.0.0: lru-cache, sax (Astro transitive deps, permissive)
          # LicenseRef-scancode-protobuf: protobuf 5.29.6 (BSD-3-Clause AND scancode-protobuf, permissive)
          # ZPL-2.1: pytz 2026.1 (MIT AND ZPL-2.1, Zope Public License -- permissive)
          # Null: mem0ai, numpy, qdrant-client, posthog -- license metadata missing
          #   from lockfile but all are permissive (Apache-2.0 / BSD-3-Clause / MIT)
          # LicenseRef-scancode-google-patent-license-golang: golang.org/x/* packages
          #   (BSD-3-Clause AND google-patent-grant, standard Go stdlib-adjacent, permissive)
          # CC-BY-3.0, CC-BY-4.0: Creative Commons Attribution -- permissive, requires
          #   attribution only. Common in Go struct-tag and documentation-related packages.
          # OFL-1.1: SIL Open Font License -- standard font license used by
          #   @fontsource-variable/geist (Geist font). Permissive, requires
          #   attribution and no selling fonts standalone.
          allow-licenses: >-
            MIT, MIT-0, Apache-2.0, BSD-2-Clause, BSD-3-Clause,
            ISC, MPL-2.0, PSF-2.0, Unlicense, 0BSD,
            CC0-1.0, CC-BY-3.0, CC-BY-4.0,
            Python-2.0, Python-2.0.1,
            LicenseRef-scancode-free-unknown, LicenseRef-scancode-protobuf,
            LicenseRef-scancode-google-patent-license-golang,
            ZPL-2.1,
            LGPL-2.0-only, LGPL-2.1-only, LGPL-3.0-only, LGPL-3.0-or-later,
            BlueOak-1.0.0,
            OFL-1.1
          # Packages with null/missing SPDX license metadata in lockfile.
          # Verified manually: mem0ai (Apache-2.0), numpy (BSD-3-Clause),
          # qdrant-client (Apache-2.0), posthog (MIT).
          # sharp platform binaries use compound AND licenses (e.g.
          # "Apache-2.0 AND LGPL-3.0-or-later") -- all constituents are
          # in the allowlist but the action doesn't split AND expressions.
          # CI-only transitive dep via wrangler, no licensing impact.
          #
          # json-schema-typed (BSD-2-Clause AND JSON): transitive dep via
          # shadcn/radix. The "JSON" license has a non-standard "Good, not
          # Evil" clause. Dev-only type definition package, not bundled in
          # production output. The action cannot split compound AND licenses.
          #
          # golangci-lint (GPL-3.0) and its GPL/compound-licensed linter deps:
          # These are dev-only tool dependencies declared via `tool` directive
          # in cli/go.mod. They are never compiled into the SynthOrg binary --
          # only invoked during development and CI linting. GPL copyleft does
          # not apply to the project output. The action cannot distinguish
          # tool deps from runtime deps, so they need per-package exemptions.
          allow-dependencies-licenses: >-
            pkg:pypi/mem0ai@1.0.5,
            pkg:pypi/numpy@2.4.3,
            pkg:pypi/qdrant-client@1.17.0,
            pkg:pypi/posthog@7.9.12,
            pkg:npm/@img/sharp-wasm32@0.33.5,
            pkg:npm/@img/sharp-win32-ia32@0.33.5,
            pkg:npm/@img/sharp-win32-x64@0.33.5,
            pkg:golang/github.com/golangci/golangci-lint/v2@2.11.3,
            pkg:golang/github.com/denis-tingaikin/go-header@0.5.0,
            pkg:golang/github.com/ldez/structtags@0.6.1,
            pkg:golang/github.com/leonklingele/grouper@1.1.2,
            pkg:golang/github.com/xen0n/gosmopolitan@1.3.0,
            pkg:golang/github.com/alfatraining/structtag@1.0.0,
            pkg:golang/github.com/fatih/structtag@1.2.0,
            pkg:npm/json-schema-typed@8.0.2
          comment-summary-in-pr: always
