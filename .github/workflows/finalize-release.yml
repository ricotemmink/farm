name: Finalize Release

# Publish draft releases once both CLI and Docker workflows succeed.
# Release Please creates draft releases (immutable once published),
# then CLI (GoReleaser) and Docker (GHCR) attach assets to the draft.
# This workflow fires on each completion and publishes when both are done.

on:
  # zizmor: ignore[dangerous-triggers] -- safe: no checkout, no untrusted code
  # execution; only queries workflow status via gh CLI and publishes a draft
  # release. Guarded by event != 'pull_request' and startsWith(head_branch, 'v').
  workflow_run:
    workflows: [Docker, CLI]
    types: [completed]

permissions: {}

# Finalize Release publishes a draft release (immutable after publish)
# and deletes dev pre-release tags. Cancelling in-flight would leave the
# draft half-published and the dev-tag cleanup partially applied --
# ``cancel-in-progress: false`` keeps concurrent reruns serialised per
# tag without clobbering each other. Concurrent stable tags still run
# in parallel because the group key includes the tag name.
concurrency:
  group: finalize-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Draft Release
    # Only process tag-triggered release builds, not PR-triggered runs.
    # The event != 'pull_request' guard prevents a PR that modifies the
    # Docker/CLI workflows from reaching this privileged publish step.
    # Both stable (v0.4.7) and dev (v0.4.7-dev.3) releases go through the
    # same draft -> finalize pipeline.
    if: >-
      github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_repository.full_name == github.repository
      && startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check both workflows and publish draft
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail

          echo "Triggered by: $WORKFLOW_NAME"
          echo "Tag: $TAG"
          echo "Triggering run conclusion: $WORKFLOW_CONCLUSION"

          # If the triggering workflow failed, no point checking the other
          if [ "$WORKFLOW_CONCLUSION" != "success" ]; then
            echo "Triggering workflow failed -- skipping."
            exit 0
          fi

          # Check status of both workflows for this tag.
          # gh run list --branch works for both branches and tags.
          # --status completed filters out in-progress re-triggered runs.
          CLI_CONCLUSION=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow cli.yml --branch "$TAG" --event push --commit "$HEAD_SHA" \
            --limit 1 --status completed \
            --json conclusion --jq '.[0].conclusion // "pending"')

          DOCKER_CONCLUSION=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow docker.yml --branch "$TAG" --event push --commit "$HEAD_SHA" \
            --limit 1 --status completed \
            --json conclusion --jq '.[0].conclusion // "pending"')

          echo "CLI: $CLI_CONCLUSION"
          echo "Docker: $DOCKER_CONCLUSION"

          if [ "$CLI_CONCLUSION" != "success" ] || [ "$DOCKER_CONCLUSION" != "success" ]; then
            echo "Not all workflows succeeded yet (CLI=$CLI_CONCLUSION, Docker=$DOCKER_CONCLUSION)."
            echo "The other workflow's completion will trigger another attempt."
            exit 0
          fi

          # Both succeeded -- check if release exists and is still a draft
          if ! IS_DRAFT=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
              --json isDraft --jq '.isDraft' 2>/dev/null); then
            echo "Release $TAG not found -- nothing to publish."
            exit 0
          fi

          if [ "$IS_DRAFT" != "true" ]; then
            echo "Release $TAG is not a draft (isDraft=$IS_DRAFT). Already published."
            # Still signal published so the cleanup step can run on reruns
            echo "published=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Assemble combined Verification section ──
          # CLI and Docker workflows embed verification data in HTML comments.
          # Extract, strip markers, and append as a visible Verification section.
          BODY="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')"

          CLI_CHECKSUMS=""
          CLI_SLSA=""
          if grep -q "CLI_VERIFICATION_DATA" <<< "$BODY"; then
            CLI_CHECKSUMS=$(sed -n '/<!-- CLI_VERIFICATION_DATA/,/CLI_VERIFICATION_DATA -->/p' <<< "$BODY" \
              | sed '1d;$d' | grep -E '^\|' || true)
            CLI_SLSA=$(sed -n '/<!-- CLI_VERIFICATION_DATA/,/CLI_VERIFICATION_DATA -->/p' <<< "$BODY" \
              | sed '1d;$d' | sed -n '/^```bash$/,/^```$/p' || true)
            if [ -z "$CLI_CHECKSUMS" ]; then
              echo "::warning::CLI checksums table not found in release body"
            fi
            if [ -z "$CLI_SLSA" ]; then
              echo "::warning::CLI SLSA provenance commands not found in release body"
            fi
          fi

          CLI_COSIGN=""
          if grep -q "CLI_COSIGN_DATA" <<< "$BODY"; then
            CLI_COSIGN=$(sed -n '/<!-- CLI_COSIGN_DATA/,/CLI_COSIGN_DATA -->/p' <<< "$BODY" \
              | sed '1d;$d' | sed -n '/^```bash$/,/^```$/p' || true)
            if [ -z "$CLI_COSIGN" ]; then
              echo "::warning::CLI cosign verification data not found in release body"
            fi
          fi

          CLI_SLSA_BUNDLE=""
          if grep -q "CLI_SLSA_BUNDLE_DATA" <<< "$BODY"; then
            CLI_SLSA_BUNDLE=$(sed -n '/<!-- CLI_SLSA_BUNDLE_DATA/,/CLI_SLSA_BUNDLE_DATA -->/p' <<< "$BODY" \
              | sed '1d;$d' | sed -n '/^```bash$/,/^```$/p' || true)
            if [ -z "$CLI_SLSA_BUNDLE" ]; then
              echo "::warning::CLI SLSA bundle verification data not found in release body"
            fi
          fi

          CONTAINER_SBOM=""
          if grep -q "CONTAINER_SBOM_DATA" <<< "$BODY"; then
            CONTAINER_SBOM=$(sed -n '/<!-- CONTAINER_SBOM_DATA/,/CONTAINER_SBOM_DATA -->/p' <<< "$BODY" \
              | sed '1d;$d' | grep -E '^\- ' || true)
            if [ -z "$CONTAINER_SBOM" ]; then
              echo "::warning::Container SBOM data not found in release body"
            fi
          fi

          CONTAINER_COSIGN=""
          CONTAINER_SLSA=""
          if grep -q "CONTAINER_VERIFICATION_DATA" <<< "$BODY"; then
            CONTAINER_INNER=$(sed -n '/<!-- CONTAINER_VERIFICATION_DATA/,/CONTAINER_VERIFICATION_DATA -->/p' <<< "$BODY" | sed '1d;$d')
            # Extract first and second ```bash...``` code blocks using line-by-line awk.
            # (awk paragraph mode RS= breaks on blank lines inside code blocks.)
            CONTAINER_COSIGN=$(awk '
              /^```bash$/ { n++; p=1 }
              p && n==1
              /^```$/ && p && n==1 { p=0; exit }
            ' <<< "$CONTAINER_INNER" || true)
            CONTAINER_SLSA=$(awk '
              /^```bash$/ { n++; if(n==2) p=1 }
              p && n==2
              /^```$/ && p && n==2 { p=0; exit }
            ' <<< "$CONTAINER_INNER" || true)
            if [ -z "$CONTAINER_COSIGN" ]; then
              echo "::warning::Container cosign verification data not found in release body"
            fi
            if [ -z "$CONTAINER_SLSA" ]; then
              echo "::warning::Container SLSA provenance data not found in release body"
            fi
          fi

          # Build the combined Verification section
          VERIFICATION=""
          if [ -n "$CLI_CHECKSUMS" ] || [ -n "$CLI_COSIGN" ] || [ -n "$CLI_SLSA_BUNDLE" ] || [ -n "$CONTAINER_COSIGN" ] || [ -n "$CLI_SLSA" ] || [ -n "$CONTAINER_SLSA" ] || [ -n "$CONTAINER_SBOM" ]; then
            VERIFICATION="$(printf '\n<!-- FINALIZE_VERIFICATION -->\n\n---\n\n## Verification\n')"

            if [ -n "$CLI_CHECKSUMS" ]; then
              VERIFICATION="$(printf '%s\n\n### CLI Checksums (SHA-256)\n\n%s\n' "$VERIFICATION" "$CLI_CHECKSUMS")"
            fi

            if [ -n "$CLI_COSIGN" ]; then
              VERIFICATION="$(printf '%s\n\n### CLI Binary Signatures\n\n%s\n' "$VERIFICATION" "$CLI_COSIGN")"
            fi

            if [ -n "$CLI_SLSA_BUNDLE" ]; then
              VERIFICATION="$(printf '%s\n\n### CLI Provenance Bundle\n\nVerify the Sigstore provenance bundle (`.sigstore.json`):\n\n%s\n' "$VERIFICATION" "$CLI_SLSA_BUNDLE")"
            fi

            if [ -n "$CONTAINER_COSIGN" ]; then
              VERIFICATION="$(printf '%s\n\n### Container Image Signatures\n\n%s\n' "$VERIFICATION" "$CONTAINER_COSIGN")"
            fi

            # Combined SLSA provenance
            SLSA_BLOCK=""
            if [ -n "$CLI_SLSA" ]; then
              SLSA_BLOCK="$CLI_SLSA"
            fi
            if [ -n "$CONTAINER_SLSA" ]; then
              if [ -n "$SLSA_BLOCK" ]; then
                # Merge: strip closing ``` from CLI, strip opening ```bash from container
                CLI_COMMANDS=$(printf '%s' "$CLI_SLSA" | sed '1d' | sed '/^```$/d')
                CONTAINER_COMMANDS=$(printf '%s' "$CONTAINER_SLSA" | sed '1d' | sed '/^```$/d')
                SLSA_BLOCK="$(printf '```bash\n%s\n\n%s\n```' "$CLI_COMMANDS" "$CONTAINER_COMMANDS")"
              else
                SLSA_BLOCK="$CONTAINER_SLSA"
              fi
            fi

            if [ -n "$SLSA_BLOCK" ]; then
              VERIFICATION="$(printf '%s\n\n### Provenance (SLSA Level 3)\n\nVerify with the [GitHub CLI](https://cli.github.com/):\n\n%s\n' "$VERIFICATION" "$SLSA_BLOCK")"
            fi

            # SBOM subsection
            SBOM_ITEMS=""
            if [ -n "$CONTAINER_SBOM" ]; then
              SBOM_ITEMS="$(printf '**Container images:**\n%s\n' "$CONTAINER_SBOM")"
            fi
            if [ -n "$SBOM_ITEMS" ]; then
              VERIFICATION="$(printf '%s\n\n### Software Bill of Materials (SBOM)\n\nCycloneDX JSON SBOMs are attached to this release as downloadable assets.\n\n%s\n' "$VERIFICATION" "$SBOM_ITEMS")"
            fi
          fi

          # Strip and re-append only when we have a replacement. If VERIFICATION
          # is empty (no data extracted), leave the body untouched to avoid
          # destroying an existing Verification section with no replacement.
          if [ -n "$VERIFICATION" ]; then
            CLEANED=$(printf '%s' "$BODY" \
              | sed '/<!-- CLI_VERIFICATION_DATA/,/CLI_VERIFICATION_DATA -->/d' \
              | sed '/<!-- CLI_COSIGN_DATA/,/CLI_COSIGN_DATA -->/d' \
              | sed '/<!-- CLI_SLSA_BUNDLE_DATA/,/CLI_SLSA_BUNDLE_DATA -->/d' \
              | sed '/<!-- CONTAINER_VERIFICATION_DATA/,/CONTAINER_VERIFICATION_DATA -->/d' \
              | sed '/<!-- CONTAINER_SBOM_DATA/,/CONTAINER_SBOM_DATA -->/d' \
              | sed '/^<!-- FINALIZE_VERIFICATION -->/,$d')
            FINAL="${CLEANED}${VERIFICATION}"
          else
            FINAL="$BODY"
          fi

          tmpfile="$(mktemp)"
          trap 'rm -f "$tmpfile"' EXIT
          printf '%s' "$FINAL" > "$tmpfile"
          if gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$tmpfile"; then
            echo "Release body assembled with combined Verification section."
          else
            if [ -n "$VERIFICATION" ]; then
              echo "::error::Failed to update release body -- verification data would be lost. Not publishing."
              exit 1
            else
              echo "::warning::Failed to update release body (no verification data to lose -- proceeding)"
            fi
          fi

          # ── Publish the draft release (makes it immutable) ──
          # Handle TOCTOU race: if a concurrent run published first, the second
          # call may fail with 422 (immutable). Re-check and exit cleanly.
          if gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false; then
            echo "Release $TAG published successfully."
          else
            IS_DRAFT_NOW=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
              --json isDraft --jq '.isDraft' 2>/dev/null || echo "unknown")
            if [ "$IS_DRAFT_NOW" = "false" ]; then
              echo "Release $TAG was already published by a concurrent run -- OK."
            else
              echo "::error::Failed to publish release $TAG (isDraft=$IS_DRAFT_NOW)"
              exit 1
            fi
          fi

          # Signal to subsequent steps that publish succeeded
          echo "published=true" >> "$GITHUB_OUTPUT"

      # ── Clean up ALL dev pre-releases and tags after a stable release ──
      # Deletes every release and tag matching vX.Y.Z-dev.N, regardless of
      # draft/published/pre-release status. Only runs when a stable release
      # was just published (not for dev releases themselves).
      - name: Clean up dev pre-releases and tags
        if: >-
          steps.publish.outputs.published == 'true'
          && !contains(github.event.workflow_run.head_branch, '-dev.')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          # Safety: verify the stable release is actually published
          IS_DRAFT=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json isDraft --jq '.isDraft' 2>/dev/null || echo "not_found")
          if [ "$IS_DRAFT" != "false" ]; then
            echo "::error::Stable release $TAG is not published (isDraft=$IS_DRAFT) -- aborting dev cleanup"
            exit 1
          fi

          echo "Stable release $TAG is published -- cleaning up all dev pre-releases and tags"

          # 1. Delete all dev releases (draft, pre-release, or published) + their tags.
          #    Use the API directly to ensure drafts are included.
          #    Strict regex: only match vX.Y.Z-dev.N (never stable tags).
          gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            --jq '.[] | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-dev\\.[0-9]+$")) | .tag_name' \
          | while read -r dev_tag; do
              echo "Deleting dev release + tag: $dev_tag"
              gh release delete "$dev_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            done

          # 2. Delete orphan dev tags (tags without a release, e.g. from failed builds).
          gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/v" --paginate --jq '.[].ref' \
          | sed 's|^refs/tags/||' \
          | { grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$' || true; } \
          | while read -r dev_tag; do
              echo "Deleting orphan dev tag: $dev_tag"
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$dev_tag" || true
            done

          echo "Dev pre-release cleanup complete"
