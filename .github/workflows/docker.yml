          path: /tmp

      - name: Load base image (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_TAG: ${{ needs.build-fine-tune-base.outputs.tag }}
        run: |
          docker load -i /tmp/fine-tune-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-fine-tune-base:${BASE_TAG}-amd64" "ghcr.io/aureliolo/synthorg-fine-tune-base:${BASE_TAG}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-fine-tune
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=raw,value=dev,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.') }}
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/fine-tune/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-fine-tune-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-fine-tune-base@{0}', needs.build-fine-tune-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-fine-tune-base:{0}', needs.build-fine-tune-base.outputs.tag) }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
          platforms: linux/amd64

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-fine-tune:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Report image size
        run: scripts/report-image-size.sh "${{ steps.scan-ref.outputs.ref }}" "Fine-Tune"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-fine-tune.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh --verbose trivy-fine-tune.json "Fine-Tune"

      - name: Upload Trivy report (fine-tune)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fine-tune-report
          path: trivy-fine-tune.json
          retention-days: 30

      - name: Trivy SARIF scan (fine-tune)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: sarif
          output: trivy-fine-tune.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Upload SARIF to GitHub Security (fine-tune)
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-fine-tune.sarif
          category: trivy-fine-tune

      - name: CIS Docker Benchmark (fine-tune)
        uses: ./.github/actions/cis-scan
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}

      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/fine-tune/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-fine-tune-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-fine-tune-base@{0}', needs.build-fine-tune-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-fine-tune-base:{0}', needs.build-fine-tune-base.outputs.tag) }}
          cache-from: type=gha
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest -- cannot sign image"
            exit 1
          fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-fine-tune@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed in transparency log -- skipping"
            else
              cat /tmp/cosign-out
              exit 1
            fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-fine-tune
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-fine-tune@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-fine-tune.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-fine-tune
          path: sbom-fine-tune.cdx.json
          retention-days: 30

  # Append container image references to the GitHub Release (version tags only)
  update-release:
    name: Update Release Notes
    needs: [version, build-backend-base, build-sandbox-base, build-sidecar-base, build-fine-tune-base, build-backend, build-web, build-sandbox, build-sidecar, build-fine-tune]
    if: >-
      startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' &&
      !cancelled() &&
      needs.build-backend.result == 'success' &&
      needs.build-web.result == 'success' &&
      needs.build-sandbox.result == 'success' &&
      needs.build-sidecar.result == 'success' &&
      needs.build-fine-tune.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-*
          merge-multiple: true
          path: sboms

      - name: Append container images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          BACKEND_DIGEST: ${{ needs.build-backend.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web.outputs.digest }}
          SANDBOX_DIGEST: ${{ needs.build-sandbox.outputs.digest }}
          SIDECAR_DIGEST: ${{ needs.build-sidecar.outputs.digest }}
          FINE_TUNE_DIGEST: ${{ needs.build-fine-tune.outputs.digest }}
        run: |
          set -euo pipefail

          # Validate required inputs
          if [ -z "$TAG" ] || [ -z "$BACKEND_DIGEST" ] || [ -z "$WEB_DIGEST" ] || [ -z "$SANDBOX_DIGEST" ] || [ -z "$SIDECAR_DIGEST" ]; then
            echo "::error::Missing required values: TAG='$TAG' BACKEND_DIGEST='$BACKEND_DIGEST' WEB_DIGEST='$WEB_DIGEST' SANDBOX_DIGEST='$SANDBOX_DIGEST' SIDECAR_DIGEST='$SIDECAR_DIGEST'"
            exit 1
          fi

          # Bounded retry -- Release Please may still be creating the release
          EXISTING=""
          FOUND=0
          for i in $(seq 1 6); do
            if EXISTING=$(gh release view "$TAG" --json body -q '.body // ""' 2>/dev/null); then
              FOUND=1
              break
            fi
            echo "Release '$TAG' not available yet (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "::error::GitHub release '$TAG' not available after 6 attempts"
            exit 1
          fi

          IMAGES=$(cat <<'BLOCK'

          ## Container Images

          All images are signed with [cosign](https://docs.sigstore.dev/cosign/overview/) (keyless via GitHub OIDC), attested with [SLSA Level 3](https://slsa.dev/spec/v1.0/levels) build provenance, and include CycloneDX SBOMs.

          ### Pull

          | Image | Command |
          |-------|---------|
          | Backend | `docker pull ghcr.io/aureliolo/synthorg-backend:VERSION_PH` |
          | Web | `docker pull ghcr.io/aureliolo/synthorg-web:VERSION_PH` |
          | Sandbox | `docker pull ghcr.io/aureliolo/synthorg-sandbox:VERSION_PH` |
          | Sidecar | `docker pull ghcr.io/aureliolo/synthorg-sidecar:VERSION_PH` |
          | Fine-Tune | `docker pull ghcr.io/aureliolo/synthorg-fine-tune:VERSION_PH` |

          ### Digest Pins

          Pin to these digests in production for reproducible deployments:

          | Image | Digest |
          |-------|--------|
          | Backend | `BACKEND_DIGEST_PH` |
          | Web | `WEB_DIGEST_PH` |
          | Sandbox | `SANDBOX_DIGEST_PH` |
          | Sidecar | `SIDECAR_DIGEST_PH` |
          | Fine-Tune | `FINE_TUNE_DIGEST_PH` |

          ### Supply Chain

          <details>
          <summary>Verify signatures (cosign)</summary>

          ```bash
          # Verify any image -- replace IMAGE and DIGEST:
          cosign verify ghcr.io/aureliolo/synthorg-IMAGE@DIGEST \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          ```
          </details>

          <details>
          <summary>Verify SLSA provenance (gh CLI)</summary>

          ```bash
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-sandbox@SANDBOX_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-sidecar@SIDECAR_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-fine-tune@FINE_TUNE_DIGEST_PH -R Aureliolo/synthorg
          ```
          </details>

          <details>
          <summary>SBOMs (CycloneDX JSON)</summary>

          Attached to this release as artifacts:
          \`sbom-backend.cdx.json\` | \`sbom-web.cdx.json\` | \`sbom-sandbox.cdx.json\` | \`sbom-sidecar.cdx.json\` | \`sbom-fine-tune.cdx.json\`
          </details>
          BLOCK
          )
          # Substitute placeholders (strip leading 'v' from tag for image tags)
          IMAGES=${IMAGES//VERSION_PH/${TAG#v}}
          IMAGES=${IMAGES//BACKEND_DIGEST_PH/$BACKEND_DIGEST}
          IMAGES=${IMAGES//WEB_DIGEST_PH/$WEB_DIGEST}
          IMAGES=${IMAGES//SANDBOX_DIGEST_PH/$SANDBOX_DIGEST}
          IMAGES=${IMAGES//SIDECAR_DIGEST_PH/$SIDECAR_DIGEST}
          IMAGES=${IMAGES//FINE_TUNE_DIGEST_PH/${FINE_TUNE_DIGEST:-unavailable}}

          # Upload container SBOMs to the draft release
          if ls sboms/sbom-*.cdx.json 1>/dev/null 2>&1; then
            gh release upload "$TAG" --clobber sboms/sbom-*.cdx.json
            echo "Container SBOMs uploaded to release."
          else
            echo "::warning::No SBOM files found in sboms/ directory"
          fi

          # Idempotent: strip existing Container Images section before appending.
          # Uses awk to delete only this section (up to the next ## heading), not to EOF.
          CLEANED=$(echo "$EXISTING" | awk '/^## Container Images$/{skip=1; next} /^## /{skip=0} !skip')
          gh release edit "$TAG" --notes "${CLEANED}${IMAGES}"
