name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "web/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Extract app version from pyproject.toml (single source of truth)
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import tomllib
          import sys
          try:
              with open('pyproject.toml', 'rb') as f:
                  data = tomllib.load(f)
              print(data['tool']['commitizen']['version'])
          except (KeyError, FileNotFoundError) as e:
              print(f'::error::Failed to extract version: {e}', file=sys.stderr)
              sys.exit(1)
          ")
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

  build-backend:
    name: Build Backend
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-backend
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      # Build locally first, scan, then push only if scans pass
      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # SHA tag always exists (version/semver tags only on v* tags)
      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-backend:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan (critical — hard fail)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          trivyignores: .github/.trivyignore.yaml

      - name: Trivy scan (high — warn only)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: table
          exit-code: "0"
          severity: HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Grype scan
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      # Push only after scans pass — prevents publishing vulnerable images.
      # NOTE: This is a separate build invocation from the scan step. GHA cache
      # ensures deterministic layer content, but the manifest digest differs due
      # to SBOM + provenance attestation layers added only on push.
      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest — cannot sign image"
            exit 1
          fi
          cosign sign --yes ghcr.io/aureliolo/synthorg-backend@${DIGEST}

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-backend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-web:
    name: Build Web
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-web
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      # Build locally first, scan, then push only if scans pass
      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/web/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # SHA tag always exists (version/semver tags only on v* tags)
      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan (critical — hard fail)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          trivyignores: .github/.trivyignore.yaml

      - name: Trivy scan (high — warn only)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: table
          exit-code: "0"
          severity: HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Grype scan
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      # Push only after scans pass — prevents publishing vulnerable images.
      # NOTE: Separate build invocation; GHA cache ensures deterministic layers,
      # but manifest digest differs due to SBOM + provenance attestation layers.
      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest — cannot sign image"
            exit 1
          fi
          cosign sign --yes ghcr.io/aureliolo/synthorg-web@${DIGEST}

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # Append container image references to the GitHub Release (version tags only)
  update-release:
    name: Update Release Notes
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
    needs: [version, build-backend, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append container images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.app_version }}
          BACKEND_DIGEST: ${{ needs.build-backend.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web.outputs.digest }}
        run: |
          set -euo pipefail

          # Validate required inputs
          if [ -z "$VERSION" ] || [ -z "$BACKEND_DIGEST" ] || [ -z "$WEB_DIGEST" ]; then
            echo "::error::Missing required values: VERSION='$VERSION' BACKEND_DIGEST='$BACKEND_DIGEST' WEB_DIGEST='$WEB_DIGEST'"
            exit 1
          fi

          # Bounded retry — Release Please may still be creating the release
          EXISTING=""
          FOUND=0
          for i in $(seq 1 6); do
            if EXISTING=$(gh release view "$TAG" --json body -q '.body // ""' 2>/dev/null); then
              FOUND=1
              break
            fi
            echo "Release '$TAG' not available yet (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "::error::GitHub release '$TAG' not available after 6 attempts"
            exit 1
          fi

          IMAGES=$(cat <<'BLOCK'

          ## Container Images

          | Image | Pull |
          |-------|------|
          | Backend | `docker pull ghcr.io/aureliolo/synthorg-backend:VERSION_PH` |
          | Web | `docker pull ghcr.io/aureliolo/synthorg-web:VERSION_PH` |

          **Digests** (for pinning):
          - Backend: `ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH`
          - Web: `ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH`

          All images are signed with [cosign](https://github.com/sigstore/cosign). Verify with:
          ```bash
          cosign verify ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'

          cosign verify ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          ```

          ### Provenance Verification (SLSA Level 3)

          Verify provenance with the [GitHub CLI](https://cli.github.com/):
          ```bash
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH -R Aureliolo/synthorg
          ```
          BLOCK
          )
          # Substitute placeholders
          IMAGES=${IMAGES//VERSION_PH/$VERSION}
          IMAGES=${IMAGES//BACKEND_DIGEST_PH/$BACKEND_DIGEST}
          IMAGES=${IMAGES//WEB_DIGEST_PH/$WEB_DIGEST}

          # Idempotent: strip existing Container Images section before appending
          CLEANED=$(echo "$EXISTING" | sed '/^## Container Images$/,$d')
          gh release edit "$TAG" --notes "${CLEANED}${IMAGES}"
