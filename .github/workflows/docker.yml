name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "web/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/export_openapi.py"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which domains changed so docs-only PRs skip backend/sandbox builds
  changes:
    name: Detect Docker Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'docker/backend/**'
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/docker.yml'
            sandbox:
              - 'docker/sandbox/**'
              - '.github/workflows/docker.yml'
            web:
              - 'docker/web/**'
              - 'web/**'
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/export_openapi.py'
              - 'src/synthorg/api/**'
              - '.github/workflows/docker.yml'

  # Extract app version from pyproject.toml (single source of truth)
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import tomllib
          import sys
          try:
              with open('pyproject.toml', 'rb') as f:
                  data = tomllib.load(f)
              print(data['tool']['commitizen']['version'])
          except (KeyError, FileNotFoundError) as e:
              print(f'::error::Failed to extract version: {e}', file=sys.stderr)
              sys.exit(1)
          ")
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

  # =========================================================================
  # apko base images -- Wolfi-composed bases for backend + sandbox
  # =========================================================================
  build-backend-base:
    name: Build Backend Base (apko)
    needs: [version, changes]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.image-ref.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up apko
        run: |
          go install chainguard.dev/apko@v1.2.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: image-ref
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        run: |
          apko build docker/backend/apko.yaml \
            ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7} \
            backend-base.tar

      - name: Load image for scanning
        run: docker load -i backend-base.tar

      - name: Upload base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-base-image
          path: backend-base.tar
          retention-days: 1

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          input: backend-base.tar
          format: json
          output: trivy-backend-base.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: |
          if [ ! -f trivy-backend-base.json ]; then
            echo "::error::trivy-backend-base.json not found"
            exit 1
          fi
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-backend-base.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-backend-base.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$HIGH" -gt 0 ]; then echo "::warning::Found $HIGH HIGH severity vulnerabilities"; fi
          if [ "$CRITICAL" -gt 0 ]; then echo "::error::Found $CRITICAL CRITICAL vulnerabilities"; exit 1; fi

      - name: Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: docker-archive:backend-base.tar
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Push base image
        if: github.event_name != 'pull_request'
        id: push
        run: |
          docker push ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7} | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-backend-base@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else cat /tmp/cosign-out; exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-backend-base
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-sandbox-base:
    name: Build Sandbox Base (apko)
    needs: [version, changes]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.sandbox == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.image-ref.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up apko
        run: |
          go install chainguard.dev/apko@v1.2.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: image-ref
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        run: |
          apko build docker/sandbox/apko.yaml \
            ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7} \
            sandbox-base.tar

      - name: Load image for scanning
        run: docker load -i sandbox-base.tar

      - name: Upload base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox-base-image
          path: sandbox-base.tar
          retention-days: 1

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          input: sandbox-base.tar
          format: json
          output: trivy-sandbox-base.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: |
          if [ ! -f trivy-sandbox-base.json ]; then echo "::error::Missing Trivy output"; exit 1; fi
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-sandbox-base.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-sandbox-base.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$HIGH" -gt 0 ]; then echo "::warning::Found $HIGH HIGH severity vulnerabilities"; fi
          if [ "$CRITICAL" -gt 0 ]; then echo "::error::Found $CRITICAL CRITICAL vulnerabilities"; exit 1; fi

      - name: Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: docker-archive:sandbox-base.tar
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Push base image
        if: github.event_name != 'pull_request'
        id: push
        run: |
          docker push ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7} | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-sandbox-base@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else cat /tmp/cosign-out; exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-sandbox-base
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # =========================================================================
  # Application images -- thin Dockerfile wrappers over apko bases
  # =========================================================================
  build-backend:
    name: Build Backend
    needs: [version, build-backend-base]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: ${{ github.event_name == 'pull_request' && 'docker' || 'docker-container' }}
          cache-binary: false

      - name: Download base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: backend-base-image
          path: /tmp

      - name: Load base image (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_TAG: ${{ needs.build-backend-base.outputs.tag }}
        run: |
          docker load -i /tmp/backend-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-backend-base:${BASE_TAG}-amd64" "ghcr.io/aureliolo/synthorg-backend-base:${BASE_TAG}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-backend
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=raw,value=dev,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.') }}
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-backend-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-backend-base@{0}', needs.build-backend-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-backend-base:{0}', needs.build-backend-base.outputs.tag) }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
          platforms: linux/amd64

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-backend:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Single Trivy run for CRITICAL + HIGH (saves ~30s vs two separate runs).
      # JSON output lets us fail on CRITICAL only while still reporting HIGH.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-backend.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: |
          if [ ! -f trivy-backend.json ]; then
            echo "::error::trivy-backend.json not found -- Trivy scan may have failed to produce output"
            exit 1
          fi
          echo "## Trivy Scan -- Backend"
          TOTAL=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-backend.json)
          if [ "$TOTAL" -eq 0 ]; then
            echo "No CRITICAL or HIGH vulnerabilities found."
            echo "## Trivy Scan -- Backend: No CRITICAL or HIGH vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          else
            TABLE=$(jq -r '
              ["SEVERITY","CVE","PACKAGE","VERSION","TITLE"],
              (.Results[]?.Vulnerabilities[]? |
                [.Severity, .VulnerabilityID, .PkgName, .InstalledVersion, (.Title // "")[0:60]]) |
              @tsv
            ' trivy-backend.json | column -t -s$'\t')
            echo "$TABLE"
            printf '## Trivy Scan -- Backend\n```\n%s\n```\n' "$TABLE" >> "$GITHUB_STEP_SUMMARY"
          fi

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-backend.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-backend.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          echo "**Critical: $CRITICAL, High: $HIGH**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH HIGH severity vulnerabilities"
          fi
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL CRITICAL vulnerabilities -- failing build"
            exit 1
          fi

      - name: Upload Trivy report (backend)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-backend-report
          path: trivy-backend.json
          retention-days: 30

      - name: Grype scan
        id: grype-backend
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Grype table (diagnosis on failure)
        if: failure() && steps.grype-backend.outcome == 'failure'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: false
          severity-cutoff: critical
          output-format: table
          config: .github/.grype.yaml

      # CIS Docker Benchmark v1.6.0 compliance check (uses trivy installed above).
      # Informational for now -- remove continue-on-error once baseline is clean.
      - name: CIS Docker Benchmark (backend)
        continue-on-error: true
        env:
          IMAGE_REF: ${{ steps.scan-ref.outputs.ref }}
        run: |
          command -v trivy >/dev/null 2>&1 || { echo "::warning::trivy not on PATH, skipping CIS scan"; exit 0; }
          trivy image --compliance docker-cis-1.6.0 --format table "$IMAGE_REF"

      # Push only after scans pass -- prevents publishing vulnerable images.
      # NOTE: This is a separate build invocation from the scan step. GHA cache
      # ensures deterministic layer content, but the manifest digest differs due
      # to SBOM + provenance attestation layers added only on push.
      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-backend-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-backend-base@{0}', needs.build-backend-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-backend-base:{0}', needs.build-backend-base.outputs.tag) }}
          cache-from: type=gha
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest -- cannot sign image"
            exit 1
          fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-backend@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed in transparency log -- skipping"
            else
              cat /tmp/cosign-out
              exit 1
            fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-backend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-backend@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-backend
          path: sbom-backend.cdx.json
          retention-days: 30

  # =========================================================================
  # Web image -- melange-packaged assets + pure apko (no Dockerfile)
  # =========================================================================
  build-web-assets:
    name: Build Web Assets (melange)
    needs: [version, changes]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install frontend deps and build SPA
        working-directory: web
        run: npm ci --ignore-scripts && npm run build

      - name: Set up Python + uv (docs build)
        uses: ./.github/actions/setup-python-uv

      - name: Install D2
        run: |
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/v0.7.1/d2-v0.7.1-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          echo "eb172adf59f38d1e5a70ab177591356754ffaf9bebb84e0ca8b767dfb421dad7  /tmp/d2.tar.gz" | sha256sum --check --strict -
          tar -xzf /tmp/d2.tar.gz -C /tmp
          sudo mv /tmp/d2-v0.7.1/bin/d2 /usr/local/bin/d2

      - name: Build documentation
        env:
          PYTHONPATH: .
        run: |
          uv run python scripts/export_openapi.py
          uv run zensical build

      - name: Set up melange
        uses: chainguard-dev/actions/setup-melange@de68b87302e6266db5fb5220246f8aa46fe94b67 # v1.6.14

      - name: Generate melange signing key
        run: melange keygen

      - name: Build web-assets apk
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          printf 'version: %s\n' "$APP_VERSION" > /tmp/melange-vars.yaml
          melange build docker/web/melange.yaml \
            --arch amd64 \
            --source-dir . \
            --signing-key melange.rsa \
            --out-dir packages/ \
            --vars-file /tmp/melange-vars.yaml

      - name: Upload packages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-apk-packages
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  build-web:
    name: Build Web (apko)
    needs: [version, build-web-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Prepare work directory
        run: sudo mkdir -p /work && sudo chown "$(id -u):$(id -g)" /work

      - name: Download web-assets apk
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-apk-packages
          path: /work

      - name: Set up apko
        run: |
          go install chainguard.dev/apko@v1.2.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image
        run: |
          apko build docker/web/apko.yaml \
            ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7} \
            web.tar

      - name: Load image for scanning
        run: |
          docker load -i web.tar
          docker tag "ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}-amd64" "ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" 2>/dev/null || true

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          input: web.tar
          format: json
          output: trivy-web.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: |
          if [ ! -f trivy-web.json ]; then echo "::error::Missing Trivy output"; exit 1; fi
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-web.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-web.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$HIGH" -gt 0 ]; then echo "::warning::Found $HIGH HIGH severity vulnerabilities"; fi
          if [ "$CRITICAL" -gt 0 ]; then echo "::error::Found $CRITICAL CRITICAL vulnerabilities"; exit 1; fi

      - name: Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: docker-archive:web.tar
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Tag web image for release
        if: github.event_name != 'pull_request'
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          SHA_TAG="ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME#v}"
            docker tag "$SHA_TAG" "ghcr.io/aureliolo/synthorg-web:${TAG}"
            if [[ "$TAG" != *-dev.* ]]; then
              MAJOR_MINOR="${TAG%.*}"
              docker tag "$SHA_TAG" "ghcr.io/aureliolo/synthorg-web:${MAJOR_MINOR}"
              docker tag "$SHA_TAG" "ghcr.io/aureliolo/synthorg-web:${APP_VERSION}"
            else
              docker tag "$SHA_TAG" "ghcr.io/aureliolo/synthorg-web:dev"
            fi
          fi

      - name: Push web image
        if: github.event_name != 'pull_request'
        id: push
        run: |
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/aureliolo/synthorg-web:'); do
            docker push "$tag"
          done
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7} | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-web@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else cat /tmp/cosign-out; exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-web@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-web.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-web
          path: sbom-web.cdx.json
          retention-days: 30

  build-sandbox:
    name: Build Sandbox
    needs: [version, build-sandbox-base]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: ${{ github.event_name == 'pull_request' && 'docker' || 'docker-container' }}
          cache-binary: false

      - name: Download base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sandbox-base-image
          path: /tmp

      - name: Load base image (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_TAG: ${{ needs.build-sandbox-base.outputs.tag }}
        run: |
          docker load -i /tmp/sandbox-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-sandbox-base:${BASE_TAG}-amd64" "ghcr.io/aureliolo/synthorg-sandbox-base:${BASE_TAG}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-sandbox
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=raw,value=dev,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.') }}
            type=sha,prefix=sha-

      # Build locally first, scan, then push only if scans pass
      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/sandbox/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-sandbox-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-sandbox-base@{0}', needs.build-sandbox-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-sandbox-base:{0}', needs.build-sandbox-base.outputs.tag) }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
          platforms: linux/amd64

      # SHA tag always exists (version/semver tags only on v* tags)
      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-sandbox:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Single Trivy run for CRITICAL + HIGH.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-sandbox.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: |
          if [ ! -f trivy-sandbox.json ]; then
            echo "::error::trivy-sandbox.json not found -- Trivy scan may have failed to produce output"
            exit 1
          fi
          echo "## Trivy Scan -- Sandbox"
          TOTAL=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-sandbox.json)
          if [ "$TOTAL" -eq 0 ]; then
            echo "No CRITICAL or HIGH vulnerabilities found."
            echo "## Trivy Scan -- Sandbox: No CRITICAL or HIGH vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          else
            TABLE=$(jq -r '
              ["SEVERITY","CVE","PACKAGE","VERSION","TITLE"],
              (.Results[]?.Vulnerabilities[]? |
                [.Severity, .VulnerabilityID, .PkgName, .InstalledVersion, (.Title // "")[0:60]]) |
              @tsv
            ' trivy-sandbox.json | column -t -s$'\t')
            echo "$TABLE"
            printf '## Trivy Scan -- Sandbox\n```\n%s\n```\n' "$TABLE" >> "$GITHUB_STEP_SUMMARY"
          fi

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-sandbox.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-sandbox.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          echo "**Critical: $CRITICAL, High: $HIGH**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH HIGH severity vulnerabilities"
          fi
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL CRITICAL vulnerabilities -- failing build"
            exit 1
          fi

      - name: Upload Trivy report (sandbox)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sandbox-report
          path: trivy-sandbox.json
          retention-days: 30

      - name: Grype scan
        id: grype-sandbox
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Grype table (diagnosis on failure)
        if: failure() && steps.grype-sandbox.outcome == 'failure'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: false
          severity-cutoff: critical
          output-format: table
          config: .github/.grype.yaml

      - name: CIS Docker Benchmark (sandbox)
        continue-on-error: true
        env:
          IMAGE_REF: ${{ steps.scan-ref.outputs.ref }}
        run: |
          command -v trivy >/dev/null 2>&1 || { echo "::warning::trivy not on PATH, skipping CIS scan"; exit 0; }
          trivy image --compliance docker-cis-1.6.0 --format table "$IMAGE_REF"

      # Push only after scans pass -- prevents publishing vulnerable images.
      # NOTE: Separate build invocation; GHA cache ensures deterministic layers,
      # but manifest digest differs due to SBOM + provenance attestation layers.
      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/sandbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-sandbox-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-sandbox-base@{0}', needs.build-sandbox-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-sandbox-base:{0}', needs.build-sandbox-base.outputs.tag) }}
          cache-from: type=gha
          platforms: linux/amd64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest -- cannot sign image"
            exit 1
          fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-sandbox@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed in transparency log -- skipping"
            else
              cat /tmp/cosign-out
              exit 1
            fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-sandbox
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-sandbox@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-sandbox.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-sandbox
          path: sbom-sandbox.cdx.json
          retention-days: 30

  # Append container image references to the GitHub Release (version tags only)
  update-release:
    name: Update Release Notes
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
    needs: [version, build-backend-base, build-sandbox-base, build-backend, build-web, build-sandbox]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-*
          merge-multiple: true
          path: sboms

      - name: Append container images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          BACKEND_DIGEST: ${{ needs.build-backend.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web.outputs.digest }}
          SANDBOX_DIGEST: ${{ needs.build-sandbox.outputs.digest }}
        run: |
          set -euo pipefail

          # Validate required inputs
          if [ -z "$TAG" ] || [ -z "$BACKEND_DIGEST" ] || [ -z "$WEB_DIGEST" ] || [ -z "$SANDBOX_DIGEST" ]; then
            echo "::error::Missing required values: TAG='$TAG' BACKEND_DIGEST='$BACKEND_DIGEST' WEB_DIGEST='$WEB_DIGEST' SANDBOX_DIGEST='$SANDBOX_DIGEST'"
            exit 1
          fi

          # Bounded retry -- Release Please may still be creating the release
          EXISTING=""
          FOUND=0
          for i in $(seq 1 6); do
            if EXISTING=$(gh release view "$TAG" --json body -q '.body // ""' 2>/dev/null); then
              FOUND=1
              break
            fi
            echo "Release '$TAG' not available yet (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "::error::GitHub release '$TAG' not available after 6 attempts"
            exit 1
          fi

          IMAGES=$(cat <<'BLOCK'

          ## Container Images

          | Image | Pull |
          |-------|------|
          | Backend | `docker pull ghcr.io/aureliolo/synthorg-backend:VERSION_PH` |
          | Web | `docker pull ghcr.io/aureliolo/synthorg-web:VERSION_PH` |
          | Sandbox | `docker pull ghcr.io/aureliolo/synthorg-sandbox:VERSION_PH` |

          **Digests** (for pinning):
          - Backend: `ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH`
          - Web: `ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH`
          - Sandbox: `ghcr.io/aureliolo/synthorg-sandbox@SANDBOX_DIGEST_PH`

          <!-- CONTAINER_VERIFICATION_DATA
          ```bash
          cosign verify ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'

          cosign verify ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'

          cosign verify ghcr.io/aureliolo/synthorg-sandbox@SANDBOX_DIGEST_PH \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          ```

          ```bash
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH -R Aureliolo/synthorg
          gh attestation verify oci://ghcr.io/aureliolo/synthorg-sandbox@SANDBOX_DIGEST_PH -R Aureliolo/synthorg
          ```
          CONTAINER_VERIFICATION_DATA -->

          <!-- CONTAINER_SBOM_DATA
          Container image SBOMs (CycloneDX JSON):
          - \`sbom-backend.cdx.json\`
          - \`sbom-web.cdx.json\`
          - \`sbom-sandbox.cdx.json\`
          CONTAINER_SBOM_DATA -->
          BLOCK
          )
          # Substitute placeholders (strip leading 'v' from tag for image tags)
          IMAGES=${IMAGES//VERSION_PH/${TAG#v}}
          IMAGES=${IMAGES//BACKEND_DIGEST_PH/$BACKEND_DIGEST}
          IMAGES=${IMAGES//WEB_DIGEST_PH/$WEB_DIGEST}
          IMAGES=${IMAGES//SANDBOX_DIGEST_PH/$SANDBOX_DIGEST}

          # Upload container SBOMs to the draft release
          if ls sboms/sbom-*.cdx.json 1>/dev/null 2>&1; then
            gh release upload "$TAG" --clobber sboms/sbom-*.cdx.json
            echo "Container SBOMs uploaded to release."
          else
            echo "::warning::No SBOM files found in sboms/ directory"
          fi

          # Idempotent: strip existing Container Images section before appending.
          # Uses awk to delete only this section (up to the next ## heading), not to EOF.
          CLEANED=$(echo "$EXISTING" | awk '/^## Container Images$/{skip=1; next} /^## /{skip=0} !skip')
          gh release edit "$TAG" --notes "${CLEANED}${IMAGES}"
