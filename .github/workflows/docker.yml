name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "web/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/export_openapi.py"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=aquasecurity/trivy
  TRIVY_VERSION: "0.69.3"
  # renovate: datasource=github-releases depName=anchore/grype
  GRYPE_VERSION: "0.111.0"

jobs:
  # Detect which domains changed so docs-only PRs skip backend/sandbox builds
  changes:
    name: Detect Docker Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'docker/backend/**'
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/docker.yml'
            sandbox:
              - 'docker/sandbox/**'
              - '.github/workflows/docker.yml'
            web:
              - 'docker/web/**'
              - 'web/**'
              - 'docs/**'
              - 'mkdocs.yml'
              - 'scripts/export_openapi.py'
              - 'src/synthorg/api/**'
              - '.github/workflows/docker.yml'

  # Extract app version from pyproject.toml (single source of truth)
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import tomllib
          import sys
          try:
              with open('pyproject.toml', 'rb') as f:
                  data = tomllib.load(f)
              print(data['tool']['commitizen']['version'])
          except (KeyError, FileNotFoundError) as e:
              print(f'::error::Failed to extract version: {e}', file=sys.stderr)
              sys.exit(1)
          ")
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

  # =========================================================================
  # Compose file validation -- catches syntax errors early
  # =========================================================================
  validate-compose:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate compose files
        run: |
          touch docker/.env
          docker compose -f docker/compose.yml config --quiet
          docker compose -f docker/compose.yml -f docker/compose.distributed.yml --profile distributed config --quiet
          docker compose -f docker/compose.yml -f docker/compose.override.yml config --quiet

      - name: Report tmpfs allocations
        run: |
          echo "## tmpfs Allocations" >> "$GITHUB_STEP_SUMMARY"
          for f in docker/compose.yml docker/compose.distributed.yml docker/compose.override.yml; do
            echo "### $f" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E 'tmpfs:|^\s+- /.*size=' "$f" >> "$GITHUB_STEP_SUMMARY" || echo "_none_" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

  # =========================================================================
  # apko base images -- Wolfi-composed bases for backend + sandbox
  # =========================================================================
  build-backend-base:
    name: Build Backend Base (apko)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.image-ref.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up apko
        uses: ./.github/actions/setup-apko
        with:
          # renovate: datasource=github-releases depName=chainguard-dev/apko
          version: v1.2.3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: image-ref
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        run: |
          apko build docker/backend/apko.yaml \
            ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7} \
            backend-base.tar

      - name: Load image for scanning
        run: |
          docker load -i backend-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7}-amd64" "ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7}" 2>/dev/null || true

      - name: Report image size
        run: scripts/report-image-size.sh "ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7}" "Backend Base"

      - name: Upload base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-base-image
          path: backend-base.tar
          retention-days: 1

      - name: Install security scanners
        run: |
          curl -sfL --retry 3 --retry-delay 5 "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o "/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sfL --retry 3 --retry-delay 5 "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
          (cd /tmp && grep "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -C /usr/local/bin trivy

          curl -sfL --retry 3 --retry-delay 5 "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -o "/tmp/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sfL --retry 3 --retry-delay 5 "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_checksums.txt" -o /tmp/grype_checksums.txt
          (cd /tmp && grep "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" grype_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin grype

      - name: Security scans (parallel)
        run: |
          IMAGE_REF="ghcr.io/aureliolo/synthorg-backend-base:sha-${GITHUB_SHA::7}"
          trivy image "${IMAGE_REF}" --format json --output trivy-backend-base.json \
            --exit-code 0 --severity CRITICAL,HIGH --ignorefile .github/.trivyignore.yaml &
          TRIVY_PID=$!

          grype "${IMAGE_REF}" --fail-on critical -c .github/.grype.yaml &
          GRYPE_PID=$!

          TRIVY_RC=0; wait "$TRIVY_PID" || TRIVY_RC=$?
          GRYPE_RC=0; wait "$GRYPE_PID" || GRYPE_RC=$?

          if [ "$TRIVY_RC" -ne 0 ]; then
            echo "::error::Trivy scan failed (exit code ${TRIVY_RC})"
            exit 1
          fi
          if [ "$GRYPE_RC" -ne 0 ]; then
            echo "::error::Grype scan found critical vulnerabilities"
            exit 1
          fi

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh trivy-backend-base.json "Backend Base"

      - name: Push base image (multi-arch manifest)
        if: github.event_name != 'pull_request'
        id: push
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          REPO="ghcr.io/aureliolo/synthorg-backend-base"
          docker push "${REPO}:${TAG}-amd64"
          docker push "${REPO}:${TAG}-arm64"
          docker manifest create "${REPO}:${TAG}" \
            "${REPO}:${TAG}-amd64" \
            "${REPO}:${TAG}-arm64"
          DIGEST=$(docker manifest push "${REPO}:${TAG}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-backend-base@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else cat /tmp/cosign-out; exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-backend-base
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-sandbox-base:
    name: Build Sandbox Base (apko)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.sandbox == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.image-ref.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up apko
        uses: ./.github/actions/setup-apko
        with:
          # renovate: datasource=github-releases depName=chainguard-dev/apko
          version: v1.2.3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: image-ref
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        run: |
          apko build docker/sandbox/apko.yaml \
            ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7} \
            sandbox-base.tar

      - name: Load image for scanning
        run: |
          docker load -i sandbox-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7}-amd64" "ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7}" 2>/dev/null || true

      - name: Report image size
        run: scripts/report-image-size.sh "ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7}" "Sandbox Base"

      - name: Upload base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sandbox-base-image
          path: sandbox-base.tar
          retention-days: 1

      - name: Install security scanners
        run: |
          curl -sfL --retry 3 --retry-delay 5 "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o "/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sfL --retry 3 --retry-delay 5 "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
          (cd /tmp && grep "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -C /usr/local/bin trivy

          curl -sfL --retry 3 --retry-delay 5 "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -o "/tmp/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sfL --retry 3 --retry-delay 5 "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_checksums.txt" -o /tmp/grype_checksums.txt
          (cd /tmp && grep "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" grype_checksums.txt | sha256sum -c -)
          tar -xzf "/tmp/grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin grype

      - name: Security scans (parallel)
        run: |
          IMAGE_REF="ghcr.io/aureliolo/synthorg-sandbox-base:sha-${GITHUB_SHA::7}"
          trivy image "${IMAGE_REF}" --format json --output trivy-sandbox-base.json \
            --exit-code 0 --severity CRITICAL,HIGH --ignorefile .github/.trivyignore.yaml &
          TRIVY_PID=$!

          grype "${IMAGE_REF}" --fail-on critical -c .github/.grype.yaml &
          GRYPE_PID=$!

          TRIVY_RC=0; wait "$TRIVY_PID" || TRIVY_RC=$?
          GRYPE_RC=0; wait "$GRYPE_PID" || GRYPE_RC=$?

          if [ "$TRIVY_RC" -ne 0 ]; then
            echo "::error::Trivy scan failed (exit code ${TRIVY_RC})"
            exit 1
          fi
          if [ "$GRYPE_RC" -ne 0 ]; then
            echo "::error::Grype scan found critical vulnerabilities"
            exit 1
          fi

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh trivy-sandbox-base.json "Sandbox Base"

      - name: Push base image
        if: github.event_name != 'pull_request'
        id: push
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          REPO="ghcr.io/aureliolo/synthorg-sandbox-base"
          docker push "${REPO}:${TAG}-amd64"
          docker push "${REPO}:${TAG}-arm64"
          docker manifest create "${REPO}:${TAG}" \
            "${REPO}:${TAG}-amd64" \
            "${REPO}:${TAG}-arm64"
          DIGEST=$(docker manifest push "${REPO}:${TAG}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-sandbox-base@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else cat /tmp/cosign-out; exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-sandbox-base
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # =========================================================================
  # Application images -- thin Dockerfile wrappers over apko bases
  # =========================================================================
  build-backend:
    name: Build Backend
    needs: [version, build-backend-base]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-backend-base.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU (ARM64 emulation)
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: ${{ github.event_name == 'pull_request' && 'docker' || 'docker-container' }}
          cache-binary: false

      - name: Download base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: backend-base-image
          path: /tmp

      - name: Load base image (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_TAG: ${{ needs.build-backend-base.outputs.tag }}
        run: |
          docker load -i /tmp/backend-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-backend-base:${BASE_TAG}-amd64" "ghcr.io/aureliolo/synthorg-backend-base:${BASE_TAG}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-backend
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=raw,value=dev,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.') }}
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-backend-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-backend-base@{0}', needs.build-backend-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-backend-base:{0}', needs.build-backend-base.outputs.tag) }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
          platforms: linux/amd64

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-backend:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Report image size
        run: scripts/report-image-size.sh "${{ steps.scan-ref.outputs.ref }}" "Backend"

      # Single Trivy run for CRITICAL + HIGH (saves ~30s vs two separate runs).
      # JSON output lets us fail on CRITICAL only while still reporting HIGH.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-backend.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh --verbose trivy-backend.json "Backend"

      - name: Upload Trivy report (backend)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-backend-report
          path: trivy-backend.json
          retention-days: 30

      - name: Grype scan
        id: grype-backend
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Grype table (diagnosis on failure)
        if: failure() && steps.grype-backend.outcome == 'failure'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: false
          severity-cutoff: critical
          output-format: table
          config: .github/.grype.yaml

      # CIS Docker Benchmark v1.6.0 compliance check.
      # Informational for now -- remove continue-on-error once baseline is clean.
      - name: CIS Docker Benchmark (backend)
        continue-on-error: true
        run: scripts/cis-scan.sh "${{ steps.scan-ref.outputs.ref }}"

      # Push only after scans pass -- prevents publishing vulnerable images.
      # NOTE: This is a separate build invocation from the scan step. GHA cache
      # ensures deterministic layer content, but the manifest digest differs due
      # to SBOM + provenance attestation layers added only on push.
      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-backend-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-backend-base@{0}', needs.build-backend-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-backend-base:{0}', needs.build-backend-base.outputs.tag) }}
          cache-from: type=gha
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest -- cannot sign image"
            exit 1
          fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-backend@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed in transparency log -- skipping"
            else
              cat /tmp/cosign-out
              exit 1
            fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-backend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-backend@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-backend.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-backend
          path: sbom-backend.cdx.json
          retention-days: 30

  # =========================================================================
  # Web image -- melange-packaged assets + pure apko (no Dockerfile)
  # =========================================================================
  build-web-assets:
    name: Build Web Assets (melange)
    needs: [version, changes, validate-compose]
    if: >-
      !cancelled() && needs.version.result == 'success' &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install frontend deps and build SPA
        working-directory: web
        run: npm ci --ignore-scripts && npm run build

      - name: Set up Python + uv (docs build)
        uses: ./.github/actions/setup-python-uv

      # D2 does not publish checksums or signatures in its releases --
      # integrity relies on HTTPS transport from GitHub. Accepted tradeoff:
      # D2 is a docs-only diagramming tool (not a security scanner).
      # Version managed by Renovate (regex manager in renovate.json).
      - name: Install D2
        env:
          # renovate: datasource=github-releases depName=terrastruct/d2
          D2_VERSION: v0.7.1
        run: |
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/terrastruct/d2/releases/download/${D2_VERSION}/d2-${D2_VERSION}-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          tar -xzf /tmp/d2.tar.gz -C /tmp
          sudo mv "/tmp/d2-${D2_VERSION}/bin/d2" /usr/local/bin/d2
          rm -rf /tmp/d2.tar.gz "/tmp/d2-${D2_VERSION}"

      - name: Build documentation
        env:
          PYTHONPATH: .
        run: |
          uv run python scripts/export_openapi.py
          uv run zensical build

      - name: Set up melange
        uses: chainguard-dev/actions/setup-melange@de68b87302e6266db5fb5220246f8aa46fe94b67 # v1.6.14

      - name: Generate melange signing key
        run: melange keygen

      - name: Build web-assets apk
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          printf 'version: %s\n' "$APP_VERSION" > /tmp/melange-vars.yaml
          # Build arches sequentially -- melange v0.49.0 bubblewrap
          # runner has a bind-mount race when building multiple arches
          # in parallel, causing web/dist/ to be invisible in one guest.
          for arch in x86_64 aarch64; do
            melange build docker/web/melange.yaml \
              --arch "$arch" \
              --source-dir . \
              --signing-key melange.rsa \
              --out-dir packages/ \
              --vars-file /tmp/melange-vars.yaml
          done

      - name: Upload packages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-apk-packages
          path: |
            packages/
            melange.rsa.pub
          retention-days: 1

  build-web:
    name: Build Web (apko)
    needs: [version, build-web-assets]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-web-assets.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Prepare work directory
        run: sudo mkdir -p /work && sudo chown "$(id -u):$(id -g)" /work

      - name: Download web-assets apk
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: web-apk-packages
          path: /work

      - name: Set up apko
        uses: ./.github/actions/setup-apko
        with:
          # renovate: datasource=github-releases depName=chainguard-dev/apko
          version: v1.2.3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image
        run: |
          apko build docker/web/apko.yaml \
            ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7} \
            web.tar

      - name: Load image for scanning
        run: |
          docker load -i web.tar
          docker tag "ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}-amd64" "ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" 2>/dev/null || true

      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-web:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Report image size
        run: scripts/report-image-size.sh "${{ steps.scan-ref.outputs.ref }}" "Web"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-web.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh --verbose trivy-web.json "Web"

      - name: Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Push web image (multi-arch manifest)
        if: github.event_name != 'pull_request'
        id: push
        env:
          APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          REPO="ghcr.io/aureliolo/synthorg-web"

          # Push per-arch images
          docker push "${REPO}:${SHA_TAG}-amd64"
          docker push "${REPO}:${SHA_TAG}-arm64"

          # Collect manifest tags (deduplicated -- TAG and APP_VERSION can match)
          declare -A SEEN_TAGS
          MANIFEST_TAGS=()
          for candidate in "${SHA_TAG}" $(
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              TAG="${GITHUB_REF_NAME#v}"
              echo "${TAG}"
              if [[ "$TAG" != *-dev.* ]]; then
                echo "${TAG%.*}"
                echo "${APP_VERSION}"
              else
                echo "dev"
              fi
            fi
          ); do
            if [ -z "${SEEN_TAGS[$candidate]+x}" ]; then
              SEEN_TAGS[$candidate]=1
              MANIFEST_TAGS+=("$candidate")
            fi
          done

          # Create and push multi-arch manifest for each tag
          DIGEST=""
          for t in "${MANIFEST_TAGS[@]}"; do
            docker manifest create "${REPO}:${t}" \
              "${REPO}:${SHA_TAG}-amd64" \
              "${REPO}:${SHA_TAG}-arm64"
            PUSH_OUT=$(docker manifest push "${REPO}:${t}")
            if [ "$t" = "${SHA_TAG}" ]; then
              DIGEST="$PUSH_OUT"
            fi
          done
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then echo "::error::No digest"; exit 1; fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-web@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed -- skipping"
            else cat /tmp/cosign-out; exit 1; fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-web@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-web.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-web
          path: sbom-web.cdx.json
          retention-days: 30

  build-sandbox:
    name: Build Sandbox
    needs: [version, build-sandbox-base]
    if: >-
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.build-sandbox-base.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU (ARM64 emulation)
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: ${{ github.event_name == 'pull_request' && 'docker' || 'docker-container' }}
          cache-binary: false

      - name: Download base image artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sandbox-base-image
          path: /tmp

      - name: Load base image (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_TAG: ${{ needs.build-sandbox-base.outputs.tag }}
        run: |
          docker load -i /tmp/sandbox-base.tar
          docker tag "ghcr.io/aureliolo/synthorg-sandbox-base:${BASE_TAG}-amd64" "ghcr.io/aureliolo/synthorg-sandbox-base:${BASE_TAG}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/aureliolo/synthorg-sandbox
          tags: |
            type=raw,value=${{ needs.version.outputs.app_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.') }}
            type=raw,value=dev,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.') }}
            type=sha,prefix=sha-

      # Build locally first, scan, then push only if scans pass
      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/sandbox/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-sandbox-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-sandbox-base@{0}', needs.build-sandbox-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-sandbox-base:{0}', needs.build-sandbox-base.outputs.tag) }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
          platforms: linux/amd64

      # SHA tag always exists (version/semver tags only on v* tags)
      - name: Compute scan image ref
        id: scan-ref
        run: echo "ref=ghcr.io/aureliolo/synthorg-sandbox:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Report image size
        run: scripts/report-image-size.sh "${{ steps.scan-ref.outputs.ref }}" "Sandbox"

      # Single Trivy run for CRITICAL + HIGH.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.scan-ref.outputs.ref }}
          format: json
          output: trivy-sandbox.json
          exit-code: "0"
          severity: CRITICAL,HIGH
          trivyignores: .github/.trivyignore.yaml

      - name: Evaluate Trivy results
        run: scripts/evaluate-scan.sh --verbose trivy-sandbox.json "Sandbox"

      - name: Upload Trivy report (sandbox)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sandbox-report
          path: trivy-sandbox.json
          retention-days: 30

      - name: Grype scan
        id: grype-sandbox
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: true
          severity-cutoff: critical
          config: .github/.grype.yaml

      - name: Grype table (diagnosis on failure)
        if: failure() && steps.grype-sandbox.outcome == 'failure'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.scan-ref.outputs.ref }}
          fail-build: false
          severity-cutoff: critical
          output-format: table
          config: .github/.grype.yaml

      # CIS Docker Benchmark v1.6.0 compliance check.
      # Informational for now -- remove continue-on-error once baseline is clean.
      - name: CIS Docker Benchmark (sandbox)
        continue-on-error: true
        run: scripts/cis-scan.sh "${{ steps.scan-ref.outputs.ref }}"

      # Push only after scans pass -- prevents publishing vulnerable images.
      # NOTE: Separate build invocation; GHA cache ensures deterministic layers,
      # but manifest digest differs due to SBOM + provenance attestation layers.
      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/sandbox/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ needs.build-sandbox-base.outputs.digest != '' && format('ghcr.io/aureliolo/synthorg-sandbox-base@{0}', needs.build-sandbox-base.outputs.digest) || format('ghcr.io/aureliolo/synthorg-sandbox-base:{0}', needs.build-sandbox-base.outputs.tag) }}
          cache-from: type=gha
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::Push step did not produce a digest -- cannot sign image"
            exit 1
          fi
          set -o pipefail
          if ! cosign sign --yes ghcr.io/aureliolo/synthorg-sandbox@${DIGEST} 2>&1 | tee /tmp/cosign-out; then
            if grep -q 'createLogEntryConflict' /tmp/cosign-out; then
              echo "::notice::Image already signed in transparency log -- skipping"
            else
              cat /tmp/cosign-out
              exit 1
            fi
          fi

      - name: Attest build provenance (SLSA Level 3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/aureliolo/synthorg-sandbox
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/aureliolo/synthorg-sandbox@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-sandbox.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-sandbox
          path: sbom-sandbox.cdx.json
          retention-days: 30

  # Append container image references to the GitHub Release (version tags only)
  update-release:
    name: Update Release Notes
    needs: [version, build-backend-base, build-sandbox-base, build-backend, build-web, build-sandbox]
    if: >-
      startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' &&
      !cancelled() &&
      needs.build-backend.result == 'success' &&
      needs.build-web.result == 'success' &&
      needs.build-sandbox.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-*
          merge-multiple: true
          path: sboms

      - name: Append container images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          BACKEND_DIGEST: ${{ needs.build-backend.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web.outputs.digest }}
          SANDBOX_DIGEST: ${{ needs.build-sandbox.outputs.digest }}
        run: |
          set -euo pipefail

          # Validate required inputs
          if [ -z "$TAG" ] || [ -z "$BACKEND_DIGEST" ] || [ -z "$WEB_DIGEST" ] || [ -z "$SANDBOX_DIGEST" ]; then
            echo "::error::Missing required values: TAG='$TAG' BACKEND_DIGEST='$BACKEND_DIGEST' WEB_DIGEST='$WEB_DIGEST' SANDBOX_DIGEST='$SANDBOX_DIGEST'"
            exit 1
          fi

          # Bounded retry -- Release Please may still be creating the release
          EXISTING=""
          FOUND=0
          for i in $(seq 1 6); do
            if EXISTING=$(gh release view "$TAG" --json body -q '.body // ""' 2>/dev/null); then
              FOUND=1
              break
            fi
            echo "Release '$TAG' not available yet (attempt $i/6), retrying in 10s..."
            sleep 10
          done
          if [ "$FOUND" -ne 1 ]; then
            echo "::error::GitHub release '$TAG' not available after 6 attempts"
            exit 1
          fi

          IMAGES=$(cat <<'BLOCK'

          ## Container Images

          | Image | Pull |
          |-------|------|
          | Backend | `docker pull ghcr.io/aureliolo/synthorg-backend:VERSION_PH` |
          | Web | `docker pull ghcr.io/aureliolo/synthorg-web:VERSION_PH` |
          | Sandbox | `docker pull ghcr.io/aureliolo/synthorg-sandbox:VERSION_PH` |

          **Digests** (for pinning):
          - Backend: `ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH`
          - Web: `ghcr.io/aureliolo/synthorg-web@WEB_DIGEST_PH`
          - Sandbox: `ghcr.io/aureliolo/synthorg-sandbox@SANDBOX_DIGEST_PH`

          <!-- CONTAINER_VERIFICATION_DATA
          ```bash
          cosign verify ghcr.io/aureliolo/synthorg-backend@BACKEND_DIGEST_PH \
            --certificate-identity-regexp='github\.com/Aureliolo/synthorg' \
