name: DAST

on:
  schedule:
    - cron: "0 5 * * 1"  # Weekly Monday 5am UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false  # Serialize -- only one DAST scan at a time

jobs:
  zap-scan:
    name: ZAP API Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # The ZAP action creates/updates a single GitHub issue per repo with scan
      # findings (not one per run). Removing issues:write would cause the action
      # to fail. The auto-created issue is updated in-place on subsequent runs.
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Create env file with generated secrets (compose requires env_file: .env).
      # Postgres is a required compose service, so POSTGRES_PASSWORD must be set
      # even for API-only scans -- the backend connects on startup.
      - name: Create env file
        run: |
          cp docker/.env.example docker/.env
          echo "SYNTHORG_JWT_SECRET=$(python3 -c 'import secrets; print(secrets.token_urlsafe(48))')" >> docker/.env
          echo "SYNTHORG_SETTINGS_KEY=$(python3 -c 'import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" >> docker/.env
          echo "POSTGRES_PASSWORD=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')" >> docker/.env

      # Build backend image locally (no push, no registry credentials)
      - name: Build backend image
        run: docker compose -f docker/compose.yml build backend

      # Start backend only (no web/caddy needed for API scan)
      - name: Start backend
        run: docker compose -f docker/compose.yml up -d backend

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to start within 60s"
          docker compose -f docker/compose.yml logs backend
          exit 1

      # Generate a long-lived system-user JWT so ZAP can scan authenticated
      # endpoints.  Without this, every protected route returns 401/403 and
      # is effectively invisible to the scanner.
      #
      # Uses the same system-user identity (sub=system, iss=synthorg-cli,
      # aud=synthorg-backend) that the Go CLI uses.  The system user is
      # bootstrapped at backend startup and skips pwd_sig validation --
      # the JWT HMAC signature is the sole auth gate.
      # See: src/synthorg/api/auth/middleware.py _resolve_jwt_user()
      - name: Generate DAST JWT
        id: jwt
        run: |
          TOKEN=$(docker compose -f docker/compose.yml exec -T backend \
            python -c "
          import os, jwt, datetime, uuid
          secret = os.environ['SYNTHORG_JWT_SECRET']
          payload = {
              'sub': 'system',
              'iss': 'synthorg-cli',
              'aud': 'synthorg-backend',
              'role': 'system',
              'jti': uuid.uuid4().hex,
              'iat': datetime.datetime.now(datetime.timezone.utc),
              'exp': datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=2),
          }
          print(jwt.encode(payload, secret, algorithm='HS256'))
          ")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # -a enables alpha passive scan rules (release + beta loaded by default).
      # -T 20 caps ZAP startup + passive scanning at 20 minutes.
      # -J/-r produce machine-parseable and human-readable report artifacts.
      # -z passes performance tuning directly to ZAP:
      #   threadPerHost=5    -- faster on localhost (default 2)
      #   maxRuleDurationInMins=5  -- no single rule dominates scan time
      #   maxScanDurationInMins=30 -- hard cap on the active scan phase
      # Rules file promotes critical findings to FAIL and suppresses validated
      # false positives -- see docs/security.md "DAST Tuning" for rationale.
      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: "Bearer ${{ steps.jwt.outputs.token }}"
          ZAP_AUTH_HEADER_SITE: localhost
        with:
          target: http://localhost:3001/docs/openapi.json
          format: openapi
          fail_action: false
          cmd_options: >-
            -a -T 20
            -J report_json.json -r report_html.html
            -z "-config scanner.threadPerHost=5
                -config scanner.maxRuleDurationInMins=5
                -config scanner.maxScanDurationInMins=30"
          rules_file_name: .github/zap-rules.tsv

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-reports
          path: |
            report_json.json
            report_html.html
          if-no-files-found: warn
          retention-days: 30

      - name: Stop backend
        if: always()
        run: docker compose -f docker/compose.yml down
