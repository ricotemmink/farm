name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  cla-check:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target' && github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'renovate[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: .github/cla-signatures.json
          path-to-document: .github/CLA.md
          branch: cla-signatures
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/.github/CLA.md).

            **To sign**, please reply to this comment with the following exact text:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once -- it covers all future contributions.
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the CLA. Thank you!
          lock-pullrequest-aftermerge: false
          use-dco-flag: false
