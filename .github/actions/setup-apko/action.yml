name: Set up apko
description: Download, verify, and install the apko binary from GitHub releases

inputs:
  version:
    description: "apko version to install (e.g. v1.2.3)"
    required: true

runs:
  using: composite
  steps:
    - name: Install apko
      shell: bash
      env:
        APKO_VERSION: ${{ inputs.version }}
      run: |
        APKO_ARCHIVE="apko_${APKO_VERSION#v}_linux_amd64.tar.gz"
        curl -fsSL --retry 3 --retry-delay 5 \
          "https://github.com/chainguard-dev/apko/releases/download/${APKO_VERSION}/${APKO_ARCHIVE}" \
          -o "/tmp/${APKO_ARCHIVE}"
        curl -fsSL --retry 3 --retry-delay 5 \
          "https://github.com/chainguard-dev/apko/releases/download/${APKO_VERSION}/checksums.txt" \
          -o /tmp/apko-checksums.txt
        awk -v f="${APKO_ARCHIVE}" '$2==f {print $1"  /tmp/"$2; found=1} END{if(!found) exit 1}' /tmp/apko-checksums.txt | sha256sum -c -
        tar -xzf "/tmp/${APKO_ARCHIVE}" -C /tmp
        mv "/tmp/apko_${APKO_VERSION#v}_linux_amd64/apko" /usr/local/bin/apko
        rm -rf "/tmp/${APKO_ARCHIVE}" /tmp/apko-checksums.txt "/tmp/apko_${APKO_VERSION#v}_linux_amd64"
