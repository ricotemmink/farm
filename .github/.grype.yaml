# Grype configuration -- CVE ignore list
# Kept in sync with .github/.trivyignore.yaml.

ignore:
  - vulnerability: CVE-2026-22184
    reason: >-
      Disputed zlib vulnerability affecting only the untgz demo utility
      in contrib/, not core zlib. Upstream disputes CVE validity.

  # Audit: 2026-03-26 -- Review-by: 2026-06-24
  # Revisit when python:3.14-slim ships libexpat >= 2.7.4
  - vulnerability: CVE-2026-25210
    package:
      name: libexpat1
      type: deb
    reason: >-
      libexpat integer overflow in doContent buffer reallocation (fixed in
      2.7.4, sandbox has 2.7.1-2). No Debian Trixie fix available yet.
      Risk accepted: sandbox is ephemeral, network-isolated, non-root.

  # Audit: 2026-03-26 -- Review-by: 2026-06-24
  # Revisit when Debian Trixie ships ncurses >= 6.5-20251213
  - vulnerability: CVE-2025-69720
    package:
      name: libncursesw6
      type: deb
    reason: >-
      Stack buffer overflow in infocmp -i (analyze_string). Only triggers
      when running infocmp -i on crafted terminfo -- sandbox never invokes
      infocmp. ncurses is a transitive dep of Python/git. Grype rates
      CRITICAL but EPSS < 0.1%, Debian unimportant. Risk accepted:
      sandbox is ephemeral, network-isolated, non-root.
  - vulnerability: CVE-2025-69720
    package:
      name: libtinfo6
      type: deb
    reason: >-
      Same as libncursesw6 entry above -- ncurses infocmp -i overflow.
  - vulnerability: CVE-2025-69720
    package:
      name: ncurses-base
      type: deb
    reason: >-
      Same as libncursesw6 entry above -- ncurses infocmp -i overflow.
  - vulnerability: CVE-2025-69720
    package:
      name: ncurses-bin
      type: deb
    reason: >-
      Same as libncursesw6 entry above -- ncurses infocmp -i overflow.

  # Audit: 2026-04-11 -- Review-by: 2026-07-10
  # Revisit when Chainguard ships python-3.14 >= 3.14.3-r3 or 3.14.4
  - vulnerability: CVE-2026-4519
    reason: >-
      Python webbrowser module command-line option injection. Our images
      never invoke webbrowser.open() -- the module is not imported or used.
      Fixed in CPython 3.14.4 but Chainguard image pins 3.14.3-r2.
      Risk accepted: no code path reaches the vulnerable function.

  # Audit: 2026-06-17 -- review after 90 days (no native expiration in Grype)
  - vulnerability: CVE-2026-32767
    package:
      name: libexpat
      type: apk
    reason: >-
      False positive: SiYuan Note auth bypass, not a libexpat vulnerability.
      Trivy incorrectly maps this CVE to libexpat. Web image is nginx
      serving static files -- SiYuan and SQL are not present.

  # Audit: 2026-04-11 -- Review-by: 2026-07-10
  # Revisit when Chainguard ships openssl >= 3.6.1-r3 or a patched FIPS module
  - vulnerability: CVE-2026-28386
    package:
      name: libcrypto3
      type: apk
    reason: >-
      OpenSSL AES-CFB128 out-of-bounds read on x86-64 with AVX-512/VAES.
      Requires partial block processing at page boundary with unmapped
      following page. CFB mode is not used in TLS/DTLS and our application
      does not use AES-CFB128. No patched Chainguard package available yet.
      EPSS < 0.1%. Risk accepted: attack vector is unreachable.
  - vulnerability: CVE-2026-28386
    package:
      name: libssl3
      type: apk
    reason: >-
      Same as libcrypto3 entry above -- OpenSSL AES-CFB128 OOB read.
